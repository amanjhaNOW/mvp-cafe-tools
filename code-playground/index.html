// ── Init ──
function init() {
  const saved = localStorage.getItem('cp_projects');
  const savedSettings = localStorage.getItem('cp_settings');
  if (savedSettings) Object.assign(settings, JSON.parse(savedSettings));
  if (saved) {
    projects = JSON.parse(saved);
  }
  if (!projects.length) {
    // Seed with a demo project from the Blank template
    const t = TEMPLATES[0];
    const p = createProjectFromTemplate(t, 'My First Project');
    projects.push(p);
    activeId = p.id;
  } else {
    activeId = projects[0].id;
  }
  applySettings();
  renderSidebar();
  renderTemplateSidebar();
  loadProject(activeId);
}

function uid() { return Date.now().toString(36) + Math.random().toString(36).substr(2,6); }

function createProjectFromTemplate(t, name) {
  return {
    id: uid(),
    name: name || t.name,
    html: t.html || '',
    css: t.css || '',
    js: t.js || '',
    resources: [],
    created: Date.now(),
    modified: Date.now()
  };
}

// ── Save ──
function save() {
  const p = getProject();
  if (p) p.modified = Date.now();
  localStorage.setItem('cp_projects', JSON.stringify(projects));
  localStorage.setItem('cp_settings', JSON.stringify(settings));
  document.getElementById('statusSave').textContent = 'Saved ✓';
  setTimeout(() => { document.getElementById('statusSave').textContent = 'Saved'; }, 1500);
}

function getProject(id) { return projects.find(p => p.id === (id || activeId)); }

// ── Sidebar ──
function renderSidebar() {
  const q = (document.getElementById('sideSearch').value || '').toLowerCase();
  const list = document.getElementById('sidebarList');
  const filtered = projects.filter(p => !q || p.name.toLowerCase().includes(q));
  list.innerHTML = filtered.map(p => `
    <div class="sidebar-item${p.id===activeId?' active':''}" onclick="loadProject('${p.id}')">
      <div class="dot" style="background:${p.id===activeId?'var(--accent)':'var(--text2)'}"></div>
      <span class="name">${esc(p.name)}</span>
      <button class="del" onclick="event.stopPropagation();deleteProject('${p.id}')" title="Delete">✕</button>
    </div>
  `).join('');
}

function renderTemplateSidebar() {
  const list = document.getElementById('templateList');
  list.innerHTML = TEMPLATES.map(t => `
    <div class="sidebar-item" onclick="newFromTemplate('${t.id}')">
      <span style="font-size:14px">${t.icon}</span>
      <span class="name">${t.name}</span>
    </div>
  `).join('');
}

// ── Project CRUD ──
function newProject() {
  const p = createProjectFromTemplate(TEMPLATES[0], 'Untitled ' + (projects.length + 1));
  projects.unshift(p);
  activeId = p.id;
  save();
  renderSidebar();
  loadProject(p.id);
}

function newFromTemplate(tid) {
  const t = TEMPLATES.find(t => t.id === tid);
  if (!t) return;
  const p = createProjectFromTemplate(t, t.name + ' ' + (projects.filter(x=>x.name.startsWith(t.name)).length+1));
  projects.unshift(p);
  activeId = p.id;
  save();
  renderSidebar();
  loadProject(p.id);
  closeModal();
}

function deleteProject(id) {
  if (projects.length <= 1) return;
  if (!confirm('Delete this project?')) return;
  projects = projects.filter(p => p.id !== id);
  if (activeId === id) activeId = projects[0].id;
  save();
  renderSidebar();
  loadProject(activeId);
}

function loadProject(id) {
  activeId = id;
  const p = getProject();
  if (!p) return;
  document.getElementById('projName').value = p.name;
  renderSidebar();
  renderEditorTabs();
  loadTab(activeTab);
  scheduleRun();
}

// ── Editor Tabs ──
function renderEditorTabs() {
  const el = document.getElementById('editorTabs');
  el.innerHTML = TABS.map(t => `
    <div class="editor-tab${t===activeTab?' active':''}" onclick="switchTab('${t}')">
      <span class="lang-dot" style="background:${TAB_COLORS[t]}"></span>
      ${TAB_LABELS[t]}
    </div>
  `).join('') + `
    <div style="flex:1"></div>
    <div class="editor-tab" onclick="formatCode()" title="Format code" style="font-size:11px;color:var(--text2)">{ } Format</div>
  `;
}

function switchTab(tab) {
  saveCurrentTab();
  activeTab = tab;
  renderEditorTabs();
  loadTab(tab);
}

function saveCurrentTab() {
  const p = getProject();
  if (!p) return;
  p[activeTab] = document.getElementById('codeEditor').value;
}

function loadTab(tab) {
  const p = getProject();
  if (!p) return;
  const editor = document.getElementById('codeEditor');
  editor.value = p[tab] || '';
  updateLineNumbers();
  updateStatus();
}

// ── Line Numbers ──
function updateLineNumbers() {
  if (!settings.lineNumbers) {
    document.getElementById('lineNums').innerHTML = '';
    document.getElementById('codeEditor').classList.remove('with-lines');
    return;
  }
  document.getElementById('codeEditor').classList.add('with-lines');
  const lines = document.getElementById('codeEditor').value.split('\n').length;
  let html = '';
  for (let i = 1; i <= lines; i++) html += `<span>${i}</span>`;
  document.getElementById('lineNums').innerHTML = html;
}

// ── Status ──
function updateStatus() {
  const editor = document.getElementById('codeEditor');
  const val = editor.value;
  document.getElementById('statusLang').textContent = TAB_LABELS[activeTab];
  document.getElementById('statusLines').textContent = 'Lines: ' + val.split('\n').length;
  document.getElementById('statusChars').textContent = 'Chars: ' + val.length;
  document.getElementById('statusAutorun').textContent = 'Auto-run: ' + (settings.autoRun ? 'ON' : 'OFF');
}

// ── Editor Events ──
const editor = document.getElementById('codeEditor');
editor.addEventListener('input', () => {
  saveCurrentTab();
  updateLineNumbers();
  updateStatus();
  if (settings.autoRun) scheduleRun();
  save();
});

editor.addEventListener('scroll', () => {
  document.getElementById('lineNums').style.top = -editor.scrollTop + 'px';
});

editor.addEventListener('keydown', e => {
  // Tab key
  if (e.key === 'Tab' && !e.shiftKey) {
    e.preventDefault();
    const start = editor.selectionStart;
    const end = editor.selectionEnd;
    const spaces = ' '.repeat(settings.tabSize);
    editor.value = editor.value.substring(0,start) + spaces + editor.value.substring(end);
    editor.selectionStart = editor.selectionEnd = start + settings.tabSize;
    editor.dispatchEvent(new Event('input'));
  }
  // Auto-close brackets
  const pairs = {'(':')','[':']','{':'}','"':'"',"'":"'",'`':'`'};
  if (pairs[e.key]) {
    const start = editor.selectionStart;
    const end = editor.selectionEnd;
    if (start !== end) {
      e.preventDefault();
      const selected = editor.value.substring(start, end);
      editor.value = editor.value.substring(0,start) + e.key + selected + pairs[e.key] + editor.value.substring(end);
      editor.selectionStart = start + 1;
      editor.selectionEnd = end + 1;
      editor.dispatchEvent(new Event('input'));
    }
  }
  // Cmd+Enter to run
  if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
    e.preventDefault();
    run();
  }
});

// ── Run / Preview ──
let runTimer;
function scheduleRun() {
  clearTimeout(runTimer);
  runTimer = setTimeout(run, 400);
}

function run() {
  clearTimeout(runTimer);
  saveCurrentTab();
  const p = getProject();
  if (!p) return;
  
  const resourceTags = (p.resources || []).map(r => {
    if (r.type === 'css') return `<link rel="stylesheet" href="${esc(r.url)}">`;
    return `<script src="${esc(r.url)}"><\/script>`;
  }).join('\n');
  
  const consoleScript = `
<script>
(function(){
  const origLog = console.log, origWarn = console.warn, origError = console.error, origInfo = console.info;
  function send(type, args) {
    try {
      parent.postMessage({type:'console',level:type,data:Array.from(args).map(a=>{
        try{return typeof a==='object'?JSON.stringify(a,null,2):String(a)}catch(e){return String(a)}
      }).join(' ')}, '*');
    }catch(e){}
  }
  console.log = function(){send('log',arguments);origLog.apply(console,arguments);};
  console.warn = function(){send('warn',arguments);origWarn.apply(console,arguments);};
  console.error = function(){send('error',arguments);origError.apply(console,arguments);};
  console.info = function(){send('info',arguments);origInfo.apply(console,arguments);};
  window.onerror = function(msg,url,line,col,err){
    send('error',['Error: '+msg+' (line '+line+')']);
  };
  window.addEventListener('unhandledrejection',function(e){
    send('error',['Unhandled Promise: '+(e.reason&&e.reason.message||e.reason)]);
  });
})();
<\/script>`;
  
  const html = `<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
${resourceTags}
<style>${p.css || ''}</style>
${consoleScript}
</head>
<body>
${p.html || ''}
<script>${p.js || ''}<\/script>
</body>
</html>`;
  
  clearConsole();
  const frame = document.getElementById('previewFrame');
  frame.srcdoc = html;
}

function refreshPreview() { run(); }

// ── Console ──
window.addEventListener('message', e => {
  if (e.data && e.data.type === 'console') {
    addConsoleLine(e.data.level, e.data.data);
  }
});

function addConsoleLine(level, text) {
  consoleLines.push({level, text, time: new Date()});
  const body = document.getElementById('consoleBody');
  const ts = new Date().toLocaleTimeString('en',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'});
  body.innerHTML += `<div class="console-line ${level}"><span class="ts">${ts}</span>${esc(text)}</div>`;
  body.scrollTop = body.scrollHeight;
  const badge = document.getElementById('consoleBadge');
  const errCount = consoleLines.filter(l=>l.level==='error').length;
  if (errCount > 0) {
    badge.textContent = errCount;
    badge.style.display = 'inline';
  }
}

function clearConsole() {
  consoleLines = [];
  document.getElementById('consoleBody').innerHTML = '';
  document.getElementById('consoleBadge').style.display = 'none';
}

function toggleConsole() {
  const panel = document.getElementById('consolePanel');
  const body = document.getElementById('consoleBody');
  if (body.style.display === 'none') {
    body.style.display = 'block';
    panel.style.height = '120px';
  } else {
    body.style.display = 'none';
    panel.style.height = '28px';
  }
}

// ── Device Preview ──
function setDevice(d) {
  const wrapper = document.getElementById('previewWrapper');
  wrapper.className = 'preview-wrapper' + (d ? ' device-' + d : '');
  document.querySelectorAll('.device-btns button').forEach(b => b.classList.remove('active'));
  document.getElementById(d === 'mobile' ? 'devMob' : d === 'tablet' ? 'devTab' : 'devAuto').classList.add('active');
}

// ── Layout ──
function setLayout(layout) {
  settings.layout = layout;
  const area = document.getElementById('editorArea');
  const codePanel = document.getElementById('codePanel');
  const previewPanel = document.getElementById('previewPanel');
  const resizer = document.getElementById('resizer');
  
  area.style.flexDirection = layout === 'vertical' ? 'column' : 'row';
  resizer.style.display = (layout === 'editor-only' || layout === 'preview-only') ? 'none' : 'block';
  
  if (layout === 'vertical') {
    resizer.className = 'resizer-h';
    resizer.style.display = 'block';
    codePanel.style.display = 'flex';
    previewPanel.style.display = 'flex';
    codePanel.style.width = '100%';
    previewPanel.style.width = '100%';
  } else if (layout === 'editor-only') {
    codePanel.style.display = 'flex';
    previewPanel.style.display = 'none';
    codePanel.style.flex = '1';
  } else if (layout === 'preview-only') {
    codePanel.style.display = 'none';
    previewPanel.style.display = 'flex';
    previewPanel.style.flex = '1';
  } else {
    resizer.className = 'resizer';
    codePanel.style.display = 'flex';
    previewPanel.style.display = 'flex';
    codePanel.style.width = '';
    previewPanel.style.width = '';
    codePanel.style.flex = '1';
    previewPanel.style.flex = '1';
  }
  
  document.querySelectorAll('.layout-btns button').forEach(b => b.classList.remove('active'));
  document.getElementById(layout === 'horizontal' ? 'layH' : layout === 'vertical' ? 'layV' : layout === 'editor-only' ? 'layE' : 'layP').classList.add('active');
  save();
}

// ── Resizer ──
(function initResizer() {
  const resizer = document.getElementById('resizer');
  let startX, startWidth;
  
  resizer.addEventListener('mousedown', e => {
    e.preventDefault();
    startX = e.clientX;
    const codePanel = document.getElementById('codePanel');
    startWidth = codePanel.getBoundingClientRect().width;
    resizer.classList.add('active');
    
    function onMove(e) {
      const diff = e.clientX - startX;
      const newWidth = Math.max(200, startWidth + diff);
      const container = document.getElementById('editorArea').getBoundingClientRect().width;
      if (newWidth < container - 200) {
        document.getElementById('codePanel').style.flex = 'none';
        document.getElementById('codePanel').style.width = newWidth + 'px';
      }
    }
    
    function onUp() {
      resizer.classList.remove('active');
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    }
    
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
})();

// ── Console Resizer ──
(function initConsoleResizer() {
  const header = document.getElementById('consoleHeader');
  let startY, startHeight;
  
  header.addEventListener('mousedown', e => {
    if (e.target.tagName === 'BUTTON') return;
    e.preventDefault();
    startY = e.clientY;
    const panel = document.getElementById('consolePanel');
    startHeight = panel.getBoundingClientRect().height;
    
    function onMove(e) {
      const diff = startY - e.clientY;
      const newHeight = Math.max(28, Math.min(400, startHeight + diff));
      panel.style.height = newHeight + 'px';
      if (newHeight <= 28) {
        document.getElementById('consoleBody').style.display = 'none';
      } else {
        document.getElementById('consoleBody').style.display = 'block';
      }
    }
    
    function onUp() {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    }
    
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
})();

// ── Format Code ──
function formatCode() {
  const editor = document.getElementById('codeEditor');
  let code = editor.value;
  
  if (activeTab === 'js') {
    // Basic JS formatting: fix indentation
    code = basicJSFormat(code);
  } else if (activeTab === 'css') {
    code = basicCSSFormat(code);
  } else {
    code = basicHTMLFormat(code);
  }
  
  editor.value = code;
  editor.dispatchEvent(new Event('input'));
}

function basicJSFormat(code) {
  // Simple indent normalizer
  const lines = code.split('\n');
  let indent = 0;
  const tab = ' '.repeat(settings.tabSize);
  return lines.map(line => {
    const trimmed = line.trim();
    if (!trimmed) return '';
    if (trimmed.startsWith('}') || trimmed.startsWith(']') || trimmed.startsWith(')')) indent = Math.max(0, indent - 1);
    const result = tab.repeat(indent) + trimmed;
    if (trimmed.endsWith('{') || trimmed.endsWith('[') || trimmed.endsWith('(')) indent++;
    return result;
  }).join('\n');
}

function basicCSSFormat(code) {
  // Format CSS
  return code
    .replace(/\s*{\s*/g, ' {\n  ')
    .replace(/\s*}\s*/g, '\n}\n')
    .replace(/;\s*/g, ';\n  ')
    .replace(/\n  \n}/g, '\n}')
    .replace(/\n{3,}/g, '\n\n')
    .trim();
}

function basicHTMLFormat(code) {
  const lines = code.split('\n');
  const tab = ' '.repeat(settings.tabSize);
  let indent = 0;
  const selfClose = /^<(area|base|br|col|embed|hr|img|input|link|meta|param|source|track|wbr)\b/i;
  const closing = /^<\//;
  const opening = /^<[a-zA-Z]/;
  
  return lines.map(line => {
    const trimmed = line.trim();
    if (!trimmed) return '';
    if (closing.test(trimmed)) indent = Math.max(0, indent - 1);
    const result = tab.repeat(indent) + trimmed;
    if (opening.test(trimmed) && !selfClose.test(trimmed) && !closing.test(trimmed) && !trimmed.includes('</')) {
      indent++;
    }
    return result;
  }).join('\n');
}

// ── Export ──
function exportHTML() {
  saveCurrentTab();
  const p = getProject();
  if (!p) return;
  
  const resourceTags = (p.resources || []).map(r => {
    if (r.type === 'css') return `<link rel="stylesheet" href="${r.url}">`;
    return `<script src="${r.url}"><\/script>`;
  }).join('\n  ');
  
  const html = `<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>${esc(p.name)}</title>
  ${resourceTags}
  <style>
${p.css}
  </style>
</head>
<body>
${p.html}
  <script>
${p.js}
  <\/script>
</body>
</html>`;
  
  downloadFile(p.name.replace(/[^a-z0-9]/gi, '-').toLowerCase() + '.html', html, 'text/html');
}

function downloadFile(name, content, type) {
  const blob = new Blob([content], {type});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = name;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ── Export/Import JSON ──
function exportJSON() {
  downloadFile('code-playground-backup.json', JSON.stringify(projects, null, 2), 'application/json');
}

function importJSON(file) {
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const data = JSON.parse(reader.result);
      if (Array.isArray(data)) {
        data.forEach(p => {
          if (!projects.find(x => x.id === p.id)) projects.push(p);
        });
      }
      save(); renderSidebar();
      if (data.length) loadProject(data[0].id);
    } catch (e) { alert('Invalid JSON file'); }
  };
  reader.readAsText(file);
}

function addResource() {
  const p = getProject();
  p.resources.push({type:'js',url:''});
  save();
  openResources();
}

function removeResource(i) {
  const p = getProject();
  p.resources.splice(i, 1);
  save();
  openResources();
}

function updateResource(i, key, val) {
  const p = getProject();
  p.resources[i][key] = val;
  save();
  if (settings.autoRun) scheduleRun();
}

function quickAdd(type, url) {
  const p = getProject();
  if (!p.resources) p.resources = [];
  if (!p.resources.find(r => r.url === url)) {
    p.resources.push({type, url});
    save();
    if (settings.autoRun) scheduleRun();
  }
  openResources();
}

// ── Sidebar Toggle ──
function toggleSidebar() {
  settings.sidebarOpen = !settings.sidebarOpen;
  document.getElementById('sidebar').classList.toggle('hidden', !settings.sidebarOpen);
  save();
}

// ── Apply Settings ──
function applySettings() {
  const editor = document.getElementById('codeEditor');
  editor.style.fontSize = settings.fontSize + 'px';
  document.getElementById('lineNums').style.fontSize = settings.fontSize + 'px';
  editor.style.whiteSpace = settings.wordWrap ? 'pre-wrap' : 'pre';
  editor.style.wordBreak = settings.wordWrap ? 'break-all' : 'normal';
  setLayout(settings.layout);
  if (!settings.sidebarOpen) document.getElementById('sidebar').classList.add('hidden');
}

// ── Project Name ──
document.getElementById('projName').addEventListener('change', function() {
  const p = getProject();
  if (p) {
    p.name = this.value || 'Untitled';
    save();
    renderSidebar();
  }
});

// ── Global Keyboard Shortcuts ──
document.addEventListener('keydown', e => {
  const mod = e.metaKey || e.ctrlKey;
  
  if (e.key === 'Escape') {
    closeModal();
    return;
  }
  
  // Don't intercept when focus is in modals
  if (document.getElementById('modalOverlay').style.display === 'flex') return;
  
  if (mod && e.key === 'Enter') {
    e.preventDefault();
    run();
  } else if (mod && e.key === '1') {
    e.preventDefault();
    switchTab('html');
  } else if (mod && e.key === '2') {
    e.preventDefault();
    switchTab('css');
  } else if (mod && e.key === '3') {
    e.preventDefault();
    switchTab('js');
  } else if (mod && e.key === 'b') {
    e.preventDefault();
    toggleSidebar();
  } else if (mod && e.key === 'e' && !e.shiftKey) {
    e.preventDefault();
    exportHTML();
  } else if (mod && e.shiftKey && e.key === 'F') {
    e.preventDefault();
    formatCode();
  } else if (mod && e.key === 't') {
    e.preventDefault();
    openTemplates();
  } else if (mod && e.key === ',') {
    e.preventDefault();
    openSettings();
  } else if (mod && e.key === 'n') {
    // Only intercept if not in editor
    if (document.activeElement !== document.getElementById('codeEditor')) {
      e.preventDefault();
      newProject();
    }
  }
});

// ── Escape helper ──
function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
