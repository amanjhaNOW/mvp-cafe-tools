<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Competitor Radar — Competitive Intelligence Tracker</title>
<style>
:root {
  --bg: #f5f5f5; --surface: #fff; --surface2: #f0f0f0; --text: #1a1a1a; --text2: #666;
  --border: #e0e0e0; --accent: #4f46e5; --accent2: #7c3aed; --accent-bg: #eef2ff;
  --green: #10b981; --red: #ef4444; --amber: #f59e0b; --blue: #3b82f6;
  --green-bg: #ecfdf5; --red-bg: #fef2f2; --amber-bg: #fffbeb; --blue-bg: #eff6ff;
  --shadow: 0 1px 3px rgba(0,0,0,.08); --shadow2: 0 4px 12px rgba(0,0,0,.1);
  --radius: 10px; --radius2: 14px;
}
.dark {
  --bg: #0f0f0f; --surface: #1a1a1a; --surface2: #252525; --text: #e5e5e5; --text2: #999;
  --border: #333; --accent: #818cf8; --accent2: #a78bfa; --accent-bg: #1e1b4b;
  --green-bg: #052e16; --red-bg: #450a0a; --amber-bg: #451a03; --blue-bg: #172554;
  --shadow: 0 1px 3px rgba(0,0,0,.3); --shadow2: 0 4px 12px rgba(0,0,0,.4);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
button { cursor:pointer; font-family:inherit; border:none; background:none; color:inherit; }
input, textarea, select { font-family:inherit; color:var(--text); background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:8px 12px; font-size:14px; width:100%; outline:none; transition:border .2s; }
input:focus, textarea:focus, select:focus { border-color:var(--accent); }
textarea { resize:vertical; min-height:60px; }

/* Header */
.header { background:var(--surface); border-bottom:1px solid var(--border); padding:12px 24px; display:flex; align-items:center; gap:16px; position:sticky; top:0; z-index:100; }
.logo { font-size:20px; font-weight:700; display:flex; align-items:center; gap:8px; white-space:nowrap; }
.logo span { color:var(--accent); }
.header-actions { display:flex; gap:8px; margin-left:auto; align-items:center; }
.search-box { position:relative; width:220px; }
.search-box input { padding-left:32px; }
.search-box svg { position:absolute; left:10px; top:50%; transform:translateY(-50%); width:14px; height:14px; color:var(--text2); }

/* Tabs */
.tabs { display:flex; gap:4px; background:var(--surface2); padding:4px; border-radius:10px; }
.tab { padding:6px 14px; border-radius:8px; font-size:13px; font-weight:500; color:var(--text2); transition:all .2s; white-space:nowrap; }
.tab:hover { color:var(--text); }
.tab.active { background:var(--surface); color:var(--accent); box-shadow:var(--shadow); }

/* Buttons */
.btn { padding:8px 16px; border-radius:8px; font-size:13px; font-weight:500; display:inline-flex; align-items:center; gap:6px; transition:all .2s; }
.btn-primary { background:var(--accent); color:#fff; }
.btn-primary:hover { opacity:.9; transform:translateY(-1px); }
.btn-secondary { background:var(--surface2); color:var(--text); border:1px solid var(--border); }
.btn-secondary:hover { border-color:var(--accent); }
.btn-sm { padding:5px 10px; font-size:12px; }
.btn-icon { width:32px; height:32px; display:flex; align-items:center; justify-content:center; border-radius:8px; }
.btn-icon:hover { background:var(--surface2); }
.btn-danger { color:var(--red); }
.btn-danger:hover { background:var(--red-bg); }

/* Layout */
.main { padding:20px 24px; max-width:1400px; margin:0 auto; }

/* Cards */
.card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius2); padding:20px; box-shadow:var(--shadow); }
.card-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(340px, 1fr)); gap:16px; }

/* Competitor Card */
.comp-card { cursor:pointer; transition:all .2s; position:relative; }
.comp-card:hover { box-shadow:var(--shadow2); transform:translateY(-2px); }
.comp-card-header { display:flex; align-items:flex-start; gap:12px; margin-bottom:12px; }
.comp-avatar { width:44px; height:44px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:18px; font-weight:700; color:#fff; flex-shrink:0; }
.comp-name { font-size:16px; font-weight:600; }
.comp-tagline { font-size:12px; color:var(--text2); margin-top:2px; }
.comp-meta { display:flex; gap:12px; flex-wrap:wrap; margin:12px 0; }
.comp-meta-item { font-size:12px; color:var(--text2); display:flex; align-items:center; gap:4px; }
.comp-tags { display:flex; gap:6px; flex-wrap:wrap; }
.threat-badge { font-size:11px; font-weight:600; padding:3px 8px; border-radius:6px; }
.threat-high { background:var(--red-bg); color:var(--red); }
.threat-medium { background:var(--amber-bg); color:var(--amber); }
.threat-low { background:var(--green-bg); color:var(--green); }
.threat-watch { background:var(--blue-bg); color:var(--blue); }
.comp-strengths { margin-top:10px; font-size:12px; }
.comp-strengths span { color:var(--text2); }
.comp-card-actions { position:absolute; top:12px; right:12px; display:flex; gap:2px; opacity:0; transition:opacity .2s; }
.comp-card:hover .comp-card-actions { opacity:1; }

/* Feature Matrix */
.matrix-wrap { overflow-x:auto; }
.matrix { width:100%; border-collapse:collapse; font-size:13px; }
.matrix th, .matrix td { padding:10px 14px; text-align:left; border-bottom:1px solid var(--border); }
.matrix th { background:var(--surface2); font-weight:600; position:sticky; top:0; white-space:nowrap; }
.matrix th:first-child { position:sticky; left:0; z-index:2; background:var(--surface2); }
.matrix td:first-child { position:sticky; left:0; background:var(--surface); font-weight:500; white-space:nowrap; z-index:1; }
.matrix tr:hover td { background:var(--accent-bg); }
.matrix .has-feature { color:var(--green); font-weight:600; }
.matrix .no-feature { color:var(--red); }
.matrix .partial-feature { color:var(--amber); }

/* Positioning Map */
.pos-map-container { position:relative; width:100%; aspect-ratio:1; max-width:700px; margin:0 auto; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius2); overflow:hidden; }
.pos-map-axis { position:absolute; color:var(--text2); font-size:11px; font-weight:500; }
.pos-map-axis.x-label { bottom:8px; left:50%; transform:translateX(-50%); }
.pos-map-axis.y-label { left:8px; top:50%; transform:translateY(-50%) rotate(-90deg); transform-origin:center; }
.pos-map-axis.x-low { bottom:8px; left:12px; }
.pos-map-axis.x-high { bottom:8px; right:12px; }
.pos-map-axis.y-low { left:12px; bottom:28px; }
.pos-map-axis.y-high { left:12px; top:12px; }
.pos-map-grid { position:absolute; inset:40px; }
.pos-map-line-h, .pos-map-line-v { position:absolute; background:var(--border); }
.pos-map-line-h { height:1px; width:100%; top:50%; left:0; }
.pos-map-line-v { width:1px; height:100%; left:50%; top:0; }
.pos-dot { position:absolute; width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; color:#fff; cursor:grab; transition:box-shadow .2s; z-index:5; transform:translate(-50%,-50%); }
.pos-dot:hover { box-shadow:0 0 0 4px rgba(79,70,229,.3); z-index:10; }
.pos-dot-label { position:absolute; top:40px; left:50%; transform:translateX(-50%); font-size:10px; color:var(--text); white-space:nowrap; background:var(--surface); padding:2px 6px; border-radius:4px; border:1px solid var(--border); }
.pos-quadrant-label { position:absolute; font-size:10px; color:var(--text2); opacity:.5; font-weight:500; }

/* SWOT */
.swot-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.swot-box { padding:16px; border-radius:var(--radius); min-height:120px; }
.swot-box h4 { font-size:13px; font-weight:600; margin-bottom:8px; display:flex; align-items:center; gap:6px; }
.swot-strengths { background:var(--green-bg); }
.swot-strengths h4 { color:var(--green); }
.swot-weaknesses { background:var(--red-bg); }
.swot-weaknesses h4 { color:var(--red); }
.swot-opportunities { background:var(--blue-bg); }
.swot-opportunities h4 { color:var(--blue); }
.swot-threats { background:var(--amber-bg); }
.swot-threats h4 { color:var(--amber); }
.swot-list { list-style:none; font-size:13px; line-height:1.8; }
.swot-list li::before { content:'•'; margin-right:6px; }

/* Battle Card */
.battle-card { page-break-inside:avoid; }
.battle-section { margin-bottom:16px; }
.battle-section h4 { font-size:13px; font-weight:600; color:var(--accent); margin-bottom:8px; padding-bottom:4px; border-bottom:1px solid var(--border); }
.battle-table { width:100%; font-size:13px; border-collapse:collapse; }
.battle-table td { padding:6px 10px; border-bottom:1px solid var(--border); }
.battle-table td:first-child { font-weight:500; width:35%; color:var(--text2); }
.win-point { color:var(--green); font-size:13px; line-height:1.8; }
.lose-point { color:var(--red); font-size:13px; line-height:1.8; }

/* News Log */
.news-item { padding:12px 0; border-bottom:1px solid var(--border); display:flex; gap:12px; align-items:flex-start; }
.news-item:last-child { border-bottom:none; }
.news-date { font-size:11px; color:var(--text2); white-space:nowrap; min-width:70px; padding-top:2px; }
.news-type { font-size:10px; font-weight:600; padding:2px 6px; border-radius:4px; white-space:nowrap; }
.news-type.pricing { background:var(--amber-bg); color:var(--amber); }
.news-type.feature { background:var(--green-bg); color:var(--green); }
.news-type.funding { background:var(--blue-bg); color:var(--blue); }
.news-type.hire { background:var(--accent-bg); color:var(--accent); }
.news-type.partnership { background:#faf5ff; color:#9333ea; }
.dark .news-type.partnership { background:#2e1065; }
.news-content { font-size:13px; flex:1; }
.news-source { font-size:11px; color:var(--text2); margin-top:2px; }

/* Stats */
.stats-row { display:grid; grid-template-columns:repeat(auto-fit, minmax(140px, 1fr)); gap:12px; margin-bottom:20px; }
.stat-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:14px; text-align:center; }
.stat-value { font-size:24px; font-weight:700; color:var(--accent); }
.stat-label { font-size:11px; color:var(--text2); margin-top:4px; }

/* Modal */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:1000; display:flex; align-items:center; justify-content:center; padding:20px; opacity:0; visibility:hidden; transition:all .2s; }
.modal-overlay.open { opacity:1; visibility:visible; }
.modal { background:var(--surface); border-radius:var(--radius2); width:100%; max-width:640px; max-height:85vh; overflow-y:auto; padding:24px; box-shadow:var(--shadow2); }
.modal-lg { max-width:900px; }
.modal h3 { font-size:18px; font-weight:600; margin-bottom:16px; }
.form-group { margin-bottom:14px; }
.form-group label { display:block; font-size:12px; font-weight:500; color:var(--text2); margin-bottom:4px; }
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.form-row-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; }
.modal-actions { display:flex; gap:8px; justify-content:flex-end; margin-top:20px; padding-top:16px; border-top:1px solid var(--border); }

/* Detail View */
.detail-header { display:flex; align-items:flex-start; gap:16px; margin-bottom:24px; }
.detail-avatar { width:60px; height:60px; border-radius:14px; display:flex; align-items:center; justify-content:center; font-size:24px; font-weight:700; color:#fff; flex-shrink:0; }
.detail-title { font-size:22px; font-weight:700; }
.detail-tagline { color:var(--text2); margin-top:2px; }
.detail-tabs { display:flex; gap:4px; margin-bottom:20px; flex-wrap:wrap; }
.detail-tab { padding:8px 16px; border-radius:8px; font-size:13px; font-weight:500; color:var(--text2); background:var(--surface2); }
.detail-tab.active { background:var(--accent-bg); color:var(--accent); }

/* Feature Input */
.feature-row { display:flex; gap:8px; align-items:center; margin-bottom:6px; }
.feature-row input { flex:1; }
.feature-status-btn { width:28px; height:28px; border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:14px; border:1px solid var(--border); flex-shrink:0; }

/* Empty State */
.empty { text-align:center; padding:60px 20px; color:var(--text2); }
.empty-icon { font-size:48px; margin-bottom:12px; }
.empty h3 { font-size:18px; color:var(--text); margin-bottom:8px; }

/* Responsive */
@media(max-width:768px) {
  .header { padding:10px 14px; gap:8px; flex-wrap:wrap; }
  .search-box { width:100%; order:10; }
  .main { padding:14px; }
  .card-grid { grid-template-columns:1fr; }
  .form-row, .form-row-3 { grid-template-columns:1fr; }
  .swot-grid { grid-template-columns:1fr; }
  .pos-map-container { aspect-ratio:auto; height:400px; }
}

/* Print */
@media print {
  .header, .modal-overlay { display:none; }
  .main { padding:0; }
  body { background:#fff; }
  .card { box-shadow:none; border:1px solid #ddd; }
}

/* Kbd hints */
.kbd { font-size:10px; background:var(--surface2); border:1px solid var(--border); border-radius:4px; padding:1px 5px; font-family:monospace; color:var(--text2); margin-left:4px; }

/* Scrollbar */
::-webkit-scrollbar { width:6px; height:6px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
::-webkit-scrollbar-thumb:hover { background:var(--text2); }
</style>
</head>
<body>
<div class="header">
  <div class="logo">📡 <span>Competitor Radar</span></div>
  <div class="tabs" id="mainTabs">
    <button class="tab active" data-view="overview" onclick="switchView('overview')">Overview<span class="kbd">1</span></button>
    <button class="tab" data-view="matrix" onclick="switchView('matrix')">Feature Matrix<span class="kbd">2</span></button>
    <button class="tab" data-view="map" onclick="switchView('map')">Position Map<span class="kbd">3</span></button>
    <button class="tab" data-view="battlecards" onclick="switchView('battlecards')">Battle Cards<span class="kbd">4</span></button>
    <button class="tab" data-view="news" onclick="switchView('news')">Intel Feed<span class="kbd">5</span></button>
  </div>
  <div class="header-actions">
    <div class="search-box">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      <input type="text" id="searchInput" placeholder="Search... (/)" onkeyup="handleSearch(this.value)">
    </div>
    <button class="btn btn-primary" onclick="openAddCompetitor()">+ Add<span class="kbd">N</span></button>
    <button class="btn-icon" onclick="toggleDark()" title="Toggle dark mode (D)">🌓</button>
    <button class="btn-icon" onclick="exportData()" title="Export (E)">📤</button>
    <button class="btn-icon" onclick="importData()" title="Import">📥</button>
  </div>
</div>

<div class="main" id="mainContent"></div>

<!-- Add/Edit Competitor Modal -->
<div class="modal-overlay" id="compModal">
  <div class="modal modal-lg">
    <h3 id="compModalTitle">Add Competitor</h3>
    <input type="hidden" id="compId">
    <div class="form-row">
      <div class="form-group"><label>Company Name *</label><input id="compName" placeholder="e.g. Mailchimp"></div>
      <div class="form-group"><label>Website</label><input id="compUrl" placeholder="https://..."></div>
    </div>
    <div class="form-group"><label>Tagline / One-liner</label><input id="compTagline" placeholder="What they say they do"></div>
    <div class="form-row-3">
      <div class="form-group"><label>Threat Level</label>
        <select id="compThreat"><option value="high">🔴 High</option><option value="medium" selected>🟡 Medium</option><option value="low">🟢 Low</option><option value="watch">🔵 Watch</option></select>
      </div>
      <div class="form-group"><label>Pricing (starting)</label><input id="compPricing" placeholder="e.g. $29/mo"></div>
      <div class="form-group"><label>Founded</label><input id="compFounded" placeholder="e.g. 2020"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Funding</label><input id="compFunding" placeholder="e.g. Series A - $10M"></div>
      <div class="form-group"><label>Team Size</label><input id="compTeamSize" placeholder="e.g. 50-100"></div>
    </div>
    <div class="form-group"><label>Target Audience</label><input id="compAudience" placeholder="Who they sell to"></div>
    <div class="form-group"><label>Key Strengths (one per line)</label><textarea id="compStrengths" rows="3" placeholder="Brand recognition&#10;Large customer base&#10;Deep integrations"></textarea></div>
    <div class="form-group"><label>Key Weaknesses (one per line)</label><textarea id="compWeaknesses" rows="3" placeholder="Expensive at scale&#10;Slow to ship&#10;Legacy tech"></textarea></div>
    <div class="form-group"><label>Opportunities Against Them (one per line)</label><textarea id="compOpportunities" rows="2" placeholder="Underserved SMB segment&#10;Better UX possible"></textarea></div>
    <div class="form-group"><label>Threats From Them (one per line)</label><textarea id="compThreats" rows="2" placeholder="Could add our features&#10;Bigger marketing budget"></textarea></div>
    <div class="form-row">
      <div class="form-group"><label>Position X (Market Reach: 0-100)</label><input type="number" id="compPosX" min="0" max="100" value="50"></div>
      <div class="form-group"><label>Position Y (Product Depth: 0-100)</label><input type="number" id="compPosY" min="0" max="100" value="50"></div>
    </div>
    <div class="form-group"><label>Color</label>
      <div style="display:flex;gap:6px;flex-wrap:wrap;" id="colorPicker"></div>
    </div>
    <div class="form-group"><label>Notes</label><textarea id="compNotes" rows="2" placeholder="General notes, strategy observations..."></textarea></div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal('compModal')">Cancel<span class="kbd">Esc</span></button>
      <button class="btn btn-primary" onclick="saveCompetitor()">Save</button>
    </div>
  </div>
</div>

<!-- Feature Modal -->
<div class="modal-overlay" id="featureModal">
  <div class="modal">
    <h3>Manage Features</h3>
    <p style="font-size:13px;color:var(--text2);margin-bottom:14px;">Add features to compare across competitors. Set status per competitor in their edit form.</p>
    <div id="featureList"></div>
    <div style="display:flex;gap:8px;margin-top:12px;">
      <input id="newFeatureName" placeholder="New feature name..." onkeydown="if(event.key==='Enter')addFeature()">
      <input id="newFeatureCategory" placeholder="Category" style="width:140px;" onkeydown="if(event.key==='Enter')addFeature()">
      <button class="btn btn-primary btn-sm" onclick="addFeature()">Add</button>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal('featureModal')">Close</button>
    </div>
  </div>
</div>

<!-- News Modal -->
<div class="modal-overlay" id="newsModal">
  <div class="modal">
    <h3 id="newsModalTitle">Add Intel</h3>
    <input type="hidden" id="newsId">
    <div class="form-group"><label>Competitor</label>
      <select id="newsCompetitor"></select>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Type</label>
        <select id="newsType"><option value="feature">🚀 Feature</option><option value="pricing">💰 Pricing</option><option value="funding">💎 Funding</option><option value="hire">👤 Hire</option><option value="partnership">🤝 Partnership</option></select>
      </div>
      <div class="form-group"><label>Date</label><input type="date" id="newsDate"></div>
    </div>
    <div class="form-group"><label>Update</label><textarea id="newsContent" rows="3" placeholder="What happened?"></textarea></div>
    <div class="form-group"><label>Source URL</label><input id="newsSource" placeholder="https://..."></div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal('newsModal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveNews()">Save</button>
    </div>
  </div>
</div>

<!-- Detail View Modal -->
<div class="modal-overlay" id="detailModal">
  <div class="modal modal-lg" id="detailContent"></div>
</div>

<input type="file" id="importFile" accept=".json" style="display:none" onchange="handleImport(event)">

<script>
const COLORS = ['#4f46e5','#7c3aed','#ec4899','#ef4444','#f59e0b','#10b981','#3b82f6','#6366f1','#8b5cf6','#14b8a6','#f97316','#06b6d4'];
const STORAGE_KEY = 'competitor-radar-data';

let state = {
  competitors: [],
  features: [],
  news: [],
  currentView: 'overview',
  searchQuery: '',
  selectedColor: COLORS[0]
};

function init() {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) {
    try { state = { ...state, ...JSON.parse(saved) }; } catch(e) {}
  }
  if (!state.competitors.length) seedData();
  initColorPicker();
  render();
  if (localStorage.getItem('cr-dark') === 'true') document.body.classList.add('dark');
}

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({ competitors: state.competitors, features: state.features, news: state.news }));
}

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,8); }

function seedData() {
  // Seed with UTMStamp competitors
  state.features = [
    { id: uid(), name: 'Email Signature Templates', category: 'Core' },
    { id: uid(), name: 'UTM Tracking', category: 'Analytics' },
    { id: uid(), name: 'Click Analytics', category: 'Analytics' },
    { id: uid(), name: 'Team Management', category: 'Admin' },
    { id: uid(), name: 'Google Workspace Integration', category: 'Integrations' },
    { id: uid(), name: 'Campaign Banners', category: 'Marketing' },
    { id: uid(), name: 'A/B Testing', category: 'Analytics' },
    { id: uid(), name: 'API Access', category: 'Developer' },
    { id: uid(), name: 'White Label', category: 'Enterprise' },
    { id: uid(), name: 'Video Signatures', category: 'Core' },

function render() {
  const v = state.currentView;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.view === v));

}

let dragId = null;
function startDrag(e, id) {
  e.preventDefault();
  dragId = id;
  const onMove = (ev) => {
    const map = document.getElementById('posMap');
    const rect = map.getBoundingClientRect();
    const clientX = ev.touches ? ev.touches[0].clientX : ev.clientX;
    const clientY = ev.touches ? ev.touches[0].clientY : ev.clientY;
    let x = ((clientX - rect.left) / rect.width) * 100;
    let y = (1 - (clientY - rect.top) / rect.height) * 100;
    x = Math.max(5, Math.min(95, x));
    y = Math.max(5, Math.min(95, y));
    const comp = state.competitors.find(c => c.id === dragId);
    if (comp) {
      comp.posX = Math.round(x);
      comp.posY = Math.round(y);
      const dot = document.getElementById('dot-' + dragId);
      if (dot) { dot.style.left = x + '%'; dot.style.top = (100-y) + '%'; }
    }
  };
  const onUp = () => {
    save();
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
    document.removeEventListener('touchmove', onMove);
    document.removeEventListener('touchend', onUp);
    dragId = null;
  };
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
  document.addEventListener('touchmove', onMove);
  document.addEventListener('touchend', onUp);
}

  const parseLines = (id) => document.getElementById(id).value.split('\n').map(s=>s.trim()).filter(Boolean);

    name, url: document.getElementById('compUrl').value.trim(),
    tagline: document.getElementById('compTagline').value.trim(),
    threat: document.getElementById('compThreat').value,
    pricing: document.getElementById('compPricing').value.trim(),
    founded: document.getElementById('compFounded').value.trim(),
    funding: document.getElementById('compFunding').value.trim(),
    teamSize: document.getElementById('compTeamSize').value.trim(),
    audience: document.getElementById('compAudience').value.trim(),
    strengths: parseLines('compStrengths'),
    weaknesses: parseLines('compWeaknesses'),
    opportunities: parseLines('compOpportunities'),
    threats: parseLines('compThreats'),
    posX: parseInt(document.getElementById('compPosX').value)||50,
    posY: parseInt(document.getElementById('compPosY').value)||50,
    color: state.selectedColor,
    notes: document.getElementById('compNotes').value.trim(),
  };

  const id = document.getElementById('compId').value;
  if (id) {
    const idx = state.competitors.findIndex(c => c.id === id);
    if (idx >= 0) state.competitors[idx] = { ...state.competitors[idx], ...data };
  } else {
    data.id = uid();
    data.featureStatus = {};
    state.competitors.push(data);
  }
  save(); closeModal('compModal'); render();
}

function deleteCompetitor(id) {
  if (!confirm('Delete this competitor?')) return;
  state.competitors = state.competitors.filter(c => c.id !== id);
  state.news = state.news.filter(n => n.competitorId !== id);
  save(); render();
}

// Features
function openFeatureManager() {
  renderFeatureList();
  openModal('featureModal');
}

function renderFeatureList() {
  const categories = [...new Set(state.features.map(f => f.category))];
  document.getElementById('featureList').innerHTML = categories.map(cat => `
    <div style="margin-bottom:12px;">
      <div style="font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;margin-bottom:4px;">${esc(cat)}</div>
      ${state.features.filter(f=>f.category===cat).map(f => `
        <div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);">
          <span style="flex:1;font-size:13px;">${esc(f.name)}</span>
          <div style="display:flex;gap:2px;">
            ${state.competitors.map(c => {
              const s = c.featureStatus?.[f.id]||'no';
              const next = s==='no'?'partial':s==='partial'?'yes':'no';
              const icon = s==='yes'?'✅':s==='partial'?'⚡':'❌';
              return `<button class="feature-status-btn" onclick="toggleFeatureStatus('${c.id}','${f.id}','${next}')" title="${esc(c.name)}: ${s}" style="font-size:10px;">${icon}</button>`;
            }).join('')}
          </div>
          <button class="btn-icon btn-sm btn-danger" onclick="deleteFeature('${f.id}')" style="font-size:11px;">×</button>
        </div>
      `).join('')}
    </div>
  `).join('') || '<p style="color:var(--text2);font-size:13px;">No features yet</p>';
}

function addFeature() {
  const name = document.getElementById('newFeatureName').value.trim();
  const category = document.getElementById('newFeatureCategory').value.trim() || 'General';
  if (!name) return;
  state.features.push({ id: uid(), name, category });
  document.getElementById('newFeatureName').value = '';
  save(); renderFeatureList();
}

function deleteFeature(id) {
  state.features = state.features.filter(f => f.id !== id);
  state.competitors.forEach(c => { if(c.featureStatus) delete c.featureStatus[id]; });
  save(); renderFeatureList();
}

function toggleFeatureStatus(compId, featId, newStatus) {
  const comp = state.competitors.find(c => c.id === compId);
  if (comp) {
    if (!comp.featureStatus) comp.featureStatus = {};
    comp.featureStatus[featId] = newStatus;
    save(); renderFeatureList();
  }
}

// News
function openAddNews() {
  document.getElementById('newsModalTitle').textContent = 'Add Intel';
  document.getElementById('newsId').value = '';
  document.getElementById('newsContent').value = '';
  document.getElementById('newsSource').value = '';
  document.getElementById('newsDate').value = new Date().toISOString().slice(0,10);
  const sel = document.getElementById('newsCompetitor');
  sel.innerHTML = state.competitors.map(c => `<option value="${c.id}">${esc(c.name)}</option>`).join('');
  openModal('newsModal');
}

function saveNews() {
  const content = document.getElementById('newsContent').value.trim();
  if (!content) return alert('Content required');
  const data = {
    id: document.getElementById('newsId').value || uid(),
    competitorId: document.getElementById('newsCompetitor').value,
    type: document.getElementById('newsType').value,
    date: document.getElementById('newsDate').value,
    content,
    source: document.getElementById('newsSource').value.trim()
  };
  const idx = state.news.findIndex(n => n.id === data.id);
  if (idx >= 0) state.news[idx] = data; else state.news.push(data);
  save(); closeModal('newsModal'); render();
}

function deleteNews(id) {
  state.news = state.news.filter(n => n.id !== id);
  save(); render();
}

// Detail View
function showDetail(id) {
  const c = state.competitors.find(x => x.id === id);
  if (!c) return;
  
  const newsForComp = state.news.filter(n => n.competitorId === id).sort((a,b) => b.date.localeCompare(a.date));
  
  document.getElementById('detailContent').innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:flex-start;">
      <div class="detail-header">
        <div class="detail-avatar" style="background:${c.color}">${c.name.charAt(0)}</div>
        <div>
          <div class="detail-title">${esc(c.name)}</div>
          <div class="detail-tagline">${esc(c.tagline||'')}</div>
          <div style="margin-top:6px;display:flex;gap:8px;flex-wrap:wrap;">
            <span class="threat-badge threat-${c.threat}">${c.threat.toUpperCase()}</span>
            ${c.url ? `<a href="${esc(c.url)}" target="_blank" style="font-size:12px;color:var(--accent);">🔗 ${c.url}</a>` : ''}
          </div>
        </div>
      </div>
      <button class="btn-icon" onclick="closeModal('detailModal')" style="font-size:18px;">✕</button>
    </div>
    
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px;margin-bottom:20px;">
      <div class="stat-card"><div class="stat-value" style="font-size:16px;">${esc(c.pricing||'?')}</div><div class="stat-label">Pricing</div></div>
      <div class="stat-card"><div class="stat-value" style="font-size:16px;">${esc(c.teamSize||'?')}</div><div class="stat-label">Team Size</div></div>
      <div class="stat-card"><div class="stat-value" style="font-size:16px;">${esc(c.founded||'?')}</div><div class="stat-label">Founded</div></div>
      <div class="stat-card"><div class="stat-value" style="font-size:16px;">${esc(c.funding||'?')}</div><div class="stat-label">Funding</div></div>
    </div>

    ${c.audience ? `<div style="font-size:13px;color:var(--text2);margin-bottom:16px;"><strong>Target:</strong> ${esc(c.audience)}</div>` : ''}

    <div class="swot-grid" style="margin-bottom:20px;">
      <div class="swot-box swot-strengths"><h4>💪 Strengths</h4><ul class="swot-list">${(c.strengths||[]).map(s=>`<li>${esc(s)}</li>`).join('')||'<li style="color:var(--text2)">None added</li>'}</ul></div>
      <div class="swot-box swot-weaknesses"><h4>🎯 Weaknesses</h4><ul class="swot-list">${(c.weaknesses||[]).map(s=>`<li>${esc(s)}</li>`).join('')||'<li style="color:var(--text2)">None added</li>'}</ul></div>
      <div class="swot-box swot-opportunities"><h4>🚀 Opportunities</h4><ul class="swot-list">${(c.opportunities||[]).map(s=>`<li>${esc(s)}</li>`).join('')||'<li style="color:var(--text2)">None added</li>'}</ul></div>
      <div class="swot-box swot-threats"><h4>⚠️ Threats</h4><ul class="swot-list">${(c.threats||[]).map(s=>`<li>${esc(s)}</li>`).join('')||'<li style="color:var(--text2)">None added</li>'}</ul></div>
    </div>

    ${c.notes ? `<div class="card" style="margin-bottom:20px;"><h4 style="font-size:13px;color:var(--text2);margin-bottom:6px;">📝 Notes</h4><p style="font-size:13px;line-height:1.6;">${esc(c.notes)}</p></div>` : ''}

    ${newsForComp.length ? `
      <div class="card">
        <h4 style="font-size:14px;margin-bottom:12px;">📰 Recent Intel (${newsForComp.length})</h4>
        ${newsForComp.slice(0,5).map(n => `
          <div class="news-item">
            <div class="news-date">${n.date}</div>
            <span class="news-type ${n.type}">${{feature:'🚀',pricing:'💰',funding:'💎',hire:'👤',partnership:'🤝'}[n.type]||''} ${n.type}</span>
            <div class="news-content">${esc(n.content)}</div>
          </div>
        `).join('')}
      </div>
    ` : ''}
  `;
  openModal('detailModal');
}

// Utils
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

function switchView(v) { state.currentView = v; render(); }
function handleSearch(q) { state.searchQuery = q; render(); }

function toggleDark() {
  document.body.classList.toggle('dark');
  localStorage.setItem('cr-dark', document.body.classList.contains('dark'));
}

function exportData() {
  const blob = new Blob([JSON.stringify({ competitors: state.competitors, features: state.features, news: state.news }, null, 2)], { type: 'application/json' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'competitor-radar-export.json'; a.click();
}

function importData() { document.getElementById('importFile').click(); }
function handleImport(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      const d = JSON.parse(ev.target.result);
      if (d.competitors) state.competitors = d.competitors;
      if (d.features) state.features = d.features;
      if (d.news) state.news = d.news;
      save(); render();
      alert('Import successful!');
    } catch(err) { alert('Invalid file'); }
  };
  reader.readAsText(file);
  e.target.value = '';
}

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') {
    if (e.key === 'Escape') { e.target.blur(); return; }
    return;
  }
  switch(e.key) {
    case '1': switchView('overview'); break;
    case '2': switchView('matrix'); break;
    case '3': switchView('map'); break;
    case '4': switchView('battlecards'); break;
    case '5': switchView('news'); break;
    case 'n': case 'N': e.preventDefault(); openAddCompetitor(); break;
    case '/': e.preventDefault(); document.getElementById('searchInput').focus(); break;
    case 'd': case 'D': toggleDark(); break;
    case 'e': case 'E': exportData(); break;
    case 'Escape':
      ['compModal','featureModal','newsModal','detailModal'].forEach(m => closeModal(m));
      break;
  }
});

// Click outside modal to close
['compModal','featureModal','newsModal','detailModal'].forEach(id => {
  document.getElementById(id).addEventListener('click', (e) => {
    if (e.target.classList.contains('modal-overlay')) closeModal(id);
  });
});

init();
</script>
</body>
</html>
