<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Canvas Lab — Business Model Canvas Builder</title>
<style>
:root {
  --bg: #0f1117; --surface: #1a1d27; --surface2: #242833; --surface3: #2e3240;
  --border: #363a48; --text: #e4e6ed; --text2: #9ca0ad; --text3: #6b7080;
  --accent: #6c5ce7; --accent2: #a29bfe; --accent-bg: rgba(108,92,231,0.12);
  --green: #00b894; --green-bg: rgba(0,184,148,0.12);
  --blue: #0984e3; --blue-bg: rgba(9,132,227,0.12);
  --orange: #e17055; --orange-bg: rgba(225,112,85,0.12);
  --yellow: #fdcb6e; --yellow-bg: rgba(253,203,110,0.12);
  --pink: #e84393; --pink-bg: rgba(232,67,147,0.12);
  --cyan: #00cec9; --cyan-bg: rgba(0,206,201,0.12);
  --red: #d63031; --red-bg: rgba(214,48,49,0.12);
  --radius: 10px; --radius-sm: 6px;
  --shadow: 0 4px 24px rgba(0,0,0,0.3);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
button { cursor:pointer; font-family:inherit; border:none; background:none; color:var(--text); }
input, textarea, select { font-family:inherit; background:var(--surface2); border:1px solid var(--border); color:var(--text); border-radius:var(--radius-sm); padding:8px 12px; outline:none; width:100%; }
input:focus, textarea:focus, select:focus { border-color:var(--accent); }
textarea { resize:vertical; min-height:60px; }
::-webkit-scrollbar { width:6px; height:6px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--surface3); border-radius:3px; }

/* Layout */
.app { display:flex; height:100vh; }
.sidebar { width:260px; background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; flex-shrink:0; }
.sidebar-header { padding:16px; border-bottom:1px solid var(--border); }
.sidebar-header h1 { font-size:18px; font-weight:700; display:flex; align-items:center; gap:8px; }
.sidebar-header h1 span { font-size:22px; }
.sidebar-search { padding:12px 16px 8px; }
.sidebar-search input { font-size:13px; padding:6px 10px; background:var(--surface2); }
.sidebar-list { flex:1; overflow-y:auto; padding:8px; }
.sidebar-item { padding:10px 12px; border-radius:var(--radius-sm); cursor:pointer; margin-bottom:2px; display:flex; align-items:center; justify-content:space-between; }
.sidebar-item:hover { background:var(--surface2); }
.sidebar-item.active { background:var(--accent-bg); border:1px solid rgba(108,92,231,0.3); }
.sidebar-item .name { font-size:13px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex:1; }
.sidebar-item .type-badge { font-size:10px; padding:2px 6px; border-radius:10px; background:var(--surface3); color:var(--text2); flex-shrink:0; margin-left:8px; }
.sidebar-item .type-badge.lean { background:var(--green-bg); color:var(--green); }
.sidebar-item .type-badge.bmc { background:var(--blue-bg); color:var(--blue); }
.sidebar-item .type-badge.value { background:var(--pink-bg); color:var(--pink); }
.sidebar-actions { padding:12px 16px; border-top:1px solid var(--border); display:flex; gap:8px; }
.sidebar-actions button { flex:1; padding:8px; border-radius:var(--radius-sm); font-size:12px; font-weight:600; }
.btn-primary { background:var(--accent); color:#fff; }
.btn-primary:hover { background:var(--accent2); }
.btn-secondary { background:var(--surface2); border:1px solid var(--border); }
.btn-secondary:hover { background:var(--surface3); }

/* Main */
.main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
.toolbar { padding:12px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:12px; background:var(--surface); }
.toolbar .title-input { font-size:16px; font-weight:600; background:transparent; border:none; flex:1; padding:4px 0; }
.toolbar .title-input:focus { border-bottom:2px solid var(--accent); }
.view-tabs { display:flex; gap:4px; }
.view-tab { padding:6px 14px; border-radius:var(--radius-sm); font-size:12px; font-weight:500; color:var(--text2); }
.view-tab:hover { background:var(--surface2); color:var(--text); }
.view-tab.active { background:var(--accent-bg); color:var(--accent); }
.toolbar-actions { display:flex; gap:6px; }
.toolbar-actions button { padding:6px 12px; border-radius:var(--radius-sm); font-size:12px; background:var(--surface2); border:1px solid var(--border); }
.toolbar-actions button:hover { background:var(--surface3); }

/* Canvas Grid */
.canvas-area { flex:1; overflow:auto; padding:20px; }

/* BMC Grid */
.bmc-grid {
  display:grid;
  grid-template-columns: 1fr 1fr 1fr 1fr 1fr;
  grid-template-rows: 1fr 1fr;
  gap:2px;
  min-height:calc(100vh - 120px);
  background:var(--border);
  border-radius:var(--radius);
  overflow:hidden;
}
.bmc-grid .cell { background:var(--surface); padding:12px; display:flex; flex-direction:column; position:relative; }
.bmc-grid .cell.key-partners { grid-row:1/3; }
.bmc-grid .cell.key-activities { grid-row:1/2; }
.bmc-grid .cell.key-resources { grid-row:2/3; }
.bmc-grid .cell.value-prop { grid-row:1/3; }
.bmc-grid .cell.customer-rel { grid-row:1/2; }
.bmc-grid .cell.channels { grid-row:2/3; }
.bmc-grid .cell.customer-seg { grid-row:1/3; }
.bmc-grid .cell.cost-structure { grid-column:1/3; }
.bmc-grid .cell.revenue-streams { grid-column:3/6; }

/* Lean Canvas Grid */
.lean-grid {
  display:grid;
  grid-template-columns: 1fr 1fr 1fr 1fr 1fr;
  grid-template-rows: 1fr 1fr;
  gap:2px;
  min-height:calc(100vh - 120px);
  background:var(--border);
  border-radius:var(--radius);
  overflow:hidden;
}
.lean-grid .cell { background:var(--surface); padding:12px; display:flex; flex-direction:column; position:relative; }
.lean-grid .cell.problem { grid-row:1/3; }
.lean-grid .cell.solution { grid-row:1/2; }
.lean-grid .cell.key-metrics { grid-row:2/3; }
.lean-grid .cell.uvp { grid-row:1/3; }
.lean-grid .cell.unfair-adv { grid-row:1/2; }
.lean-grid .cell.channels { grid-row:2/3; }
.lean-grid .cell.customer-seg { grid-row:1/3; }
.lean-grid .cell.cost-structure { grid-column:1/3; }
.lean-grid .cell.revenue-streams { grid-column:3/6; }

/* Value Prop Canvas */
.vpc-grid {
  display:flex; gap:24px; min-height:calc(100vh - 120px); align-items:center; justify-content:center; padding:20px;
}
.vpc-side { width:420px; min-height:400px; border-radius:var(--radius); overflow:hidden; border:2px solid var(--border); }
.vpc-side h3 { padding:12px 16px; font-size:14px; font-weight:700; border-bottom:1px solid var(--border); }
.vpc-side.value-map { background:var(--surface); }
.vpc-side.value-map h3 { background:var(--accent-bg); color:var(--accent); }
.vpc-side.customer-profile { background:var(--surface); }
.vpc-side.customer-profile h3 { background:var(--green-bg); color:var(--green); }
.vpc-sections { display:flex; flex-direction:column; }
.vpc-section { padding:12px; border-bottom:1px solid var(--border); flex:1; }
.vpc-section:last-child { border-bottom:none; }
.vpc-arrow { font-size:32px; color:var(--text3); display:flex; align-items:center; }

/* Cell styling */
.cell-header { display:flex; align-items:center; gap:6px; margin-bottom:8px; }
.cell-icon { font-size:16px; }
.cell-title { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; color:var(--text2); }
.cell-items { flex:1; overflow-y:auto; }
.cell-item { display:flex; align-items:flex-start; gap:6px; padding:4px 6px; border-radius:4px; margin-bottom:3px; font-size:13px; line-height:1.4; group:relative; }
.cell-item:hover { background:var(--surface2); }
.cell-item .bullet { color:var(--accent); font-weight:bold; margin-top:1px; flex-shrink:0; }
.cell-item .item-text { flex:1; word-break:break-word; }
.cell-item .item-actions { display:none; gap:4px; flex-shrink:0; }
.cell-item:hover .item-actions { display:flex; }
.cell-item .item-actions button { font-size:11px; padding:2px 4px; border-radius:3px; color:var(--text3); }
.cell-item .item-actions button:hover { color:var(--text); background:var(--surface3); }
.cell-add { margin-top:6px; }
.cell-add input { font-size:12px; padding:6px 8px; background:var(--surface2); border:1px dashed var(--border); }
.cell-add input::placeholder { color:var(--text3); }
.cell-add input:focus { border-style:solid; border-color:var(--accent); }

/* VPC section styling */
.vpc-section .cell-header { margin-bottom:6px; }
.vpc-section .cell-title { font-size:10px; }

/* Dashboard */
.dashboard { padding:24px; overflow-y:auto; }
.dash-stats { display:grid; grid-template-columns:repeat(auto-fit, minmax(180px,1fr)); gap:12px; margin-bottom:24px; }
.stat-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:16px; }
.stat-card .label { font-size:11px; text-transform:uppercase; letter-spacing:0.5px; color:var(--text2); margin-bottom:4px; }
.stat-card .value { font-size:24px; font-weight:700; }
.stat-card .sub { font-size:12px; color:var(--text3); margin-top:2px; }
.dash-section { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:20px; margin-bottom:16px; }
.dash-section h3 { font-size:14px; font-weight:600; margin-bottom:12px; }
.comparison-table { width:100%; border-collapse:collapse; }
.comparison-table th, .comparison-table td { padding:10px 12px; text-align:left; border-bottom:1px solid var(--border); font-size:13px; }
.comparison-table th { color:var(--text2); font-weight:600; font-size:11px; text-transform:uppercase; }
.comparison-table td:first-child { font-weight:500; }
.fill-bar { height:6px; background:var(--surface3); border-radius:3px; overflow:hidden; }
.fill-bar .fill { height:100%; border-radius:3px; transition:width 0.3s; }

/* Export View */
.export-view { padding:24px; overflow-y:auto; }
.export-options { display:grid; grid-template-columns:repeat(auto-fit, minmax(250px,1fr)); gap:16px; }
.export-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:20px; text-align:center; cursor:pointer; transition:all 0.2s; }
.export-card:hover { border-color:var(--accent); transform:translateY(-2px); }
.export-card .icon { font-size:32px; margin-bottom:8px; }
.export-card h4 { font-size:14px; margin-bottom:4px; }
.export-card p { font-size:12px; color:var(--text2); }

/* Modal */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.6); display:flex; align-items:center; justify-content:center; z-index:100; }
.modal { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:24px; max-width:500px; width:90%; max-height:80vh; overflow-y:auto; }
.modal h3 { font-size:16px; margin-bottom:16px; }
.modal .form-group { margin-bottom:14px; }
.modal .form-group label { display:block; font-size:12px; color:var(--text2); margin-bottom:4px; font-weight:600; }
.modal .form-actions { display:flex; gap:8px; justify-content:flex-end; margin-top:20px; }
.modal .form-actions button { padding:8px 20px; border-radius:var(--radius-sm); font-size:13px; font-weight:600; }

/* Empty state */
.empty-state { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; color:var(--text3); }
.empty-state .icon { font-size:48px; margin-bottom:12px; }
.empty-state h3 { font-size:18px; margin-bottom:8px; color:var(--text2); }
.empty-state p { font-size:13px; margin-bottom:16px; }

/* Color dots for items */
.color-dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; margin-top:5px; }

/* Keyboard hint */
.kbd-hint { position:fixed; bottom:12px; right:12px; font-size:11px; color:var(--text3); background:var(--surface); padding:4px 8px; border-radius:4px; border:1px solid var(--border); z-index:50; }

/* Print */
@media print {
  .sidebar, .toolbar, .kbd-hint { display:none !important; }
  .main { margin:0; }
  .canvas-area { padding:10px; }
  .bmc-grid, .lean-grid { min-height:auto; }
  .cell-item .item-actions { display:none !important; }
  .cell-add { display:none !important; }
  body { background:#fff; color:#111; }
  .cell { background:#fff !important; }
  .cell-title { color:#555 !important; }
}

/* Responsive */
@media (max-width:900px) {
  .sidebar { width:200px; }
  .bmc-grid, .lean-grid { grid-template-columns:1fr 1fr; grid-template-rows:auto; min-height:auto; }
  .bmc-grid .cell, .lean-grid .cell { grid-row:auto !important; grid-column:auto !important; }
}
</style>
</head>
<body>
<div class="app" id="app"></div>
<div class="kbd-hint">? = shortcuts</div>

<script>
// ===================== DATA =====================
const CANVAS_TYPES = {
  bmc: { name: 'Business Model Canvas', badge: 'BMC', sections: [
    { id:'key_partners', title:'Key Partners', icon:'🤝', hint:'Who are your key partners/suppliers?' },
    { id:'key_activities', title:'Key Activities', icon:'⚡', hint:'What key activities does your value prop require?' },
    { id:'key_resources', title:'Key Resources', icon:'🏗️', hint:'What key resources does your value prop require?' },
    { id:'value_propositions', title:'Value Propositions', icon:'💎', hint:'What value do you deliver to the customer?' },
    { id:'customer_relationships', title:'Customer Relationships', icon:'💬', hint:'What relationship does each segment expect?' },
    { id:'channels', title:'Channels', icon:'📡', hint:'How do you reach your customer segments?' },
    { id:'customer_segments', title:'Customer Segments', icon:'👥', hint:'For whom are you creating value?' },

    { id:'revenue_streams', title:'Revenue Streams', icon:'💰', hint:'For what value are customers willing to pay?' }
  ]},
  lean: { name: 'Lean Canvas', badge: 'Lean', sections: [

    { id:'key_metrics', title:'Key Metrics', icon:'📊', hint:'Key numbers that tell you how your business is doing' },
    { id:'unique_value_prop', title:'Unique Value Proposition', icon:'💎', hint:'Single, clear, compelling message' },
    { id:'unfair_advantage', title:'Unfair Advantage', icon:'🛡️', hint:'Something that cannot easily be copied' },
    { id:'channels', title:'Channels', icon:'📡', hint:'Path to customers' },
    { id:'customer_segments', title:'Customer Segments', icon:'👥', hint:'Target customers' },
    { id:'cost_structure', title:'Cost Structure', icon:'💸', hint:'Customer acquisition costs, distribution, hosting, etc.' },
    { id:'revenue_streams', title:'Revenue Streams', icon:'💰', hint:'Revenue model, lifetime value, revenue, gross margin' }
  ]},
  vpc: { name: 'Value Proposition Canvas', badge: 'VPC', sections: [
    { id:'products_services', title:'Products & Services', icon:'📦', hint:'What do you offer?' },
    { id:'gain_creators', title:'Gain Creators', icon:'✨', hint:'How do you create customer gains?' },
    { id:'pain_relievers', title:'Pain Relievers', icon:'💊', hint:'How do you relieve customer pains?' },
    { id:'customer_jobs', title:'Customer Jobs', icon:'🎯', hint:'What are customers trying to get done?' },
    { id:'gains', title:'Gains', icon:'🌟', hint:'What outcomes and benefits do customers want?' },
    { id:'pains', title:'Pains', icon:'😣', hint:'What annoys or hurts customers?' }
  ]}
};

const COLORS = ['var(--accent)','var(--green)','var(--blue)','var(--orange)','var(--pink)','var(--cyan)','var(--yellow)'];

function getDefaultSections(type) {
  const s = {};
  CANVAS_TYPES[type].sections.forEach(sec => s[sec.id] = []);
  return s;
}

function createCanvas(name, type) {
  return { id: 'c_'+Date.now()+'_'+Math.random().toString(36).slice(2,6), name, type, sections: getDefaultSections(type), created: new Date().toISOString(), updated: new Date().toISOString(), notes:'' };
}

// ===================== STATE =====================
let state = {
  canvases: [],
  activeId: null,
  view: 'canvas', // canvas | dashboard | export
  search: '',
  modal: null,
  editingItem: null
};

function save() {
  localStorage.setItem('canvas-lab-v1', JSON.stringify(state.canvases));
}
function load() {
  try {
    const d = JSON.parse(localStorage.getItem('canvas-lab-v1'));
    if (d && Array.isArray(d)) state.canvases = d;
  } catch(e){}
}

      {id:'v7',text:'Investor-ready product to show traction',color:1},
      {id:'v8',text:'No need to hire a full dev team early',color:1}
    ],
    pain_relievers: [
      {id:'v9',text:'Eliminate "idea stuck in my head" paralysis',color:2},
      {id:'v10',text:'No more freelancer roulette & bad code',color:2},
      {id:'v11',text:'Fixed scope & price — no surprise costs',color:2},
      {id:'v12',text:'Product person leading build (not just devs)',color:2}
    ],
    customer_jobs: [
      {id:'v13',text:'Validate business idea with real users',color:3},
      {id:'v14',text:'Show investors a working product',color:3},
      {id:'v15',text:'Launch before competitors in the space',color:3},
      {id:'v16',text:'Learn if the market wants what they\'re building',color:3}
    ],
    gains: [
      {id:'v17',text:'First paying customers within weeks of launch',color:4},
      {id:'v18',text:'Confidence that the product is built right',color:4},
      {id:'v19',text:'Speed advantage over competitors still planning',color:4},
      {id:'v20',text:'A product they can demo, not just a deck',color:4}
    ],
    pains: [
      {id:'v21',text:'Spent 6 months and $50K on MVP that nobody wants',color:5},
      {id:'v22',text:'Can\'t find good technical co-founder',color:5},

  };

  state.canvases = [bmc, lean, vpc];
  state.activeId = bmc.id;
  save();
}

// ===================== RENDER =====================
function getActive() { return state.canvases.find(c => c.id === state.activeId); }

function render() {
  const app = document.getElementById('app');
  const active = getActive();
  const filtered = state.canvases.filter(c => !state.search || c.name.toLowerCase().includes(state.search.toLowerCase()));

  app.innerHTML = `
    <div class="sidebar">
      <div class="sidebar-header">
        <h1><span>🧪</span> Canvas Lab</h1>
      </div>
      <div class="sidebar-search">
        <input type="text" placeholder="Search canvases... (/)" value="${esc(state.search)}" oninput="state.search=this.value;render()">
      </div>
      <div class="sidebar-list">
        ${filtered.map(c => `
          <div class="sidebar-item ${c.id===state.activeId?'active':''}" onclick="state.activeId='${c.id}';state.view='canvas';render()">
            <span class="name">${esc(c.name)}</span>
            <span class="type-badge ${c.type==='lean'?'lean':c.type==='bmc'?'bmc':'value'}">${CANVAS_TYPES[c.type].badge}</span>
          </div>
        `).join('')}
        ${filtered.length===0?'<div style="padding:20px;text-align:center;color:var(--text3);font-size:13px;">No canvases found</div>':''}
      </div>
      <div class="sidebar-actions">
        <button class="btn-primary" onclick="showNewModal()">+ New</button>
        <button class="btn-secondary" onclick="importData()">Import</button>
      </div>
    </div>
    <div class="main">
      ${active ? renderMain(active) : renderEmpty()}
    </div>
    ${state.modal ? renderModal() : ''}
  `;
}

function renderEmpty() {
  return `
    <div class="empty-state">
      <div class="icon">🧪</div>
      <h3>No Canvas Selected</h3>
      <p>Create a Business Model Canvas, Lean Canvas, or Value Proposition Canvas</p>
      <button class="btn-primary" style="padding:10px 24px;border-radius:var(--radius-sm);font-size:14px;" onclick="showNewModal()">+ Create Canvas</button>
    </div>
  `;
}

function renderMain(c) {
  return `
    <div class="toolbar">
      <input class="title-input" value="${esc(c.name)}" onchange="renameCanvas(this.value)">
      <div class="view-tabs">
        <button class="view-tab ${state.view==='canvas'?'active':''}" onclick="state.view='canvas';render()">📋 Canvas</button>
        <button class="view-tab ${state.view==='dashboard'?'active':''}" onclick="state.view='dashboard';render()">📊 Dashboard</button>
        <button class="view-tab ${state.view==='export'?'active':''}" onclick="state.view='export';render()">📤 Export</button>
      </div>
      <div class="toolbar-actions">
        <button onclick="duplicateCanvas()">📑 Duplicate</button>
        <button onclick="deleteCanvas()" style="color:var(--red);">🗑️ Delete</button>
      </div>
    </div>
    ${state.view==='canvas' ? renderCanvasView(c) : state.view==='dashboard' ? renderDashboard(c) : renderExport(c)}
  `;
}

function renderCanvasView(c) {
  if (c.type === 'bmc') return renderBMC(c);
  if (c.type === 'lean') return renderLean(c);
  if (c.type === 'vpc') return renderVPC(c);
}

function renderCell(c, sectionId) {
  const sec = CANVAS_TYPES[c.type].sections.find(s => s.id === sectionId);
  const items = c.sections[sectionId] || [];
  return `
    <div class="cell-header">
      <span class="cell-icon">${sec.icon}</span>
      <span class="cell-title">${sec.title}</span>
      <span style="font-size:10px;color:var(--text3);margin-left:auto;">${items.length}</span>
    </div>
    <div class="cell-items">
      ${items.map((item,i) => `
        <div class="cell-item">
          <div class="color-dot" style="background:${COLORS[item.color||0]}"></div>
          <span class="item-text">${esc(item.text)}</span>
          <div class="item-actions">
            <button onclick="editItem('${c.id}','${sectionId}',${i})" title="Edit">✏️</button>
            <button onclick="removeItem('${c.id}','${sectionId}',${i})" title="Remove">×</button>
          </div>
        </div>
      `).join('')}
    </div>
    <div class="cell-add">
      <input type="text" placeholder="${sec.hint}" onkeydown="if(event.key==='Enter'&&this.value.trim()){addItem('${c.id}','${sectionId}',this.value.trim());this.value='';}" />
    </div>
  `;
}

function renderBMC(c) {
  return `<div class="canvas-area"><div class="bmc-grid">
    <div class="cell key-partners">${renderCell(c,'key_partners')}</div>
    <div class="cell key-activities">${renderCell(c,'key_activities')}</div>
    <div class="cell value-prop">${renderCell(c,'value_propositions')}</div>
    <div class="cell customer-rel">${renderCell(c,'customer_relationships')}</div>
    <div class="cell customer-seg">${renderCell(c,'customer_segments')}</div>
    <div class="cell key-resources">${renderCell(c,'key_resources')}</div>
    <div class="cell channels">${renderCell(c,'channels')}</div>
    <div class="cell cost-structure">${renderCell(c,'cost_structure')}</div>
    <div class="cell revenue-streams">${renderCell(c,'revenue_streams')}</div>
  </div></div>`;
}

function renderLean(c) {
  return `<div class="canvas-area"><div class="lean-grid">
    <div class="cell problem">${renderCell(c,'problem')}</div>
    <div class="cell solution">${renderCell(c,'solution')}</div>
    <div class="cell uvp">${renderCell(c,'unique_value_prop')}</div>
    <div class="cell unfair-adv">${renderCell(c,'unfair_advantage')}</div>
    <div class="cell customer-seg">${renderCell(c,'customer_segments')}</div>
    <div class="cell key-metrics">${renderCell(c,'key_metrics')}</div>
    <div class="cell channels">${renderCell(c,'channels')}</div>
    <div class="cell cost-structure">${renderCell(c,'cost_structure')}</div>
    <div class="cell revenue-streams">${renderCell(c,'revenue_streams')}</div>
  </div></div>`;
}

function renderVPC(c) {
  return `<div class="canvas-area"><div class="vpc-grid">
    <div class="vpc-side value-map">
      <h3>💎 Value Map</h3>
      <div class="vpc-sections">
        <div class="vpc-section">${renderCell(c,'products_services')}</div>
        <div class="vpc-section">${renderCell(c,'gain_creators')}</div>
        <div class="vpc-section">${renderCell(c,'pain_relievers')}</div>
      </div>
    </div>
    <div class="vpc-arrow">⟶</div>
    <div class="vpc-side customer-profile">
      <h3>👤 Customer Profile</h3>
      <div class="vpc-sections">
        <div class="vpc-section">${renderCell(c,'customer_jobs')}</div>
        <div class="vpc-section">${renderCell(c,'gains')}</div>
        <div class="vpc-section">${renderCell(c,'pains')}</div>
      </div>
    </div>
  </div></div>`;
}

function renderDashboard(c) {
  const totalItems = Object.values(c.sections).reduce((a,s) => a + s.length, 0);
  const filledSections = Object.values(c.sections).filter(s => s.length > 0).length;
  const totalSections = Object.keys(c.sections).length;
  const completeness = Math.round((filledSections / totalSections) * 100);
  const avgPerSection = totalItems > 0 ? (totalItems / totalSections).toFixed(1) : 0;
  const emptySections = CANVAS_TYPES[c.type].sections.filter(s => (c.sections[s.id]||[]).length === 0);

  // Comparison with all canvases of same type
  const sameType = state.canvases.filter(x => x.type === c.type && x.id !== c.id);

  return `<div class="dashboard">
    <div class="dash-stats">
      <div class="stat-card">
        <div class="label">Total Items</div>
        <div class="value">${totalItems}</div>
        <div class="sub">across ${totalSections} sections</div>
      </div>
      <div class="stat-card">
        <div class="label">Completeness</div>
        <div class="value" style="color:${completeness===100?'var(--green)':completeness>=60?'var(--yellow)':'var(--orange)'}">${completeness}%</div>
        <div class="sub">${filledSections}/${totalSections} sections filled</div>
      </div>
      <div class="stat-card">
        <div class="label">Avg Items/Section</div>
        <div class="value">${avgPerSection}</div>
        <div class="sub">aim for 3-5 per section</div>
      </div>
      <div class="stat-card">
        <div class="label">Canvas Type</div>
        <div class="value" style="font-size:16px;">${CANVAS_TYPES[c.type].name}</div>
        <div class="sub">Created ${new Date(c.created).toLocaleDateString()}</div>
      </div>
    </div>

    <div class="dash-section">
      <h3>📊 Section Breakdown</h3>
      <table class="comparison-table">
        <thead><tr><th>Section</th><th>Items</th><th>Fill</th></tr></thead>
        <tbody>
          ${CANVAS_TYPES[c.type].sections.map(sec => {
            const count = (c.sections[sec.id]||[]).length;
            const pct = Math.min(count * 20, 100);
            return `<tr>
              <td>${sec.icon} ${sec.title}</td>
              <td>${count}</td>
              <td><div class="fill-bar" style="width:120px;"><div class="fill" style="width:${pct}%;background:${count===0?'var(--red)':count<3?'var(--yellow)':'var(--green)'}"></div></div></td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>

    ${emptySections.length > 0 ? `
    <div class="dash-section">
      <h3>⚠️ Empty Sections</h3>
      <p style="font-size:13px;color:var(--text2);margin-bottom:8px;">These sections need attention:</p>
      ${emptySections.map(s => `<div style="padding:6px 10px;background:var(--red-bg);border-radius:4px;margin-bottom:4px;font-size:13px;">${s.icon} ${s.title} — <span style="color:var(--text3)">${s.hint}</span></div>`).join('')}
    </div>` : `
    <div class="dash-section">
      <h3>✅ All Sections Filled</h3>
      <p style="font-size:13px;color:var(--green);">Great job! Every section has at least one item.</p>
    </div>`}

    ${sameType.length > 0 ? `
    <div class="dash-section">
      <h3>🔄 Compare with Other ${CANVAS_TYPES[c.type].badge} Canvases</h3>
      <table class="comparison-table">
        <thead><tr><th>Canvas</th><th>Items</th><th>Completeness</th></tr></thead>
        <tbody>
          <tr style="font-weight:600;"><td>${esc(c.name)} (current)</td><td>${totalItems}</td><td>${completeness}%</td></tr>
          ${sameType.map(x => {
            const ti = Object.values(x.sections).reduce((a,s)=>a+s.length,0);
            const fs = Object.values(x.sections).filter(s=>s.length>0).length;
            const comp = Math.round((fs/Object.keys(x.sections).length)*100);
            return `<tr><td>${esc(x.name)}</td><td>${ti}</td><td>${comp}%</td></tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>` : ''}

    ${c.notes ? `<div class="dash-section"><h3>📝 Notes</h3><p style="font-size:13px;white-space:pre-wrap;">${esc(c.notes)}</p></div>` : ''}
    <div class="dash-section">
      <h3>📝 Canvas Notes</h3>
      <textarea style="width:100%;min-height:80px;" placeholder="Add strategic notes about this canvas..." onchange="updateNotes(this.value)">${esc(c.notes||'')}</textarea>
    </div>
  </div>`;
}

function renderExport(c) {
  return `<div class="export-view">
    <h2 style="margin-bottom:16px;">Export "${esc(c.name)}"</h2>
    <div class="export-options">
      <div class="export-card" onclick="exportMarkdown()">
        <div class="icon">📝</div>
        <h4>Markdown</h4>
        <p>Copy as formatted Markdown — paste into PRDs, Notion, docs</p>
      </div>
      <div class="export-card" onclick="exportJSON()">
        <div class="icon">📦</div>
        <h4>JSON Backup</h4>
        <p>Export all canvases as JSON for backup or sharing</p>
      </div>
      <div class="export-card" onclick="exportHTML()">
        <div class="icon">🌐</div>
        <h4>Standalone HTML</h4>
        <p>Download as a self-contained HTML file — share anywhere</p>
      </div>
      <div class="export-card" onclick="window.print()">
        <div class="icon">🖨️</div>
        <h4>Print / PDF</h4>
        <p>Print this canvas or save as PDF via browser</p>
      </div>
      <div class="export-card" onclick="copyShareText()">
        <div class="icon">📋</div>
        <h4>Quick Copy</h4>
        <p>Copy a plain-text summary to clipboard</p>
      </div>
    </div>
  </div>`;
}

function renderModal() {
  if (state.modal === 'new') {
    return `<div class="modal-overlay" onclick="if(event.target===this){state.modal=null;render();}">
      <div class="modal">
        <h3>Create New Canvas</h3>
        <div class="form-group">
          <label>Name</label>
          <input type="text" id="newName" placeholder="e.g., My Product — Business Model" autofocus>
        </div>
        <div class="form-group">
          <label>Type</label>
          <select id="newType">
            <option value="bmc">Business Model Canvas</option>
            <option value="lean">Lean Canvas</option>
            <option value="vpc">Value Proposition Canvas</option>
          </select>
        </div>
        <div class="form-actions">
          <button class="btn-secondary" onclick="state.modal=null;render()">Cancel</button>
          <button class="btn-primary" onclick="createNew()">Create</button>
        </div>
      </div>
    </div>`;
  }
  if (state.modal === 'edit') {
    const {canvasId, sectionId, index} = state.editingItem;
    const c = state.canvases.find(x => x.id === canvasId);
    const item = c.sections[sectionId][index];
    return `<div class="modal-overlay" onclick="if(event.target===this){state.modal=null;render();}">
      <div class="modal">
        <h3>Edit Item</h3>
        <div class="form-group">
          <label>Text</label>
          <textarea id="editText" rows="3">${esc(item.text)}</textarea>
        </div>
        <div class="form-group">
          <label>Color</label>
          <div style="display:flex;gap:8px;">
            ${COLORS.map((col,i) => `<div onclick="document.getElementById('editColor').value=${i};document.querySelectorAll('.color-pick').forEach(d=>d.style.outline='none');this.style.outline='2px solid var(--text)'" class="color-pick" style="width:24px;height:24px;border-radius:50%;background:${col};cursor:pointer;${item.color===i?'outline:2px solid var(--text)':''}"></div>`).join('')}
          </div>
          <input type="hidden" id="editColor" value="${item.color||0}">
        </div>
        <div class="form-actions">
          <button class="btn-secondary" onclick="state.modal=null;render()">Cancel</button>
          <button class="btn-primary" onclick="saveEdit()">Save</button>
        </div>
      </div>
    </div>`;
  }
  return '';
}

// ===================== ACTIONS =====================
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function showNewModal() { state.modal = 'new'; render(); setTimeout(()=>{const el=document.getElementById('newName');if(el)el.focus();},50); }

function createNew() {
  const name = document.getElementById('newName').value.trim() || 'Untitled Canvas';
  const type = document.getElementById('newType').value;
  const c = createCanvas(name, type);
  state.canvases.unshift(c);
  state.activeId = c.id;
  state.view = 'canvas';
  state.modal = null;
  save(); render();
}

function renameCanvas(name) {
  const c = getActive();
  if (c) { c.name = name; c.updated = new Date().toISOString(); save(); render(); }
}

function deleteCanvas() {
  const c = getActive();
  if (!c || !confirm(`Delete "${c.name}"?`)) return;
  state.canvases = state.canvases.filter(x => x.id !== c.id);
  state.activeId = state.canvases.length > 0 ? state.canvases[0].id : null;
  save(); render();
}

function duplicateCanvas() {
  const c = getActive();
  if (!c) return;
  const dup = JSON.parse(JSON.stringify(c));
  dup.id = 'c_'+Date.now()+'_'+Math.random().toString(36).slice(2,6);
  dup.name = c.name + ' (Copy)';
  dup.created = new Date().toISOString();
  dup.updated = new Date().toISOString();
  state.canvases.unshift(dup);
  state.activeId = dup.id;
  save(); render();
}

function addItem(canvasId, sectionId, text) {
  const c = state.canvases.find(x => x.id === canvasId);
  if (!c) return;
  const colorIdx = Math.floor(Math.random() * COLORS.length);
  c.sections[sectionId].push({ id: 'i_'+Date.now(), text, color: colorIdx });
  c.updated = new Date().toISOString();
  save(); render();
}

function removeItem(canvasId, sectionId, index) {
  const c = state.canvases.find(x => x.id === canvasId);
  if (!c) return;
  c.sections[sectionId].splice(index, 1);
  c.updated = new Date().toISOString();
  save(); render();
}

function editItem(canvasId, sectionId, index) {
  state.editingItem = {canvasId, sectionId, index};
  state.modal = 'edit';
  render();
}

function saveEdit() {
  const {canvasId, sectionId, index} = state.editingItem;
  const c = state.canvases.find(x => x.id === canvasId);
  const text = document.getElementById('editText').value.trim();
  const color = parseInt(document.getElementById('editColor').value) || 0;
  if (text) {
    c.sections[sectionId][index].text = text;
    c.sections[sectionId][index].color = color;
    c.updated = new Date().toISOString();
    save();
  }
  state.modal = null; render();
}

function updateNotes(v) {
  const c = getActive();
  if (c) { c.notes = v; c.updated = new Date().toISOString(); save(); }
}

function exportMarkdown() {
  const c = getActive(); if (!c) return;
  let md = `# ${c.name}\n\n**Type:** ${CANVAS_TYPES[c.type].name}\n**Created:** ${new Date(c.created).toLocaleDateString()}\n**Updated:** ${new Date(c.updated).toLocaleDateString()}\n\n---\n\n`;
  CANVAS_TYPES[c.type].sections.forEach(sec => {
    const items = c.sections[sec.id] || [];
    md += `## ${sec.icon} ${sec.title}\n\n`;
    if (items.length === 0) md += `*Empty — ${sec.hint}*\n\n`;
    else items.forEach(item => { md += `- ${item.text}\n`; });
    md += '\n';
  });
  if (c.notes) md += `---\n\n## 📝 Notes\n\n${c.notes}\n`;
  navigator.clipboard.writeText(md).then(() => alert('Markdown copied to clipboard!'));
}

function exportJSON() {
  const blob = new Blob([JSON.stringify(state.canvases, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = 'canvas-lab-backup.json'; a.click();
  URL.revokeObjectURL(url);
}

function exportHTML() {
  const c = getActive(); if (!c) return;
  const sections = CANVAS_TYPES[c.type].sections;
  let html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${esc(c.name)}</title>
<style>body{font-family:-apple-system,sans-serif;max-width:900px;margin:40px auto;padding:20px;color:#333;}
h1{margin-bottom:4px;}h2{margin-top:24px;font-size:16px;color:#555;border-bottom:1px solid #ddd;padding-bottom:4px;}
.meta{color:#888;font-size:13px;margin-bottom:24px;}ul{margin:8px 0;}li{margin:4px 0;font-size:14px;}
.notes{margin-top:24px;padding:16px;background:#f8f8f8;border-radius:8px;font-size:14px;white-space:pre-wrap;}</style></head>
<body><h1>${esc(c.name)}</h1><div class="meta">${CANVAS_TYPES[c.type].name} · Created ${new Date(c.created).toLocaleDateString()}</div>`;
  sections.forEach(sec => {
    const items = c.sections[sec.id]||[];
    html += `<h2>${sec.icon} ${sec.title}</h2>`;
    if (items.length === 0) html += `<p style="color:#aaa;font-size:13px;"><em>${sec.hint}</em></p>`;
    else { html += '<ul>'; items.forEach(i => html += `<li>${esc(i.text)}</li>`); html += '</ul>'; }
  });
  if (c.notes) html += `<div class="notes"><strong>Notes:</strong><br>${esc(c.notes)}</div>`;
  html += '</body></html>';
  const blob = new Blob([html], {type:'text/html'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = `${c.name.replace(/[^a-zA-Z0-9]/g,'-')}.html`; a.click();
  URL.revokeObjectURL(url);
}

function copyShareText() {
  const c = getActive(); if (!c) return;
  let txt = `${c.name} (${CANVAS_TYPES[c.type].name})\n${'='.repeat(40)}\n\n`;
  CANVAS_TYPES[c.type].sections.forEach(sec => {
    const items = c.sections[sec.id]||[];
    txt += `${sec.title}:\n`;
    if (items.length === 0) txt += '  (empty)\n';
    else items.forEach(i => txt += `  • ${i.text}\n`);
    txt += '\n';
  });
  navigator.clipboard.writeText(txt).then(() => alert('Copied to clipboard!'));
}

function importData() {
  const input = document.createElement('input'); input.type = 'file'; input.accept = '.json';
  input.onchange = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        if (Array.isArray(data)) {
          state.canvases = data;
          state.activeId = data.length > 0 ? data[0].id : null;
          save(); render();
          alert(`Imported ${data.length} canvases!`);
        }
      } catch(e) { alert('Invalid JSON file'); }
    };
    reader.readAsText(file);
  };
  input.click();
}

// ===================== KEYBOARD =====================
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') {
    if (e.key === 'Escape') { e.target.blur(); if (state.modal) { state.modal = null; render(); } }
    return;
  }
  if (e.key === 'n' || e.key === 'N') { e.preventDefault(); showNewModal(); }
  if (e.key === '/') { e.preventDefault(); document.querySelector('.sidebar-search input')?.focus(); }
  if (e.key === '1') { state.view = 'canvas'; render(); }
  if (e.key === '2') { state.view = 'dashboard'; render(); }
  if (e.key === '3') { state.view = 'export'; render(); }
  if (e.key === 'd' || e.key === 'D') { e.preventDefault(); duplicateCanvas(); }
  if (e.key === 'e' || e.key === 'E') { e.preventDefault(); exportMarkdown(); }
  if (e.key === 'Escape') { if (state.modal) { state.modal = null; render(); } }
  if (e.key === '?') {
    alert('Keyboard Shortcuts:\n\nN = New canvas\n/ = Search\n1 = Canvas view\n2 = Dashboard\n3 = Export\nD = Duplicate\nE = Export Markdown\nEsc = Close modal\n\nIn cells: Enter = Add item');
  }
});

// ===================== INIT =====================
load();
seed();
render();
</script>
</body>
