<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Habit Stack — Daily Habit Tracker</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f1117;--surface:#1a1d27;--surface2:#242836;--surface3:#2e3347;--border:#363b50;--text:#e8eaed;--text2:#9ba1b0;--text3:#6b7185;--accent:#6c5ce7;--accent2:#a78bfa;--green:#22c55e;--green2:#16a34a;--yellow:#eab308;--orange:#f97316;--red:#ef4444;--blue:#3b82f6;--pink:#ec4899;--cyan:#06b6d4;--emerald:#10b981;--radius:10px;--shadow:0 4px 24px rgba(0,0,0,.3)}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:var(--text)}
input,textarea,select{font-family:inherit;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:8px 12px;outline:none;width:100%}
input:focus,textarea:focus,select:focus{border-color:var(--accent)}
textarea{resize:vertical;min-height:60px}

.app{display:flex;height:100vh}

/* Sidebar */
.sidebar{width:240px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sidebar-header{padding:20px;border-bottom:1px solid var(--border)}
.sidebar-header h1{font-size:20px;font-weight:700;display:flex;align-items:center;gap:8px}
.sidebar-header h1 span{font-size:22px}
.sidebar-header p{font-size:11px;color:var(--text3);margin-top:4px}
.nav{flex:1;padding:8px;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;font-size:14px;cursor:pointer;transition:.15s;color:var(--text2)}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:var(--accent);color:#fff}
.nav-item .icon{font-size:16px;width:20px;text-align:center}
.nav-item .badge{margin-left:auto;background:var(--surface3);padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.nav-item.active .badge{background:rgba(255,255,255,.2)}
.sidebar-footer{padding:12px;border-top:1px solid var(--border);display:flex;gap:6px;flex-wrap:wrap}
.sidebar-footer button{flex:1;padding:6px;border-radius:6px;font-size:11px;background:var(--surface2);color:var(--text2);transition:.15s;min-width:50px}
.sidebar-footer button:hover{background:var(--surface3);color:var(--text)}

/* Main */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;border-bottom:1px solid var(--border);gap:12px;flex-shrink:0}
.topbar h2{font-size:18px;font-weight:600}
.topbar-actions{display:flex;gap:8px;align-items:center}
.btn{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:500;transition:.15s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:#5b4bd6}
.btn-secondary{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}
.btn-secondary:hover{background:var(--surface3);color:var(--text)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-danger{background:var(--red);color:#fff}
.btn-danger:hover{background:#dc2626}
.search-box{position:relative}
.search-box input{padding-left:32px;width:200px;font-size:13px}
.search-box::before{content:'🔍';position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:12px}

.content{flex:1;overflow-y:auto;padding:24px}

/* Date Navigation */
.date-nav{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.date-nav button{background:var(--surface2);border:1px solid var(--border);padding:8px 12px;border-radius:8px;font-size:20px;line-height:1}
.date-nav button:hover{background:var(--surface3)}
.date-nav .date-display{font-size:18px;font-weight:600;min-width:200px;text-align:center}
.date-nav .date-display small{display:block;font-size:12px;color:var(--text3);font-weight:400;margin-top:2px}
.today-btn{font-size:12px!important;padding:6px 12px!important}

/* Habit Cards */
.habits-grid{display:flex;flex-direction:column;gap:8px}
.habit-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;display:flex;align-items:center;gap:16px;transition:.15s;cursor:pointer}
.habit-card:hover{border-color:var(--accent);transform:translateY(-1px)}
.habit-card.completed{border-color:var(--green);background:rgba(34,197,94,.05)}
.habit-check{width:32px;height:32px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:16px;transition:.2s;flex-shrink:0}
.habit-card.completed .habit-check{background:var(--green);border-color:var(--green);color:#fff}
.habit-card.skipped .habit-check{background:var(--yellow);border-color:var(--yellow);color:#fff}
.habit-info{flex:1;min-width:0}
.habit-name{font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px}
.habit-name .emoji{font-size:18px}
.habit-desc{font-size:12px;color:var(--text3);margin-top:2px}
.habit-meta{display:flex;gap:12px;margin-top:6px;flex-wrap:wrap}
.habit-meta span{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:4px}
.habit-streak{color:var(--orange)!important;font-weight:600}
.habit-category{padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;text-transform:uppercase}
.habit-actions{display:flex;gap:4px}
.habit-actions button{padding:4px 8px;border-radius:6px;font-size:18px;background:var(--surface2);transition:.15s}
.habit-actions button:hover{background:var(--surface3)}

/* Category colors */
.cat-health{background:rgba(34,197,94,.15);color:var(--green)}
.cat-fitness{background:rgba(59,130,246,.15);color:var(--blue)}
.cat-learning{background:rgba(168,85,247,.15);color:#a855f7}
.cat-productivity{background:rgba(249,115,22,.15);color:var(--orange)}
.cat-mindfulness{background:rgba(6,182,212,.15);color:var(--cyan)}
.cat-social{background:rgba(236,72,153,.15);color:var(--pink)}
.cat-finance{background:rgba(234,179,8,.15);color:var(--yellow)}
.cat-creative{background:rgba(16,185,129,.15);color:var(--emerald)}

/* Week strip */
.week-strip{display:flex;gap:4px;margin-bottom:20px}
.week-day{flex:1;text-align:center;padding:10px 4px;border-radius:8px;background:var(--surface);border:1px solid var(--border);cursor:pointer;transition:.15s}
.week-day:hover{border-color:var(--accent)}
.week-day.today{border-color:var(--accent);background:var(--surface2)}
.week-day.selected{border-color:var(--accent);background:var(--accent);color:#fff}
.week-day .dow{font-size:10px;color:var(--text3);text-transform:uppercase;margin-bottom:2px}
.week-day.selected .dow{color:rgba(255,255,255,.7)}
.week-day .dom{font-size:16px;font-weight:600}
.week-day .dots{display:flex;gap:2px;justify-content:center;margin-top:4px;min-height:6px}
.week-day .dots .dot{width:5px;height:5px;border-radius:50%;background:var(--green)}
.week-day .dots .dot.missed{background:var(--red)}
.week-day .dots .dot.partial{background:var(--yellow)}

/* Stats cards */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:24px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
.stat-card .label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px}
.stat-card .value{font-size:28px;font-weight:700;margin-top:4px}
.stat-card .sub{font-size:12px;color:var(--text2);margin-top:2px}
.stat-card .value.green{color:var(--green)}
.stat-card .value.orange{color:var(--orange)}
.stat-card .value.accent{color:var(--accent)}
.stat-card .value.blue{color:var(--blue)}

/* Heatmap */
.heatmap-container{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:24px}
.heatmap-container h3{font-size:14px;font-weight:600;margin-bottom:12px}
.heatmap{display:flex;gap:3px;overflow-x:auto;padding-bottom:8px}
.heatmap-week{display:flex;flex-direction:column;gap:3px}
.heatmap-cell{width:14px;height:14px;border-radius:3px;background:var(--surface2)}
.heatmap-cell.l1{background:rgba(34,197,94,.2)}
.heatmap-cell.l2{background:rgba(34,197,94,.4)}
.heatmap-cell.l3{background:rgba(34,197,94,.6)}
.heatmap-cell.l4{background:var(--green)}
.heatmap-cell.future{background:var(--surface);opacity:.3}
.heatmap-labels{display:flex;gap:3px;margin-right:8px;flex-direction:column}
.heatmap-labels span{font-size:9px;color:var(--text3);height:14px;line-height:14px}
.heatmap-legend{display:flex;align-items:center;gap:4px;margin-top:8px;font-size:10px;color:var(--text3)}
.heatmap-legend .cell{width:12px;height:12px;border-radius:2px}

/* Charts */
.chart-container{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:24px}
.chart-container h3{font-size:14px;font-weight:600;margin-bottom:16px}
.bar-chart{display:flex;align-items:flex-end;gap:8px;height:160px;padding:0 4px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.bar{border-radius:4px 4px 0 0;min-height:2px;width:100%;max-width:40px;transition:.3s}
.bar-label{font-size:10px;color:var(--text3)}
.bar-value{font-size:10px;font-weight:600;color:var(--text2)}

/* Category breakdown */
.category-bars{display:flex;flex-direction:column;gap:8px}
.cat-bar-row{display:flex;align-items:center;gap:12px}
.cat-bar-row .cat-name{font-size:12px;width:100px;text-align:right;color:var(--text2)}
.cat-bar-row .cat-track{flex:1;height:20px;background:var(--surface2);border-radius:4px;overflow:hidden}
.cat-bar-row .cat-fill{height:100%;border-radius:4px;transition:.3s}
.cat-bar-row .cat-pct{font-size:11px;color:var(--text3);width:40px}

/* Streak list */
.streak-list{display:flex;flex-direction:column;gap:8px}
.streak-item{display:flex;align-items:center;gap:12px;padding:10px;background:var(--surface2);border-radius:8px}
.streak-item .emoji{font-size:20px}
.streak-item .info{flex:1}
.streak-item .info .name{font-size:13px;font-weight:600}
.streak-item .info .sub{font-size:11px;color:var(--text3)}
.streak-item .streak-val{font-size:20px;font-weight:700;color:var(--orange)}
.streak-item .streak-val small{font-size:11px;font-weight:400;color:var(--text3)}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:1000;opacity:0;pointer-events:none;transition:.2s}
.modal-overlay.show{opacity:1;pointer-events:all}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;width:480px;max-width:90vw;max-height:85vh;overflow-y:auto;box-shadow:var(--shadow)}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border)}
.modal-header h3{font-size:16px;font-weight:600}
.modal-header button{font-size:20px;color:var(--text3);padding:4px}
.modal-body{padding:20px;display:flex;flex-direction:column;gap:14px}
.modal-footer{padding:16px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-group label{font-size:12px;color:var(--text2);font-weight:500}
.form-row{display:flex;gap:12px}
.form-row .form-group{flex:1}
.emoji-pick{display:flex;gap:6px;flex-wrap:wrap}
.emoji-pick button{font-size:20px;padding:6px 8px;border-radius:6px;background:var(--surface2);transition:.15s}
.emoji-pick button:hover,.emoji-pick button.sel{background:var(--accent);transform:scale(1.1)}
.freq-pills{display:flex;gap:6px;flex-wrap:wrap}
.freq-pill{padding:6px 12px;border-radius:6px;font-size:12px;background:var(--surface2);border:1px solid var(--border);transition:.15s;cursor:pointer}
.freq-pill:hover,.freq-pill.sel{background:var(--accent);border-color:var(--accent);color:#fff}
.day-pills{display:flex;gap:4px;flex-wrap:wrap}
.day-pill{width:36px;height:36px;border-radius:50%;font-size:11px;display:flex;align-items:center;justify-content:center;background:var(--surface2);border:1px solid var(--border);transition:.15s;cursor:pointer}
.day-pill:hover,.day-pill.sel{background:var(--accent);border-color:var(--accent);color:#fff}

/* Empty */
.empty{text-align:center;padding:60px 20px;color:var(--text3)}
.empty .icon{font-size:48px;margin-bottom:12px}
.empty p{font-size:14px;margin-bottom:16px}

/* Stack view */
.stack-chain{display:flex;flex-direction:column;gap:0;margin-bottom:24px}
.stack-chain .stack-item{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--surface);border:1px solid var(--border);position:relative}
.stack-chain .stack-item:first-child{border-radius:var(--radius) var(--radius) 0 0}
.stack-chain .stack-item:last-child{border-radius:0 0 var(--radius) var(--radius)}
.stack-chain .stack-item:not(:last-child){border-bottom:none}
.stack-chain .stack-item:not(:last-child)::after{content:'↓';position:absolute;bottom:-12px;left:24px;font-size:12px;color:var(--accent);z-index:1;background:var(--bg);padding:0 4px}
.stack-chain .stack-item .num{font-size:11px;color:var(--text3);width:20px;text-align:center}
.stack-chain .stack-item .emoji{font-size:18px}
.stack-chain .stack-item .name{flex:1;font-size:14px;font-weight:500}
.stack-chain .stack-item .check-mini{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px}
.stack-chain .stack-item .check-mini.done{background:var(--green);border-color:var(--green);color:#fff}

/* Stacks management */
.stacks-list{display:flex;flex-direction:column;gap:16px}
.stack-block{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
.stack-block h4{font-size:14px;font-weight:600;margin-bottom:4px;display:flex;align-items:center;gap:8px}
.stack-block .stack-desc{font-size:12px;color:var(--text3);margin-bottom:12px}
.stack-block .stack-actions{display:flex;gap:6px;margin-top:8px}

/* Toast */
.toast{position:fixed;bottom:24px;right:24px;background:var(--surface2);border:1px solid var(--border);padding:12px 20px;border-radius:8px;font-size:13px;box-shadow:var(--shadow);transform:translateY(100px);opacity:0;transition:.3s;z-index:2000}
.toast.show{transform:translateY(0);opacity:1}

/* Keyboard help */
.kb-help{position:fixed;bottom:16px;left:256px;font-size:11px;color:var(--text3);display:flex;gap:12px}
.kb-help kbd{background:var(--surface2);border:1px solid var(--border);padding:2px 6px;border-radius:4px;font-size:10px;font-family:inherit}

/* Scrollbar */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--border)}

/* Responsive */
@media(max-width:768px){
  .sidebar{width:200px}
  .stats-row{grid-template-columns:repeat(2,1fr)}
  .week-strip{overflow-x:auto}
  .kb-help{display:none}
}
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="sidebar-header">
      <h1><span>🌱</span> Habit Stack</h1>
      <p>Build better, one day at a time</p>
    </div>
    <div class="nav" id="nav"></div>
    <div class="sidebar-footer">
      <button onclick="exportData()" title="Export">📤 Export</button>
      <button onclick="importData()" title="Import">📥 Import</button>
      <button onclick="showHelp()" title="Help">❓ Help</button>
    </div>
  </div>
  <div class="main">
    <div class="topbar" id="topbar"></div>
    <div class="content" id="content"></div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal"></div>
</div>

<div class="toast" id="toast"></div>
<div class="kb-help">
  <span><kbd>N</kbd> New habit</span>
  <span><kbd>/</kbd> Search</span>
  <span><kbd>1-5</kbd> Views</span>
  <span><kbd>?</kbd> Help</span>
</div>

<input type="file" id="fileInput" style="display:none" accept=".json" onchange="handleImport(event)">

<script>
// ===== STATE =====
const CATEGORIES = [
  {id:'health',name:'Health',emoji:'💚',color:'#22c55e'},
  {id:'fitness',name:'Fitness',emoji:'💪',color:'#3b82f6'},
  {id:'learning',name:'Learning',emoji:'📚',color:'#a855f7'},
  {id:'productivity',name:'Productivity',emoji:'⚡',color:'#f97316'},
  {id:'mindfulness',name:'Mindfulness',emoji:'🧘',color:'#06b6d4'},
  {id:'social',name:'Social',emoji:'👥',color:'#ec4899'},
  {id:'finance',name:'Finance',emoji:'💰',color:'#eab308'},
  {id:'creative',name:'Creative',emoji:'🎨',color:'#10b981'}
];

const EMOJIS = ['🏃','💪','📖','✍️','🧘','💧','🥗','💊','🎯','⏰','🧠','💤','📱','🎸','🌍','💰','📝','🏋️','🧑‍💻','☕','🌅','📞','🎨','🧹','📊','🙏','🫀','🍎','🚶','💻'];

const FREQ = {daily:'Daily',weekdays:'Weekdays',weekends:'Weekends',custom:'Custom Days'};

let state = {
  habits: [],
  completions: {}, // {habitId: {dateStr: 'done'|'skipped'}}
  stacks: [],
  selectedDate: todayStr(),
  view: 'today',
  search: ''
};

function todayStr() { return fmtDate(new Date()); }
function fmtDate(d) { return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function parseDate(s) { const [y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d); }
function dayName(d) { return ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()]; }
function fullDayName(d) { return ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][d.getDay()]; }
function monthName(d) { return ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()]; }
function uid() { return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }

// ===== PERSISTENCE =====
function save() { localStorage.setItem('habitstack_data', JSON.stringify(state)); }
function load() {
  try {
    const d = JSON.parse(localStorage.getItem('habitstack_data'));
    if(d) { state = {...state, ...d}; state.selectedDate = state.selectedDate || todayStr(); }
    else seedData();
  } catch(e) { seedData(); }
}

// ===== COMPLETION HELPERS =====
function getStatus(habitId, dateStr) {
  return state.completions[habitId]?.[dateStr] || 'pending';
}
function setStatus(habitId, dateStr, status) {
  if(!state.completions[habitId]) state.completions[habitId] = {};
  if(status === 'pending') delete state.completions[habitId][dateStr];
  else state.completions[habitId][dateStr] = status;
  save();
}
function toggleHabit(habitId) {
  const cur = getStatus(habitId, state.selectedDate);
  if(cur === 'pending') setStatus(habitId, state.selectedDate, 'done');
  else if(cur === 'done') setStatus(habitId, state.selectedDate, 'skipped');
  else setStatus(habitId, state.selectedDate, 'pending');
  render();
}

// ===== HABIT HELPERS =====
function isDueOn(habit, dateStr) {
  const d = parseDate(dateStr);
  const day = d.getDay();
  if(habit.frequency === 'daily') return true;
  if(habit.frequency === 'weekdays') return day >= 1 && day <= 5;
  if(habit.frequency === 'weekends') return day === 0 || day === 6;
  if(habit.frequency === 'custom') return (habit.customDays || []).includes(day);
  return true;
}

function getStreak(habitId) {
  let streak = 0;
  const d = new Date();
  d.setDate(d.getDate()); // start from today
  const habit = state.habits.find(h => h.id === habitId);
  if(!habit) return 0;
  // If today is not done, start from yesterday
  if(getStatus(habitId, fmtDate(d)) !== 'done') d.setDate(d.getDate()-1);
  while(true) {
    const ds = fmtDate(d);
    if(!isDueOn(habit, ds)) { d.setDate(d.getDate()-1); continue; }
    if(getStatus(habitId, ds) === 'done') { streak++; d.setDate(d.getDate()-1); }
    else break;
    if(streak > 365) break;
  }
  return streak;
}

function getBestStreak(habitId) {
  const habit = state.habits.find(h => h.id === habitId);
  if(!habit) return 0;
  let best = 0, cur = 0;
  const comps = state.completions[habitId] || {};
  const dates = Object.keys(comps).sort();
  if(dates.length === 0) return 0;
  const start = parseDate(dates[0]);
  const end = new Date();
  const d = new Date(start);
  while(d <= end) {
    const ds = fmtDate(d);
    if(isDueOn(habit, ds)) {
      if(comps[ds] === 'done') { cur++; best = Math.max(best, cur); }
      else cur = 0;
    }
    d.setDate(d.getDate()+1);
  }
  return best;
}

function getCompletionRate(habitId, days=30) {
  const habit = state.habits.find(h => h.id === habitId);
  if(!habit) return 0;
  let due = 0, done = 0;
  const d = new Date();
  for(let i = 0; i < days; i++) {
    const ds = fmtDate(d);
    if(isDueOn(habit, ds)) {
      due++;
      if(getStatus(habitId, ds) === 'done') done++;
    }
    d.setDate(d.getDate()-1);
  }
  return due > 0 ? Math.round(done/due*100) : 0;
}

function getTodayDueHabits() {
  return state.habits.filter(h => isDueOn(h, state.selectedDate));
}

function getTodayCompletedCount() {
  return getTodayDueHabits().filter(h => getStatus(h.id, state.selectedDate) === 'done').length;
}

// ===== NAVIGATION =====
function renderNav() {
  const dueToday = getTodayDueHabits().length;
  const doneToday = getTodayCompletedCount();
  const views = [
    {id:'today',icon:'📅',label:'Today',badge:`${doneToday}/${dueToday}`},
    {id:'habits',icon:'🌱',label:'All Habits',badge:state.habits.length},
    {id:'stacks',icon:'📚',label:'Stacks',badge:state.stacks.length},
    {id:'streaks',icon:'🔥',label:'Streaks'},
    {id:'dashboard',icon:'📊',label:'Dashboard'}
  ];
  document.getElementById('nav').innerHTML = views.map(v => `
    <div class="nav-item ${state.view===v.id?'active':''}" onclick="setView('${v.id}')">
      <span class="icon">${v.icon}</span>
      ${v.label}
      ${v.badge !== undefined ? `<span class="badge">${v.badge}</span>` : ''}
    </div>
  `).join('');
}

function setView(v) { state.view = v; render(); }

// ===== RENDER =====
function render() {
  renderNav();
  const topbar = document.getElementById('topbar');
  const content = document.getElementById('content');

  switch(state.view) {
    case 'today': renderToday(topbar, content); break;
    case 'habits': renderHabits(topbar, content); break;
    case 'stacks': renderStacks(topbar, content); break;
    case 'streaks': renderStreaks(topbar, content); break;
    case 'dashboard': renderDashboard(topbar, content); break;
  }
}

  html += '<div class="chart-container"><h3>📂 Category Breakdown</h3><div class="category-bars">';

    const catHabits = state.habits.filter(h => h.category === cat.id);

function renderHeatmap() {
  const today = new Date();
  const start = new Date(today);
  start.setDate(start.getDate() - 89);
  // Align to Sunday
  start.setDate(start.getDate() - start.getDay());

  let html = '<div class="heatmap-container"><h3>🗓 90-Day Activity</h3><div style="display:flex"><div class="heatmap-labels">';
  ['','Mon','','Wed','','Fri',''].forEach(l => { html += `<span>${l}</span>`; });
  html += '</div><div class="heatmap">';

  const d = new Date(start);
  while(d <= today || d.getDay() !== 0) {
    html += '<div class="heatmap-week">';
    for(let dow = 0; dow < 7; dow++) {
      const ds = fmtDate(d);
      if(d > today) {
        html += '<div class="heatmap-cell future"></div>';
      } else {
        const due = state.habits.filter(h => isDueOn(h, ds)).length;
        const done = state.habits.filter(h => isDueOn(h, ds) && getStatus(h.id, ds)==='done').length;
        const pct = due > 0 ? done/due : 0;
        const lvl = pct === 0 ? '' : pct <= 0.25 ? 'l1' : pct <= 0.5 ? 'l2' : pct <= 0.75 ? 'l3' : 'l4';
        html += `<div class="heatmap-cell ${lvl}" title="${ds}: ${done}/${due}"></div>`;
      }
      d.setDate(d.getDate()+1);
    }
    html += '</div>';
    if(d > today && d.getDay() === 0) break;
  }

  html += '</div></div>';
  html += '<div class="heatmap-legend">Less <div class="cell" style="background:var(--surface2)"></div><div class="cell" style="background:rgba(34,197,94,.2)"></div><div class="cell" style="background:rgba(34,197,94,.4)"></div><div class="cell" style="background:rgba(34,197,94,.6)"></div><div class="cell" style="background:var(--green)"></div> More</div>';
  html += '</div>';
  return html;
}

      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveHabit('${editId||''}')">${isEdit ? 'Save' : 'Create'}</button>
    </div>`;

  document.getElementById('modal').innerHTML = html;
  document.getElementById('modalOverlay').classList.add('show');
  setTimeout(() => document.getElementById('habitName')?.focus(), 100);
}

function pickEmoji(btn, emoji) {
  document.querySelectorAll('#emojiPick button').forEach(b => b.classList.remove('sel'));
  btn.classList.add('sel');
  document.getElementById('habitEmoji').value = emoji;
}
function pickFreq(el, freq) {
  document.querySelectorAll('.freq-pill').forEach(p => p.classList.remove('sel'));
  el.classList.add('sel');
  document.getElementById('habitFreq').value = freq;
  document.getElementById('customDaysGroup').style.display = freq==='custom'?'block':'none';
}
function pickDay(el, day) { el.classList.toggle('sel'); }
function pickColor(el, color) {
  el.parentElement.querySelectorAll('div').forEach(d => d.style.borderColor = 'transparent');
  el.style.borderColor = '#fff';
  document.getElementById('habitColor').value = color;
}

function saveHabit(editId) {
  const name = document.getElementById('habitName').value.trim();
  if(!name) { toast('Name is required'); return; }

  const freq = document.getElementById('habitFreq').value;
  const customDays = [];
  if(freq === 'custom') {
    document.querySelectorAll('.day-pill.sel').forEach(el => {
      const match = el.onclick.toString().match(/pickDay\(this,(\d)\)/);
      if(match) customDays.push(parseInt(match[1]));
    });
  }

  const data = {
    name,
    emoji: document.getElementById('habitEmoji').value,
    description: document.getElementById('habitDesc').value.trim(),
    category: document.getElementById('habitCat').value,
    time: document.getElementById('habitTime').value,
    frequency: freq,
    customDays,
    color: document.getElementById('habitColor').value
  };

  if(editId) {
    const idx = state.habits.findIndex(h => h.id === editId);
    if(idx >= 0) state.habits[idx] = {...state.habits[idx], ...data};
  } else {
    state.habits.push({id: uid(), ...data, createdAt: new Date().toISOString()});
  }

  save();
  closeModal();
  render();
  toast(editId ? 'Habit updated!' : 'Habit created! 🌱');
}

function deleteHabit(id) {
  if(!confirm('Delete this habit? History will be lost.')) return;
  state.habits = state.habits.filter(h => h.id !== id);
  delete state.completions[id];
  state.stacks.forEach(s => { s.habitIds = (s.habitIds||[]).filter(hid => hid !== id); });
  save();
  render();
  toast('Habit deleted');
}

// ===== STACK MODAL =====
function openStackModal(editId) {
  const stack = editId ? state.stacks.find(s => s.id === editId) : null;
  const isEdit = !!stack;

  let html = `
    <div class="modal-header">
      <h3>${isEdit ? 'Edit' : 'New'} Stack</h3>
      <button onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Stack Name *</label>
        <input id="stackName" value="${stack?.name || ''}" placeholder="e.g., Morning Routine">
      </div>
      <div class="form-group">
        <label>Description</label>
        <input id="stackDesc" value="${stack?.description || ''}" placeholder="What's this stack for?">
      </div>
      <div class="form-group">
        <label>Emoji</label>
        <div class="emoji-pick" id="stackEmojiPick">
          ${['📚','🌅','🌙','💪','🧠','⚡','🎯','☕','🏃','🧘'].map(e => `<button class="${stack?.emoji===e?'sel':''}" onclick="pickStackEmoji(this,'${e}')">${e}</button>`).join('')}
        </div>
        <input type="hidden" id="stackEmoji" value="${stack?.emoji || '📚'}">
      </div>
      <div class="form-group">
        <label>Habits in order (check to include, drag to reorder)</label>
        <div id="stackHabitList" style="display:flex;flex-direction:column;gap:4px;margin-top:4px">
          ${state.habits.map(h => `
            <label style="display:flex;align-items:center;gap:8px;padding:8px;background:var(--surface2);border-radius:6px;cursor:pointer">
              <input type="checkbox" value="${h.id}" ${(stack?.habitIds||[]).includes(h.id)?'checked':''}>
              <span>${h.emoji} ${h.name}</span>
            </label>
          `).join('')}
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveStack('${editId||''}')">${isEdit ? 'Save' : 'Create'}</button>
    </div>`;

  document.getElementById('modal').innerHTML = html;
  document.getElementById('modalOverlay').classList.add('show');
}

function pickStackEmoji(btn, emoji) {
  document.querySelectorAll('#stackEmojiPick button').forEach(b => b.classList.remove('sel'));
  btn.classList.add('sel');
  document.getElementById('stackEmoji').value = emoji;
}

function saveStack(editId) {
  const name = document.getElementById('stackName').value.trim();
  if(!name) { toast('Name is required'); return; }

  const habitIds = [];
  document.querySelectorAll('#stackHabitList input:checked').forEach(cb => habitIds.push(cb.value));

  const data = {
    name,
    description: document.getElementById('stackDesc').value.trim(),
    emoji: document.getElementById('stackEmoji').value,
    habitIds
  };

  if(editId) {
    const idx = state.stacks.findIndex(s => s.id === editId);
    if(idx >= 0) state.stacks[idx] = {...state.stacks[idx], ...data};
  } else {
    state.stacks.push({id: uid(), ...data});
  }

  save();
  closeModal();
  render();
  toast(editId ? 'Stack updated!' : 'Stack created! 📚');
}

function deleteStack(id) {
  if(!confirm('Delete this stack?')) return;
  state.stacks = state.stacks.filter(s => s.id !== id);
  save();
  render();
  toast('Stack deleted');
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('show'); }

// ===== IMPORT/EXPORT =====
function exportData() {
  const blob = new Blob([JSON.stringify(state, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `habitstack-${todayStr()}.json`;
  a.click();
  toast('Exported!');
}
function importData() { document.getElementById('fileInput').click(); }
function handleImport(e) {
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const data = JSON.parse(ev.target.result);
      state = {...state, ...data};
      save();
      render();
      toast('Imported successfully!');
    } catch(err) { toast('Invalid file'); }
  };
  reader.readAsText(file);
  e.target.value = '';
}

// ===== HELP =====
function showHelp() {
  document.getElementById('modal').innerHTML = `
    <div class="modal-header"><h3>⌨️ Keyboard Shortcuts</h3><button onclick="closeModal()">✕</button></div>
    <div class="modal-body" style="font-size:13px">
      <div style="display:grid;grid-template-columns:60px 1fr;gap:8px;align-items:center">
        <kbd style="background:var(--surface2);border:1px solid var(--border);padding:4px 8px;border-radius:4px;text-align:center;font-family:inherit;font-size:12px">N</kbd> <span>New habit</span>
        <kbd style="background:var(--surface2);border:1px solid var(--border);padding:4px 8px;border-radius:4px;text-align:center;font-family:inherit;font-size:12px">/</kbd> <span>Focus search</span>
        <kbd style="background:var(--surface2);border:1px solid var(--border);padding:4px 8px;border-radius:4px;text-align:center;font-family:inherit;font-size:12px">1-5</kbd> <span>Switch views</span>
        <kbd style="background:var(--surface2);border:1px solid var(--border);padding:4px 8px;border-radius:4px;text-align:center;font-family:inherit;font-size:12px">←/→</kbd> <span>Navigate days</span>
        <kbd style="background:var(--surface2);border:1px solid var(--border);padding:4px 8px;border-radius:4px;text-align:center;font-family:inherit;font-size:12px">T</kbd> <span>Jump to today</span>
        <kbd style="background:var(--surface2);border:1px solid var(--border);padding:4px 8px;border-radius:4px;text-align:center;font-family:inherit;font-size:12px">E</kbd> <span>Export data</span>
        <kbd style="background:var(--surface2);border:1px solid var(--border);padding:4px 8px;border-radius:4px;text-align:center;font-family:inherit;font-size:12px">I</kbd> <span>Import data</span>
        <kbd style="background:var(--surface2);border:1px solid var(--border);padding:4px 8px;border-radius:4px;text-align:center;font-family:inherit;font-size:12px">?</kbd> <span>This help</span>
        <kbd style="background:var(--surface2);border:1px solid var(--border);padding:4px 8px;border-radius:4px;text-align:center;font-family:inherit;font-size:12px">Esc</kbd> <span>Close modal</span>
      </div>
      <div style="margin-top:16px;padding-top:16px;border-top:1px solid var(--border)">
        <h4 style="margin-bottom:8px">💡 About Habit Stacking</h4>
        <p style="color:var(--text2);line-height:1.6">Habit stacking is a technique from James Clear's <em>Atomic Habits</em>. Link new habits to existing ones: "After I [current habit], I will [new habit]." This uses existing neural pathways to build new routines.</p>
      </div>
    </div>`;
  document.getElementById('modalOverlay').classList.add('show');
}

// ===== TOAST =====
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

// ===== KEYBOARD =====
document.addEventListener('keydown', e => {
  if(document.getElementById('modalOverlay').classList.contains('show')) {
    if(e.key === 'Escape') closeModal();
    if(e.key === 'Enter' && e.metaKey) {
      const saveBtn = document.querySelector('.modal-footer .btn-primary');
      if(saveBtn) saveBtn.click();
    }
    return;
  }
  if(e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;

  const viewKeys = {'1':'today','2':'habits','3':'stacks','4':'streaks','5':'dashboard'};
  if(viewKeys[e.key]) { e.preventDefault(); setView(viewKeys[e.key]); }
  if(e.key === 'n' || e.key === 'N') { e.preventDefault(); openHabitModal(); }
  if(e.key === '/') { e.preventDefault(); const s = document.querySelector('.search-box input'); if(s) s.focus(); }
  if(e.key === 'ArrowLeft') { e.preventDefault(); navDate(-1); }
  if(e.key === 'ArrowRight') { e.preventDefault(); navDate(1); }
  if(e.key === 't' || e.key === 'T') { e.preventDefault(); state.selectedDate = todayStr(); render(); }
  if(e.key === 'e' || e.key === 'E') { e.preventDefault(); exportData(); }
  if(e.key === 'i' || e.key === 'I') { e.preventDefault(); importData(); }
  if(e.key === '?') { e.preventDefault(); showHelp(); }
});

// ===== SEED DATA =====
function seedData() {
  const habits = [
    {id:'h1',name:'Morning Run',emoji:'🏃',description:'30 min jog around the park',category:'fitness',frequency:'weekdays',customDays:[],time:'06:30',color:'#3b82f6',createdAt:'2026-03-01T00:00:00Z'},
    {id:'h2',name:'Read 20 Pages',emoji:'📖',description:'Non-fiction or product books',category:'learning',frequency:'daily',customDays:[],time:'22:00',color:'#a855f7',createdAt:'2026-03-01T00:00:00Z'},
    {id:'h3',name:'Meditate',emoji:'🧘',description:'10 minutes mindfulness',category:'mindfulness',frequency:'daily',customDays:[],time:'07:00',color:'#06b6d4',createdAt:'2026-03-01T00:00:00Z'},
    {id:'h4',name:'Drink 3L Water',emoji:'💧',description:'Track throughout the day',category:'health',frequency:'daily',customDays:[],time:'',color:'#22c55e',createdAt:'2026-03-01T00:00:00Z'},
    {id:'h5',name:'Ship Something',emoji:'🚀',description:'Code, content, or a decision — ship daily',category:'productivity',frequency:'weekdays',customDays:[],time:'',color:'#f97316',createdAt:'2026-03-01T00:00:00Z'},
    {id:'h6',name:'LinkedIn Post',emoji:'📝',description:'Build in public — one post a day',category:'creative',frequency:'weekdays',customDays:[],time:'09:00',color:'#10b981',createdAt:'2026-03-15T00:00:00Z'},
    {id:'h7',name:'Journal',emoji:'✍️',description:'3 things grateful + 1 lesson learned',category:'mindfulness',frequency:'daily',customDays:[],time:'22:30',color:'#ec4899',createdAt:'2026-03-01T00:00:00Z'},
    {id:'h8',name:'No Phone First Hour',emoji:'📱',description:'Morning screen detox',category:'productivity',frequency:'daily',customDays:[],time:'06:00',color:'#eab308',createdAt:'2026-03-10T00:00:00Z'},
    {id:'h9',name:'Cold Shower',emoji:'🫀',description:'2 min cold at end of shower',category:'health',frequency:'daily',customDays:[],time:'07:15',color:'#ef4444',createdAt:'2026-04-01T00:00:00Z'},
    {id:'h10',name:'Practice DSA',emoji:'🧑‍💻',description:'1 LeetCode medium for interview prep',category:'learning',frequency:'custom',customDays:[1,3,5],time:'20:00',color:'#6c5ce7',createdAt:'2026-04-10T00:00:00Z'}
  ];

  const stacks = [
    {id:'s1',name:'Morning Routine',emoji:'🌅',description:'After I wake up → phone-free → meditate → run → cold shower',habitIds:['h8','h3','h1','h9']},
    {id:'s2',name:'Evening Wind-Down',emoji:'🌙',description:'After dinner → journal → read → sleep',habitIds:['h7','h2']}
  ];

  // Generate completions for past 45 days
  const completions = {};
  habits.forEach(h => {
    completions[h.id] = {};
    const d = new Date();
    for(let i = 1; i <= 45; i++) {
      d.setDate(d.getDate() - 1);
      const ds = fmtDate(d);
      if(!isDueOnRaw(h, ds)) continue;
      // Realistic completion: ~70-85% for most habits, with some variance
      const baseRate = h.id === 'h4' ? 0.9 : h.id === 'h1' ? 0.75 : h.id === 'h9' ? 0.6 : 0.8;
      const rand = Math.random();
      if(rand < baseRate) completions[h.id][ds] = 'done';
      else if(rand < baseRate + 0.05) completions[h.id][ds] = 'skipped';
    }
    d.setTime(new Date().getTime()); // reset
  });

  state.habits = habits;
  state.stacks = stacks;
  state.completions = completions;
  save();
}

// Simplified isDueOn for seeding (before habits are in state)
function isDueOnRaw(habit, dateStr) {
  const d = parseDate(dateStr);
  const day = d.getDay();
  if(habit.frequency === 'daily') return true;
  if(habit.frequency === 'weekdays') return day >= 1 && day <= 5;
  if(habit.frequency === 'weekends') return day === 0 || day === 6;
  if(habit.frequency === 'custom') return (habit.customDays || []).includes(day);
  return true;
}
