<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tech Radar — Technology Decision Tracker</title>
<style>
:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #242836;
  --border: #2e3348;
  --text: #e4e6f0;
  --text2: #8b8fa8;
  --accent: #6c5ce7;
  --accent2: #a29bfe;
  --green: #00b894;
  --yellow: #fdcb6e;
  --orange: #e17055;
  --red: #d63031;
  --blue: #0984e3;
  --cyan: #00cec9;
  --pink: #fd79a8;
  --adopt: #00b894;
  --trial: #0984e3;
  --assess: #fdcb6e;
  --hold: #d63031;
  --q1: #6c5ce7;
  --q2: #00b894;
  --q3: #0984e3;
  --q4: #e17055;
  --radius: 10px;
  --shadow: 0 4px 24px rgba(0,0,0,0.3);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Layout */
.app { display: flex; height: 100vh; }

.sidebar {
  width: 280px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}

.sidebar-header {
  padding: 20px;
  border-bottom: 1px solid var(--border);
}

.sidebar-header h1 {
  font-size: 20px;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 8px;
}

.sidebar-header p {
  color: var(--text2);
  font-size: 12px;
  margin-top: 4px;
}

.nav-items {
  padding: 12px;
  flex: 1;
  overflow-y: auto;
}

.nav-item {
  padding: 10px 14px;
  border-radius: 8px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 14px;
  color: var(--text2);
  transition: all 0.15s;
  margin-bottom: 2px;
}

.nav-item:hover { background: var(--surface2); color: var(--text); }
.nav-item.active { background: var(--accent); color: white; }
.nav-item .badge {
  margin-left: auto;
  background: var(--surface2);
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 11px;
}
.nav-item.active .badge { background: rgba(255,255,255,0.2); }

.sidebar-footer {
  padding: 12px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 8px;
}

.sidebar-footer button {
  flex: 1;
  padding: 8px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text);
  cursor: pointer;
  font-size: 12px;
  transition: all 0.15s;
}
.sidebar-footer button:hover { border-color: var(--accent); }

.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.toolbar {
  padding: 16px 24px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--surface);
}

.toolbar h2 { font-size: 18px; font-weight: 600; }

.search-box {
  margin-left: auto;
  position: relative;
}

.search-box input {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 12px 8px 32px;
  color: var(--text);
  font-size: 13px;
  width: 220px;
  outline: none;
}
.search-box input:focus { border-color: var(--accent); }
.search-box::before {
  content: '🔍';
  position: absolute;
  left: 10px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 12px;
}

.btn {
  padding: 8px 16px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  transition: all 0.15s;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.btn-primary { background: var(--accent); color: white; }
.btn-primary:hover { background: var(--accent2); }
.btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
.btn-secondary:hover { border-color: var(--accent); }
.btn-sm { padding: 5px 10px; font-size: 12px; }
.btn-danger { background: var(--red); color: white; }
.btn-danger:hover { opacity: 0.9; }

.content {
  flex: 1;
  overflow-y: auto;
  padding: 24px;
}

/* Radar View */
.radar-container {
  display: flex;
  justify-content: center;
  align-items: center;
  position: relative;
  width: 100%;
  padding: 20px 0;
}

.radar-svg {
  max-width: 700px;
  max-height: 700px;
  width: 100%;
  height: auto;
}

.radar-legend {
  display: flex;
  justify-content: center;
  gap: 24px;
  margin-top: 16px;
  flex-wrap: wrap;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  color: var(--text2);
}

.legend-dot {
  width: 12px;
  height: 12px;
  border-radius: 50%;
}

.ring-legend {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 12px;
  flex-wrap: wrap;
}

.ring-item {
  font-size: 12px;
  color: var(--text2);
  display: flex;
  align-items: center;
  gap: 6px;
}

.ring-swatch {
  width: 32px;
  height: 4px;
  border-radius: 2px;
  opacity: 0.6;
}

/* Blip tooltip */
.blip-tooltip {
  position: fixed;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 16px;
  font-size: 13px;
  z-index: 1000;
  pointer-events: none;
  box-shadow: var(--shadow);
  max-width: 260px;
  display: none;
}

.blip-tooltip .tt-name { font-weight: 600; margin-bottom: 4px; }
.blip-tooltip .tt-meta { color: var(--text2); font-size: 11px; }
.blip-tooltip .tt-desc { margin-top: 6px; font-size: 12px; color: var(--text2); }

/* List View */
.list-table {
  width: 100%;
  border-collapse: collapse;
}

.list-table th {
  text-align: left;
  padding: 10px 14px;
  font-size: 12px;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  user-select: none;
}

.list-table th:hover { color: var(--text); }
.list-table th .sort-arrow { margin-left: 4px; font-size: 10px; }

.list-table td {
  padding: 12px 14px;
  border-bottom: 1px solid var(--border);
  font-size: 14px;
}

.list-table tr:hover td { background: var(--surface2); }
.list-table tr { cursor: pointer; }

.ring-badge {
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 12px;
  font-weight: 500;
  display: inline-block;
}

.ring-adopt { background: rgba(0,184,148,0.15); color: var(--adopt); }
.ring-trial { background: rgba(9,132,227,0.15); color: var(--trial); }
.ring-assess { background: rgba(253,203,110,0.15); color: var(--assess); }
.ring-hold { background: rgba(214,48,49,0.15); color: var(--hold); }

.quadrant-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 12px;
  color: var(--text2);
}

.quadrant-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
}

.movement-badge { font-size: 13px; }
.movement-new { color: var(--green); }
.movement-in { color: var(--blue); }
.movement-out { color: var(--orange); }
.movement-same { color: var(--text2); }

/* Stats View */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 16px;
  margin-bottom: 24px;
}

.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  text-align: center;
}

.stat-card .stat-num {
  font-size: 32px;
  font-weight: 700;
}

.stat-card .stat-label {
  font-size: 12px;
  color: var(--text2);
  margin-top: 4px;
}

.chart-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 16px;
}

.chart-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
}

.chart-card h3 {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 16px;
}

.bar-chart { display: flex; flex-direction: column; gap: 8px; }

.bar-row {
  display: flex;
  align-items: center;
  gap: 10px;
}

.bar-label {
  width: 100px;
  font-size: 12px;
  text-align: right;
  color: var(--text2);
  flex-shrink: 0;
}

.bar-track {
  flex: 1;
  height: 24px;
  background: var(--surface2);
  border-radius: 4px;
  overflow: hidden;
  position: relative;
}

.bar-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 0.3s;
  display: flex;
  align-items: center;
  padding-left: 8px;
  font-size: 11px;
  font-weight: 600;
  color: white;
  min-width: fit-content;
}

/* Timeline View */
.timeline {
  position: relative;
  padding-left: 32px;
}

.timeline::before {
  content: '';
  position: absolute;
  left: 12px;
  top: 0;
  bottom: 0;
  width: 2px;
  background: var(--border);
}

.timeline-item {
  position: relative;
  margin-bottom: 24px;
  padding: 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  cursor: pointer;
  transition: border-color 0.15s;
}

.timeline-item:hover { border-color: var(--accent); }

.timeline-item::before {
  content: '';
  position: absolute;
  left: -26px;
  top: 20px;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--accent);
  border: 2px solid var(--bg);
}

.timeline-date {
  font-size: 11px;
  color: var(--text2);
  margin-bottom: 4px;
}

.timeline-title {
  font-weight: 600;
  font-size: 15px;
  margin-bottom: 4px;
}

.timeline-meta {
  font-size: 12px;
  color: var(--text2);
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}

/* Modal */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 999;
  display: none;
  justify-content: center;
  align-items: center;
  backdrop-filter: blur(4px);
}

.modal-overlay.show { display: flex; }

.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 28px;
  width: 520px;
  max-width: 95vw;
  max-height: 85vh;
  overflow-y: auto;
  box-shadow: var(--shadow);
}

.modal h2 {
  font-size: 18px;
  margin-bottom: 20px;
}

.form-group {
  margin-bottom: 16px;
}

.form-group label {
  display: block;
  font-size: 12px;
  color: var(--text2);
  margin-bottom: 6px;
  font-weight: 500;
}

.form-group input, .form-group select, .form-group textarea {
  width: 100%;
  padding: 10px 12px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text);
  font-size: 14px;
  font-family: inherit;
  outline: none;
}

.form-group input:focus, .form-group select:focus, .form-group textarea:focus {
  border-color: var(--accent);
}

.form-group textarea { resize: vertical; min-height: 80px; }

.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.modal-actions {
  display: flex;
  justify-content: flex-end;
  gap: 8px;
  margin-top: 20px;
}

.tag-list {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 6px;
}

.tag {
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 12px;
  background: var(--surface2);
  color: var(--text2);
  display: inline-flex;
  align-items: center;
  gap: 4px;
}

.tag .tag-remove {
  cursor: pointer;
  opacity: 0.6;
}
.tag .tag-remove:hover { opacity: 1; }

/* Detail Panel */
.detail-panel {
  display: none;
  position: fixed;
  right: 0;
  top: 0;
  bottom: 0;
  width: 400px;
  background: var(--surface);
  border-left: 1px solid var(--border);
  z-index: 100;
  overflow-y: auto;
  box-shadow: -4px 0 24px rgba(0,0,0,0.3);
}

.detail-panel.show { display: block; }

.detail-header {
  padding: 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.detail-header h3 { font-size: 16px; }

.detail-body { padding: 20px; }

.detail-field {
  margin-bottom: 16px;
}

.detail-field label {
  font-size: 11px;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  display: block;
  margin-bottom: 4px;
}

.detail-field .value {
  font-size: 14px;
}

.detail-actions {
  padding: 16px 20px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 8px;
}

/* Keyboard shortcut help */
.kbd-help {
  position: fixed;
  bottom: 16px;
  right: 16px;
  font-size: 11px;
  color: var(--text2);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 6px 12px;
  z-index: 50;
}

kbd {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 1px 5px;
  font-size: 11px;
  font-family: inherit;
}

/* Filter pills */
.filter-bar {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.filter-pill {
  padding: 5px 12px;
  border-radius: 16px;
  font-size: 12px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text2);
  cursor: pointer;
  transition: all 0.15s;
}

.filter-pill:hover { border-color: var(--text2); }
.filter-pill.active { background: var(--accent); border-color: var(--accent); color: white; }

/* Responsive */
@media (max-width: 900px) {
  .sidebar { display: none; }
  .chart-row { grid-template-columns: 1fr; }
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text2); }
</style>
</head>
<body>

<div class="app">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">
      <h1>📡 Tech Radar</h1>
      <p>Technology Decision Tracker</p>
    </div>
    <div class="nav-items">
      <div class="nav-item active" data-view="radar" onclick="switchView('radar')">
        <span>🎯</span> Radar View <span class="badge" id="totalBadge">0</span>
      </div>
      <div class="nav-item" data-view="list" onclick="switchView('list')">
        <span>📋</span> All Technologies
      </div>
      <div class="nav-item" data-view="timeline" onclick="switchView('timeline')">
        <span>📅</span> Timeline
      </div>
      <div class="nav-item" data-view="stats" onclick="switchView('stats')">
        <span>📊</span> Insights
      </div>
      <div class="nav-item" data-view="compare" onclick="switchView('compare')">
        <span>⚖️</span> Compare Snapshots
      </div>
    </div>
    <div class="sidebar-footer">
      <button onclick="exportData()" title="Export JSON">📤 Export</button>
      <button onclick="importData()" title="Import JSON">📥 Import</button>
      <button onclick="exportPNG()" title="Export Radar as PNG">🖼️ PNG</button>
    </div>
  </div>

  <!-- Main -->
  <div class="main">
    <div class="toolbar">
      <h2 id="viewTitle">Radar View</h2>
      <div class="filter-bar" id="filterBar"></div>
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search technologies... (/)" oninput="handleSearch()">
      </div>
      <button class="btn btn-primary" onclick="openAddModal()">+ Add Blip</button>
      <button class="btn btn-secondary" onclick="takeSnapshot()">📸 Snapshot</button>
    </div>

    <div class="content" id="content"></div>
  </div>
</div>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2 id="modalTitle">Add Technology</h2>
    <input type="hidden" id="editId">
    <div class="form-group">
      <label>Name *</label>
      <input type="text" id="blipName" placeholder="e.g., React, Kubernetes, HTMX">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Quadrant *</label>
        <select id="blipQuadrant">
          <option value="languages">Languages & Frameworks</option>
          <option value="tools">Tools</option>
          <option value="platforms">Platforms & Infrastructure</option>
          <option value="techniques">Techniques & Patterns</option>
        </select>
      </div>
      <div class="form-group">
        <label>Ring *</label>
        <select id="blipRing">
          <option value="adopt">Adopt</option>
          <option value="trial">Trial</option>
          <option value="assess">Assess</option>
          <option value="hold">Hold</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Movement</label>
        <select id="blipMovement">
          <option value="new">🆕 New</option>
          <option value="moved-in">⬆️ Moved In</option>
          <option value="moved-out">⬇️ Moved Out</option>
          <option value="same">➡️ No Change</option>
        </select>
      </div>
      <div class="form-group">
        <label>Date Added</label>
        <input type="date" id="blipDate">
      </div>
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea id="blipDesc" placeholder="Why this technology? What's the context?"></textarea>
    </div>
    <div class="form-group">
      <label>Website / Docs URL</label>
      <input type="text" id="blipUrl" placeholder="https://...">
    </div>
    <div class="form-group">
      <label>Tags (press Enter to add)</label>
      <input type="text" id="tagInput" placeholder="Type and press Enter" onkeydown="handleTagInput(event)">
      <div class="tag-list" id="tagList"></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-danger" id="deleteBtn" onclick="deleteBlip()" style="display:none">Delete</button>
      <button class="btn btn-primary" onclick="saveBlip()">Save</button>
    </div>
  </div>
</div>

<!-- Tooltip -->
<div class="blip-tooltip" id="tooltip">
  <div class="tt-name"></div>
  <div class="tt-meta"></div>
  <div class="tt-desc"></div>
</div>

<!-- Detail Panel -->
<div class="detail-panel" id="detailPanel">
  <div class="detail-header">
    <h3 id="detailName"></h3>
    <button class="btn btn-sm btn-secondary" onclick="closeDetail()">✕</button>
  </div>
  <div class="detail-body" id="detailBody"></div>
  <div class="detail-actions">
    <button class="btn btn-primary btn-sm" id="detailEditBtn">✏️ Edit</button>
    <button class="btn btn-danger btn-sm" id="detailDeleteBtn">🗑️ Delete</button>
  </div>
</div>

<div class="kbd-help">
  <kbd>N</kbd> New &nbsp; <kbd>/</kbd> Search &nbsp; <kbd>1-5</kbd> Views &nbsp; <kbd>Esc</kbd> Close
</div>

<script>
// ============= DATA =============
const QUADRANTS = {
  languages: { name: 'Languages & Frameworks', color: '#6c5ce7', angle: 0 },
  tools: { name: 'Tools', color: '#00b894', angle: 90 },
  platforms: { name: 'Platforms & Infrastructure', color: '#0984e3', angle: 180 },
  techniques: { name: 'Techniques & Patterns', color: '#e17055', angle: 270 }
};

const RINGS = {
  adopt: { name: 'Adopt', color: '#00b894', radius: 0.25 },
  trial: { name: 'Trial', color: '#0984e3', radius: 0.5 },
  assess: { name: 'Assess', color: '#fdcb6e', radius: 0.75 },
  hold: { name: 'Hold', color: '#d63031', radius: 1.0 }
};

const MOVEMENTS = {
  'new': { label: '🆕 New', class: 'movement-new' },
  'moved-in': { label: '⬆️ Moved In', class: 'movement-in' },
  'moved-out': { label: '⬇️ Moved Out', class: 'movement-out' },
  'same': { label: '➡️ No Change', class: 'movement-same' }
};

const SEED_DATA = [
  // Languages & Frameworks
  { id: 'b1', name: 'React', quadrant: 'languages', ring: 'adopt', movement: 'same', date: '2024-01-15', desc: 'Primary frontend framework. Mature ecosystem, excellent for SPAs and complex UIs. Using for UTMStamp dashboard.', url: 'https://react.dev', tags: ['frontend', 'javascript'] },

let blips = [];
let snapshots = [];
let currentView = 'radar';
let currentTags = [];
let searchText = '';
let activeFilters = { quadrant: null, ring: null };
let sortColumn = 'name';
let sortDir = 1;

// ============= STORAGE =============
function load() {
  const d = localStorage.getItem('techradar_data');
  if (d) {
    const parsed = JSON.parse(d);
    blips = parsed.blips || [];
    snapshots = parsed.snapshots || [];
  } else {
    blips = JSON.parse(JSON.stringify(SEED_DATA));
    snapshots = [];
  }
}

function save() {
  localStorage.setItem('techradar_data', JSON.stringify({ blips, snapshots }));
  updateBadge();
}

function updateBadge() {
  document.getElementById('totalBadge').textContent = blips.length;
}

// ============= VIEWS =============
function switchView(v) {
  currentView = v;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.toggle('active', n.dataset.view === v));
  const titles = { radar: 'Radar View', list: 'All Technologies', timeline: 'Timeline', stats: 'Insights', compare: 'Compare Snapshots' };
  document.getElementById('viewTitle').textContent = titles[v];
  updateFilterBar();
  render();
}

function updateFilterBar() {
  const bar = document.getElementById('filterBar');
  if (currentView === 'radar' || currentView === 'list') {
    const pills = [
      { label: 'All', filter: null, type: 'quadrant' },
      ...Object.entries(QUADRANTS).map(([k,v]) => ({ label: v.name, filter: k, type: 'quadrant' }))
    ];
    bar.innerHTML = pills.map(p =>
      `<button class="filter-pill ${activeFilters.quadrant === p.filter ? 'active' : ''}" onclick="toggleFilter('quadrant','${p.filter}')">${p.label}</button>`
    ).join('');
  } else {
    bar.innerHTML = '';
  }
}

function toggleFilter(type, val) {
  activeFilters[type] = activeFilters[type] === val ? null : (val === 'null' ? null : val);
  updateFilterBar();
  render();
}

function getFilteredBlips() {
  let list = [...blips];
  if (activeFilters.quadrant) list = list.filter(b => b.quadrant === activeFilters.quadrant);
  if (searchText) {
    const s = searchText.toLowerCase();
    list = list.filter(b =>
      b.name.toLowerCase().includes(s) ||
      (b.desc || '').toLowerCase().includes(s) ||
      (b.tags || []).some(t => t.toLowerCase().includes(s))
    );
  }
  return list;
}

function render() {
  const c = document.getElementById('content');
  switch (currentView) {
    case 'radar': c.innerHTML = renderRadar(); setupRadarInteractions(); break;
    case 'list': c.innerHTML = renderList(); break;
    case 'timeline': c.innerHTML = renderTimeline(); break;
    case 'stats': c.innerHTML = renderStats(); break;
    case 'compare': c.innerHTML = renderCompare(); break;
  }
}

// ============= RADAR =============
function renderRadar() {
  const items = getFilteredBlips();
  const size = 650;
  const cx = size / 2, cy = size / 2;
  const maxR = size / 2 - 40;

  // Position blips deterministically
  const positioned = items.map((b, i) => {
    const q = QUADRANTS[b.quadrant];
    const r = RINGS[b.ring];
    const prevR = b.ring === 'adopt' ? 0 : b.ring === 'trial' ? 0.25 : b.ring === 'assess' ? 0.5 : 0.75;
    const ringR = (prevR + r.radius) / 2 * maxR;

    // Deterministic angle within quadrant
    const qItems = items.filter(x => x.quadrant === b.quadrant);
    const idx = qItems.indexOf(b);
    const baseAngle = q.angle;
    const spread = 80;
    const step = spread / (qItems.length + 1);
    const angle = (baseAngle + 5 + step * (idx + 1)) * Math.PI / 180;

    // Add some ring-based jitter for visual separation
    const hash = b.id.split('').reduce((a, c) => a + c.charCodeAt(0), 0);
    const jitter = ((hash % 20) - 10) * 0.6;
    const rJitter = ringR + jitter;

    return {
      ...b,
      x: cx + rJitter * Math.cos(angle - Math.PI / 2),
      y: cy + rJitter * Math.sin(angle - Math.PI / 2),
      color: q.color
    };
  });

  let svg = `<div class="radar-container"><svg class="radar-svg" viewBox="0 0 ${size} ${size}" id="radarSvg">`;
  svg += `<defs>
    <radialGradient id="radarGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(108,92,231,0.05)"/>
      <stop offset="100%" stop-color="rgba(108,92,231,0)"/>
    </radialGradient>
  </defs>`;
  svg += `<circle cx="${cx}" cy="${cy}" r="${maxR}" fill="url(#radarGrad)" stroke="var(--border)" stroke-width="1"/>`;

  // Rings
  const ringRadii = [0.25, 0.5, 0.75, 1.0];
  const ringNames = ['Adopt', 'Trial', 'Assess', 'Hold'];
  const ringColors = ['#00b894', '#0984e3', '#fdcb6e', '#d63031'];
  ringRadii.forEach((r, i) => {
    svg += `<circle cx="${cx}" cy="${cy}" r="${r * maxR}" fill="none" stroke="${ringColors[i]}" stroke-width="1" stroke-dasharray="${i === 0 ? '' : '4,4'}" opacity="0.3"/>`;
    svg += `<text x="${cx + 4}" y="${cy - r * maxR + 14}" fill="${ringColors[i]}" font-size="10" opacity="0.6">${ringNames[i]}</text>`;
  });

  // Quadrant lines
  svg += `<line x1="${cx}" y1="${cy - maxR}" x2="${cx}" y2="${cy + maxR}" stroke="var(--border)" stroke-width="1" opacity="0.4"/>`;
  svg += `<line x1="${cx - maxR}" y1="${cy}" x2="${cx + maxR}" y2="${cy}" stroke="var(--border)" stroke-width="1" opacity="0.4"/>`;

  // Quadrant labels
  const qlabels = [
    { name: 'Languages &\nFrameworks', x: cx + maxR * 0.5, y: cy - maxR + 16 },
    { name: 'Tools', x: cx + maxR - 30, y: cy + 16 },
    { name: 'Platforms &\nInfrastructure', x: cx - maxR * 0.5, y: cy + maxR - 8 },
    { name: 'Techniques &\nPatterns', x: cx - maxR + 20, y: cy - 4 }
  ];
  qlabels.forEach(l => {
    const lines = l.name.split('\n');
    svg += `<text x="${l.x}" y="${l.y}" fill="var(--text2)" font-size="10" text-anchor="middle" opacity="0.5">`;
    lines.forEach((line, i) => {
      svg += `<tspan x="${l.x}" dy="${i === 0 ? 0 : 13}">${line}</tspan>`;
    });
    svg += `</text>`;
  });

  // Blips
  positioned.forEach(b => {
    const isNew = b.movement === 'new';
    const isMovedIn = b.movement === 'moved-in';
    const shape = isNew
      ? `<polygon points="${b.x},${b.y - 7} ${b.x + 7},${b.y + 5} ${b.x - 7},${b.y + 5}" fill="${b.color}" stroke="var(--bg)" stroke-width="1.5"/>`
      : `<circle cx="${b.x}" cy="${b.y}" r="7" fill="${b.color}" stroke="var(--bg)" stroke-width="1.5"/>`;

    svg += `<g class="blip-g" data-id="${b.id}" style="cursor:pointer">`;
    svg += shape;
    if (isMovedIn) {
      svg += `<text x="${b.x}" y="${b.y + 3.5}" text-anchor="middle" fill="white" font-size="8" font-weight="bold">↑</text>`;
    }
    svg += `</g>`;
  });

  svg += `</svg></div>`;

  // Legends
  svg += `<div class="radar-legend">`;
  Object.entries(QUADRANTS).forEach(([k, v]) => {
    svg += `<div class="legend-item"><div class="legend-dot" style="background:${v.color}"></div>${v.name}</div>`;
  });
  svg += `</div>`;
  svg += `<div class="ring-legend">`;
  svg += `<div class="ring-item"><b>Rings:</b></div>`;
  Object.entries(RINGS).forEach(([k, v]) => {
    svg += `<div class="ring-item"><div class="ring-swatch" style="background:${v.color}"></div>${v.name}</div>`;
  });
  svg += `<div class="ring-item" style="margin-left:12px">▲ = New &nbsp; ● = Existing</div>`;
  svg += `</div>`;

  return svg;
}

function setupRadarInteractions() {
  const tooltip = document.getElementById('tooltip');
  document.querySelectorAll('.blip-g').forEach(g => {
    const id = g.dataset.id;
    const b = blips.find(x => x.id === id);
    if (!b) return;

    g.addEventListener('mouseenter', e => {
      tooltip.querySelector('.tt-name').textContent = b.name;
      tooltip.querySelector('.tt-meta').textContent = `${QUADRANTS[b.quadrant].name} · ${RINGS[b.ring].name} · ${MOVEMENTS[b.movement].label}`;
      tooltip.querySelector('.tt-desc').textContent = b.desc || '';
      tooltip.style.display = 'block';
      tooltip.style.left = (e.clientX + 12) + 'px';
      tooltip.style.top = (e.clientY - 10) + 'px';
    });

    g.addEventListener('mousemove', e => {
      tooltip.style.left = (e.clientX + 12) + 'px';
      tooltip.style.top = (e.clientY - 10) + 'px';
    });

    g.addEventListener('mouseleave', () => {
      tooltip.style.display = 'none';
    });

    g.addEventListener('click', () => {
      openDetail(id);
    });
  });
}

// ============= LIST =============
function renderList() {
  const items = getFilteredBlips();
  items.sort((a, b) => {
    let va = a[sortColumn] || '', vb = b[sortColumn] || '';
    if (sortColumn === 'date') { va = va || '0'; vb = vb || '0'; }
    if (typeof va === 'string') return va.localeCompare(vb) * sortDir;
    return (va - vb) * sortDir;
  });

  let html = `<table class="list-table"><thead><tr>`;
  const cols = [
    { key: 'name', label: 'Name' },
    { key: 'quadrant', label: 'Quadrant' },
    { key: 'ring', label: 'Ring' },
    { key: 'movement', label: 'Movement' },
    { key: 'date', label: 'Added' },
    { key: 'tags', label: 'Tags' }
  ];
  cols.forEach(c => {
    const arrow = sortColumn === c.key ? (sortDir === 1 ? '▲' : '▼') : '';
    html += `<th onclick="sortBy('${c.key}')">${c.label} <span class="sort-arrow">${arrow}</span></th>`;
  });
  html += `</tr></thead><tbody>`;

  items.forEach(b => {
    const q = QUADRANTS[b.quadrant];
    const m = MOVEMENTS[b.movement];
    html += `<tr onclick="openDetail('${b.id}')">`;
    html += `<td><strong>${b.name}</strong></td>`;
    html += `<td><span class="quadrant-badge"><span class="quadrant-dot" style="background:${q.color}"></span>${q.name}</span></td>`;
    html += `<td><span class="ring-badge ring-${b.ring}">${RINGS[b.ring].name}</span></td>`;
    html += `<td><span class="movement-badge ${m.class}">${m.label}</span></td>`;
    html += `<td style="color:var(--text2);font-size:13px">${b.date || '—'}</td>`;
    html += `<td>${(b.tags || []).map(t => `<span class="tag">${t}</span>`).join(' ')}</td>`;
    html += `</tr>`;
  });

  html += `</tbody></table>`;
  return html;
}

function sortBy(col) {
  if (sortColumn === col) sortDir *= -1;
  else { sortColumn = col; sortDir = 1; }
  render();
}

// ============= TIMELINE =============
function renderTimeline() {
  const items = getFilteredBlips().filter(b => b.date).sort((a, b) => b.date.localeCompare(a.date));
  if (!items.length) return '<p style="color:var(--text2);text-align:center;margin-top:40px">No technologies with dates found.</p>';

  let html = '<div class="timeline">';
  let lastMonth = '';
  items.forEach(b => {
    const month = b.date.substring(0, 7);
    if (month !== lastMonth) {
      html += `<div style="color:var(--accent);font-weight:600;font-size:13px;margin:16px 0 8px;padding-left:4px">${formatMonth(month)}</div>`;
      lastMonth = month;
    }
    const q = QUADRANTS[b.quadrant];
    const m = MOVEMENTS[b.movement];
    html += `<div class="timeline-item" onclick="openDetail('${b.id}')">
      <div class="timeline-date">${b.date}</div>
      <div class="timeline-title">${b.name}</div>
      <div class="timeline-meta">
        <span class="quadrant-badge"><span class="quadrant-dot" style="background:${q.color}"></span>${q.name}</span>
        <span class="ring-badge ring-${b.ring}">${RINGS[b.ring].name}</span>
        <span class="movement-badge ${m.class}">${m.label}</span>
      </div>
      ${b.desc ? `<p style="font-size:13px;color:var(--text2);margin-top:8px">${b.desc}</p>` : ''}
    </div>`;
  });
  html += '</div>';
  return html;
}

function formatMonth(ym) {
  const [y, m] = ym.split('-');
  const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
  return `${months[parseInt(m) - 1]} ${y}`;
}

// ============= STATS =============
function renderStats() {
  const all = blips;
  const byRing = {}, byQuadrant = {}, byMovement = {};
  const tagCount = {};

  all.forEach(b => {
    byRing[b.ring] = (byRing[b.ring] || 0) + 1;
    byQuadrant[b.quadrant] = (byQuadrant[b.quadrant] || 0) + 1;
    byMovement[b.movement] = (byMovement[b.movement] || 0) + 1;
    (b.tags || []).forEach(t => { tagCount[t] = (tagCount[t] || 0) + 1; });
  });

  let html = `<div class="stats-grid">`;
  html += statCard(all.length, 'Total Technologies', 'var(--accent)');
  html += statCard(byRing.adopt || 0, 'Adopt', 'var(--adopt)');
  html += statCard(byRing.trial || 0, 'Trial', 'var(--trial)');
  html += statCard(byRing.assess || 0, 'Assess', 'var(--assess)');
  html += statCard(byRing.hold || 0, 'Hold', 'var(--hold)');
  html += statCard(byMovement.new || 0, 'New Additions', 'var(--green)');
  html += `</div>`;

  const maxQ = Math.max(...Object.values(byQuadrant), 1);
  const maxR = Math.max(...Object.values(byRing), 1);

  html += `<div class="chart-row">`;

  // Quadrant distribution
  html += `<div class="chart-card"><h3>By Quadrant</h3><div class="bar-chart">`;
  Object.entries(QUADRANTS).forEach(([k, v]) => {
    const count = byQuadrant[k] || 0;
    const pct = (count / maxQ * 100).toFixed(0);
    html += `<div class="bar-row">
      <div class="bar-label">${v.name.split(' ')[0]}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${v.color}">${count}</div></div>
    </div>`;
  });
  html += `</div></div>`;

  // Ring distribution
  html += `<div class="chart-card"><h3>By Ring</h3><div class="bar-chart">`;
  Object.entries(RINGS).forEach(([k, v]) => {
    const count = byRing[k] || 0;
    const pct = (count / maxR * 100).toFixed(0);
    html += `<div class="bar-row">
      <div class="bar-label">${v.name}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${v.color}">${count}</div></div>
    </div>`;
  });
  html += `</div></div>`;
  html += `</div>`;

  // Movement breakdown
  html += `<div class="chart-row">`;
  html += `<div class="chart-card"><h3>By Movement</h3><div class="bar-chart">`;
  const maxM = Math.max(...Object.values(byMovement), 1);
  Object.entries(MOVEMENTS).forEach(([k, v]) => {
    const count = byMovement[k] || 0;
    const pct = (count / maxM * 100).toFixed(0);
    const colors = { 'new': '#00b894', 'moved-in': '#0984e3', 'moved-out': '#e17055', 'same': '#636e72' };
    html += `<div class="bar-row">
      <div class="bar-label">${v.label}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${colors[k]}">${count}</div></div>
    </div>`;
  });
  html += `</div></div>`;

  // Top tags
  html += `<div class="chart-card"><h3>Top Tags</h3><div class="bar-chart">`;
  const topTags = Object.entries(tagCount).sort((a, b) => b[1] - a[1]).slice(0, 8);
  const maxT = topTags.length ? topTags[0][1] : 1;
  topTags.forEach(([tag, count]) => {
    const pct = (count / maxT * 100).toFixed(0);
    html += `<div class="bar-row">
      <div class="bar-label">${tag}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:var(--accent)">${count}</div></div>
    </div>`;
  });
  html += `</div></div>`;
  html += `</div>`;

  // Radar health score
  const adoptPct = ((byRing.adopt || 0) / all.length * 100).toFixed(0);
  const holdPct = ((byRing.hold || 0) / all.length * 100).toFixed(0);
  const newPct = ((byMovement.new || 0) / all.length * 100).toFixed(0);
  html += `<div class="chart-card" style="margin-top:16px">
    <h3>🏥 Radar Health</h3>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:12px;text-align:center">
      <div>
        <div style="font-size:28px;font-weight:700;color:var(--adopt)">${adoptPct}%</div>
        <div style="font-size:12px;color:var(--text2)">Technologies Adopted</div>
        <div style="font-size:11px;color:var(--text2);margin-top:4px">${adoptPct > 50 ? '⚠️ Heavy adoption — ensure active evaluation' : '✅ Healthy balance'}</div>
      </div>
      <div>
        <div style="font-size:28px;font-weight:700;color:var(--hold)">${holdPct}%</div>
        <div style="font-size:12px;color:var(--text2)">On Hold</div>
        <div style="font-size:11px;color:var(--text2);margin-top:4px">${holdPct > 30 ? '⚠️ Many on hold — review & prune' : '✅ Reasonable hold list'}</div>
      </div>
      <div>
        <div style="font-size:28px;font-weight:700;color:var(--green)">${newPct}%</div>
        <div style="font-size:12px;color:var(--text2)">New This Cycle</div>
        <div style="font-size:11px;color:var(--text2);margin-top:4px">${newPct > 30 ? '⚠️ Many new items — validate thoroughly' : '✅ Steady exploration'}</div>
      </div>
    </div>
  </div>`;

  return html;
}

function statCard(num, label, color) {
  return `<div class="stat-card"><div class="stat-num" style="color:${color}">${num}</div><div class="stat-label">${label}</div></div>`;
}

// ============= COMPARE SNAPSHOTS =============
function renderCompare() {
  if (snapshots.length === 0) {
    return `<div style="text-align:center;color:var(--text2);margin-top:60px">
      <div style="font-size:48px;margin-bottom:16px">📸</div>
      <h3 style="margin-bottom:8px">No Snapshots Yet</h3>
      <p>Take a snapshot using the 📸 button in the toolbar to capture your current radar state.</p>
      <p style="margin-top:8px">Compare snapshots over time to see how your technology decisions evolve.</p>
    </div>`;
  }

  let html = `<div style="margin-bottom:16px">`;
  html += `<p style="color:var(--text2);font-size:13px;margin-bottom:16px">📸 ${snapshots.length} snapshot${snapshots.length > 1 ? 's' : ''} saved. Compare your radar evolution over time.</p>`;

  snapshots.slice().reverse().forEach((snap, i) => {
    const byRing = {};
    snap.blips.forEach(b => { byRing[b.ring] = (byRing[b.ring] || 0) + 1; });
    html += `<div class="chart-card" style="margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <h3 style="margin-bottom:4px">${snap.name || `Snapshot ${snapshots.length - i}`}</h3>
          <div style="font-size:12px;color:var(--text2)">${new Date(snap.date).toLocaleDateString()} · ${snap.blips.length} technologies</div>
        </div>
        <div style="display:flex;gap:8px;align-items:center">
          <span class="ring-badge ring-adopt">${byRing.adopt || 0} Adopt</span>
          <span class="ring-badge ring-trial">${byRing.trial || 0} Trial</span>
          <span class="ring-badge ring-assess">${byRing.assess || 0} Assess</span>
          <span class="ring-badge ring-hold">${byRing.hold || 0} Hold</span>
          <button class="btn btn-sm btn-secondary" onclick="restoreSnapshot(${snapshots.length - 1 - i})">Restore</button>
          <button class="btn btn-sm btn-danger" onclick="deleteSnapshot(${snapshots.length - 1 - i})">🗑️</button>
        </div>
      </div>
    </div>`;
  });

  // Diff between latest and first
  if (snapshots.length >= 2) {
    const first = snapshots[0];
    const last = snapshots[snapshots.length - 1];
    const firstNames = new Set(first.blips.map(b => b.name));
    const lastNames = new Set(last.blips.map(b => b.name));
    const added = [...lastNames].filter(n => !firstNames.has(n));
    const removed = [...firstNames].filter(n => !lastNames.has(n));
    const moved = last.blips.filter(b => {
      const prev = first.blips.find(x => x.name === b.name);
      return prev && prev.ring !== b.ring;
    });

    html += `<div class="chart-card" style="margin-top:16px"><h3>📊 Changes: First → Latest</h3>`;
    if (added.length) html += `<div style="margin-top:8px"><strong style="color:var(--green)">+ Added (${added.length}):</strong> ${added.join(', ')}</div>`;
    if (removed.length) html += `<div style="margin-top:8px"><strong style="color:var(--red)">- Removed (${removed.length}):</strong> ${removed.join(', ')}</div>`;
    if (moved.length) html += `<div style="margin-top:8px"><strong style="color:var(--blue)">↔ Ring Changed (${moved.length}):</strong> ${moved.map(b => {
      const prev = first.blips.find(x => x.name === b.name);
      return `${b.name} (${RINGS[prev.ring].name} → ${RINGS[b.ring].name})`;
    }).join(', ')}</div>`;
    if (!added.length && !removed.length && !moved.length) html += `<p style="color:var(--text2);margin-top:8px">No changes detected.</p>`;
    html += `</div>`;
  }

  html += `</div>`;
  return html;
}

function takeSnapshot() {
  const name = prompt('Snapshot name (optional):', `Snapshot ${new Date().toISOString().slice(0, 10)}`);
  if (name === null) return;
  snapshots.push({
    name: name || `Snapshot ${snapshots.length + 1}`,
    date: new Date().toISOString(),
    blips: JSON.parse(JSON.stringify(blips))
  });
  save();
  if (currentView === 'compare') render();
  alert('📸 Snapshot saved!');
}

function restoreSnapshot(idx) {
  if (!confirm('Restore this snapshot? Current radar will be replaced.')) return;
  blips = JSON.parse(JSON.stringify(snapshots[idx].blips));
  save();
  render();
}

function deleteSnapshot(idx) {
  if (!confirm('Delete this snapshot?')) return;
  snapshots.splice(idx, 1);
  save();
  render();
}

// ============= DETAIL PANEL =============
function openDetail(id) {
  const b = blips.find(x => x.id === id);
  if (!b) return;
  const panel = document.getElementById('detailPanel');
  const q = QUADRANTS[b.quadrant];
  const m = MOVEMENTS[b.movement];

  document.getElementById('detailName').textContent = b.name;
  document.getElementById('detailBody').innerHTML = `
    <div class="detail-field">
      <label>Quadrant</label>
      <div class="value"><span class="quadrant-badge"><span class="quadrant-dot" style="background:${q.color}"></span>${q.name}</span></div>
    </div>
    <div class="detail-field">
      <label>Ring</label>
      <div class="value"><span class="ring-badge ring-${b.ring}">${RINGS[b.ring].name}</span></div>
    </div>
    <div class="detail-field">
      <label>Movement</label>
      <div class="value"><span class="movement-badge ${m.class}">${m.label}</span></div>
    </div>
    <div class="detail-field">
      <label>Date Added</label>
      <div class="value">${b.date || '—'}</div>
    </div>
    ${b.url ? `<div class="detail-field"><label>URL</label><div class="value"><a href="${b.url}" target="_blank" style="color:var(--accent)">${b.url}</a></div></div>` : ''}
    <div class="detail-field">
      <label>Description</label>
      <div class="value" style="color:var(--text2)">${b.desc || 'No description.'}</div>
    </div>
    <div class="detail-field">
      <label>Tags</label>
      <div class="tag-list">${(b.tags || []).map(t => `<span class="tag">${t}</span>`).join('')}</div>
    </div>
  `;

  document.getElementById('detailEditBtn').onclick = () => { closeDetail(); openEditModal(id); };
  document.getElementById('detailDeleteBtn').onclick = () => { if (confirm(`Delete "${b.name}"?`)) { blips = blips.filter(x => x.id !== id); save(); closeDetail(); render(); } };

  panel.classList.add('show');
}

function closeDetail() {
  document.getElementById('detailPanel').classList.remove('show');
}

// ============= MODAL =============
function openAddModal() {
  document.getElementById('editId').value = '';
  document.getElementById('modalTitle').textContent = 'Add Technology';
  document.getElementById('blipName').value = '';
  document.getElementById('blipQuadrant').value = 'languages';
  document.getElementById('blipRing').value = 'assess';
  document.getElementById('blipMovement').value = 'new';
  document.getElementById('blipDate').value = new Date().toISOString().slice(0, 10);
  document.getElementById('blipDesc').value = '';
  document.getElementById('blipUrl').value = '';
  document.getElementById('deleteBtn').style.display = 'none';
  currentTags = [];
  renderTags();
  document.getElementById('modal').classList.add('show');
  setTimeout(() => document.getElementById('blipName').focus(), 100);
}

function openEditModal(id) {
  const b = blips.find(x => x.id === id);
  if (!b) return;
  document.getElementById('editId').value = b.id;
  document.getElementById('modalTitle').textContent = 'Edit Technology';
  document.getElementById('blipName').value = b.name;
  document.getElementById('blipQuadrant').value = b.quadrant;
  document.getElementById('blipRing').value = b.ring;
  document.getElementById('blipMovement').value = b.movement;
  document.getElementById('blipDate').value = b.date || '';
  document.getElementById('blipDesc').value = b.desc || '';
  document.getElementById('blipUrl').value = b.url || '';
  document.getElementById('deleteBtn').style.display = 'inline-flex';
  currentTags = [...(b.tags || [])];
  renderTags();
  document.getElementById('modal').classList.add('show');
  setTimeout(() => document.getElementById('blipName').focus(), 100);
}

function closeModal() {
  document.getElementById('modal').classList.remove('show');
}

function saveBlip() {
  const name = document.getElementById('blipName').value.trim();
  if (!name) { alert('Name is required'); return; }

  const id = document.getElementById('editId').value;
  const data = {
    name,
    quadrant: document.getElementById('blipQuadrant').value,
    ring: document.getElementById('blipRing').value,
    movement: document.getElementById('blipMovement').value,
    date: document.getElementById('blipDate').value,
    desc: document.getElementById('blipDesc').value.trim(),
    url: document.getElementById('blipUrl').value.trim(),
    tags: [...currentTags]
  };

  if (id) {
    const idx = blips.findIndex(b => b.id === id);
    if (idx >= 0) blips[idx] = { ...blips[idx], ...data };
  } else {
    data.id = 'b' + Date.now();
    blips.push(data);
  }

  save();
  closeModal();
  render();
}

function deleteBlip() {
  const id = document.getElementById('editId').value;
  if (!id) return;
  const b = blips.find(x => x.id === id);
  if (confirm(`Delete "${b?.name}"?`)) {
    blips = blips.filter(x => x.id !== id);
    save();
    closeModal();
    render();
  }
}

// Tags
function handleTagInput(e) {
  if (e.key === 'Enter') {
    e.preventDefault();
    const val = e.target.value.trim().toLowerCase();
    if (val && !currentTags.includes(val)) {
      currentTags.push(val);
      renderTags();
    }
    e.target.value = '';
  }
}

function renderTags() {
  document.getElementById('tagList').innerHTML = currentTags.map(t =>
    `<span class="tag">${t} <span class="tag-remove" onclick="removeTag('${t}')">✕</span></span>`
  ).join('');
}

function removeTag(t) {
  currentTags = currentTags.filter(x => x !== t);
  renderTags();
}

// ============= SEARCH =============
function handleSearch() {
  searchText = document.getElementById('searchInput').value;
  render();
}

// ============= EXPORT / IMPORT =============
function exportData() {
  const d = JSON.stringify({ blips, snapshots, exportDate: new Date().toISOString() }, null, 2);
  const blob = new Blob([d], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `tech-radar-${new Date().toISOString().slice(0, 10)}.json`;
  a.click();
}

function importData() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const d = JSON.parse(ev.target.result);
        if (d.blips) blips = d.blips;
        if (d.snapshots) snapshots = d.snapshots;
        save();
        render();
        alert('✅ Imported successfully');
      } catch { alert('Invalid JSON file'); }
    };
    reader.readAsText(file);
  };
  input.click();
}

function exportPNG() {
  const svg = document.getElementById('radarSvg');
  if (!svg) { alert('Switch to Radar view first'); return; }
  const svgData = new XMLSerializer().serializeToString(svg);
  const canvas = document.createElement('canvas');
  canvas.width = 1400;
  canvas.height = 1400;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#0f1117';
  ctx.fillRect(0, 0, 1400, 1400);
  const img = new Image();
  img.onload = () => {
    ctx.drawImage(img, 0, 0, 1400, 1400);
    const a = document.createElement('a');
    a.download = `tech-radar-${new Date().toISOString().slice(0, 10)}.png`;
    a.href = canvas.toDataURL('image/png');
    a.click();
  };
  img.src = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svgData)));
}

// ============= KEYBOARD SHORTCUTS =============
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;
  if (e.key === 'Escape') { closeModal(); closeDetail(); return; }
  if (e.key === 'n' || e.key === 'N') { openAddModal(); e.preventDefault(); return; }
  if (e.key === '/') { document.getElementById('searchInput').focus(); e.preventDefault(); return; }
  if (e.key === '1') switchView('radar');
  if (e.key === '2') switchView('list');
  if (e.key === '3') switchView('timeline');
  if (e.key === '4') switchView('stats');
  if (e.key === '5') switchView('compare');
});

// Click outside modal
document.getElementById('modal').addEventListener('click', e => {
  if (e.target === document.getElementById('modal')) closeModal();
});

// ============= INIT =============
load();
updateFilterBar();
render();
</script>
