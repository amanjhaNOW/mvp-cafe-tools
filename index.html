<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Overnight Builds — 80 free tools for founders | mvp.cafe</title>
<meta name="description" content="80 free tools for founders, PMs, and builders. Idea validation, PRDs, roadmaps, sprint boards, job pipeline, and more. All connected. No login.">
<meta property="og:title" content="Overnight Builds — 80 free tools for founders">
<meta property="og:description" content="80 free tools for founders, PMs, and builders. All connected. No login.">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🛠️%3C/text%3E%3C/svg%3E">
<link rel="stylesheet" href="/_shell/shell.css">
</head>
<body>
<div class="shell">
  <!-- Sidebar (desktop + mobile overlay) -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar__header">
      <a href="/" style="text-decoration:none"><span class="sidebar__logo">⚡ Overnight Builds</span></a>
    </div>
    <input class="sidebar__search" id="sidebarSearch" type="text" placeholder="Search tools… (⌘K)">
    <nav class="sidebar__nav" id="sidebarNav"></nav>
  </aside>
  <div class="sidebar-overlay"></div>

  <!-- Main -->
  <div class="main">
    <!-- Top bar -->
    <div class="topbar">
      <button class="topbar__burger" onclick="window.__shell.toggleSidebar()">☰</button>
      <span class="topbar__title" id="topbarTitle">Overnight Builds</span>
      <div class="topbar__actions">
        <a class="topbar__btn" href="/grid" title="View all tools as grid">Grid View</a>
      </div>
    </div>

    <!-- Iframe area -->
    <div class="iframe-wrap" id="iframeWrap"></div>

    <!-- Next step card (floating overlay) -->
    <div class="next-card hidden" id="nextCard">
      <span class="next-card__emoji" id="nextEmoji"></span>
      <div class="next-card__text">
        <div class="next-card__label" id="nextLabel">Next step</div>
        <div class="next-card__title" id="nextTitle"></div>
      </div>
      <span class="next-card__arrow">→</span>
      <button class="next-card__close" onclick="window.__shell.dismissNext(event)">✕</button>
    </div>
  </div>

  <!-- Bottom bar (mobile) -->
  <div class="bottombar">
    <div class="bottombar__items">
      <div class="bottombar__item" data-cluster="build">
        <span class="bottombar__item-icon">🚀</span>
        <span class="bottombar__item-label">Build</span>
      </div>
      <div class="bottombar__item" data-cluster="career">
        <span class="bottombar__item-icon">💼</span>
        <span class="bottombar__item-label">Career</span>
      </div>
      <div class="bottombar__item" data-cluster="product">
        <span class="bottombar__item-icon">📊</span>
        <span class="bottombar__item-label">Product</span>
      </div>
      <div class="bottombar__item" data-cluster="team">
        <span class="bottombar__item-icon">👥</span>
        <span class="bottombar__item-label">Team</span>
      </div>
      <div class="bottombar__item" data-cluster="all">
        <span class="bottombar__item-icon">☰</span>
        <span class="bottombar__item-label">All</span>
      </div>
    </div>
  </div>
</div>
<script src="/_shell/shell.js"></script>
</body>
</html>
