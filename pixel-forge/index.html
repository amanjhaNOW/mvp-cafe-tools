<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixel Forge — Browser Pixel Art Studio</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0d1117;--surface:#161b22;--surface2:#21262d;--border:#30363d;--text:#e6edf3;--text2:#8b949e;--accent:#58a6ff;--accent2:#1f6feb;--danger:#f85149;--success:#3fb950;--warn:#d29922}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column;user-select:none}
button{background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:4px 10px;cursor:pointer;font-size:12px;transition:all .15s}
button:hover{background:var(--accent2);border-color:var(--accent)}
button.active{background:var(--accent2);border-color:var(--accent);color:#fff}
button.danger{border-color:var(--danger)}button.danger:hover{background:#da3633}
input,select{background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:3px 6px;font-size:12px;outline:none}
input:focus,select:focus{border-color:var(--accent)}
.header{display:flex;align-items:center;gap:12px;padding:6px 12px;background:var(--surface);border-bottom:1px solid var(--border);min-height:40px;flex-shrink:0}
.header h1{font-size:14px;font-weight:700;background:linear-gradient(135deg,var(--accent),#a371f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap}
.header .sep{width:1px;height:20px;background:var(--border)}
.main{display:flex;flex:1;overflow:hidden}
/* Sidebar */
.sidebar{width:220px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.sidebar section{padding:8px;border-bottom:1px solid var(--border)}
.sidebar section h3{font-size:11px;text-transform:uppercase;color:var(--text2);margin-bottom:6px;letter-spacing:.5px}
/* Tools */
.tools-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:3px}
.tool-btn{width:100%;aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:16px;padding:0;border-radius:6px}
/* Color */
.color-current{display:flex;gap:6px;align-items:center;margin-bottom:6px}
.color-swatch{width:32px;height:32px;border-radius:6px;border:2px solid var(--border);cursor:pointer}
.color-swatch.fg{border-color:var(--accent)}
.color-hex{flex:1}
.palette-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:2px}
.palette-cell{aspect-ratio:1;border-radius:3px;cursor:pointer;border:1px solid transparent;transition:transform .1s}
.palette-cell:hover{transform:scale(1.2);border-color:var(--text);z-index:1}
.recent-colors{display:flex;gap:2px;margin-top:6px;flex-wrap:wrap}
.recent-cell{width:16px;height:16px;border-radius:2px;cursor:pointer;border:1px solid var(--border)}
/* Layers */
.layer-item{display:flex;align-items:center;gap:4px;padding:4px 6px;border-radius:4px;cursor:pointer;font-size:12px;margin-bottom:2px}
.layer-item:hover{background:var(--surface2)}
.layer-item.active{background:var(--accent2);border:1px solid var(--accent)}
.layer-item .vis-btn{background:none;border:none;padding:0;font-size:14px;cursor:pointer;opacity:.7}
.layer-item .vis-btn:hover{opacity:1}
.layer-item .name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.layer-item .opacity-val{font-size:10px;color:var(--text2);width:28px;text-align:right}
.layer-actions{display:flex;gap:3px;margin-top:4px}
.layer-actions button{flex:1;font-size:11px;padding:3px}
/* Frames */
.frame-strip{display:flex;gap:4px;overflow-x:auto;padding:4px 0}
.frame-thumb{width:48px;height:48px;border:2px solid var(--border);border-radius:4px;cursor:pointer;background:var(--bg);image-rendering:pixelated;flex-shrink:0}
.frame-thumb.active{border-color:var(--accent)}
.frame-actions{display:flex;gap:3px;margin-top:4px}
.frame-actions button{flex:1;font-size:11px;padding:3px}
.anim-controls{display:flex;gap:4px;align-items:center;margin-top:6px}
.anim-controls label{font-size:11px;color:var(--text2)}
.anim-controls input{width:40px}
/* Canvas area */
.canvas-area{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}
.canvas-toolbar{display:flex;align-items:center;gap:8px;padding:4px 8px;background:var(--surface);border-bottom:1px solid var(--border);font-size:12px;flex-shrink:0}
.canvas-toolbar .info{color:var(--text2);margin-left:auto}
.canvas-wrap{flex:1;overflow:hidden;position:relative;background:var(--bg);cursor:crosshair}
.canvas-wrap canvas{position:absolute;top:0;left:0;image-rendering:pixelated}
#gridCanvas{pointer-events:none;z-index:2}
#previewCanvas{pointer-events:none;z-index:3}
#interactCanvas{z-index:4;background:transparent}
/* Right panel */
.right-panel{width:200px;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.right-panel section{padding:8px;border-bottom:1px solid var(--border)}
.right-panel section h3{font-size:11px;text-transform:uppercase;color:var(--text2);margin-bottom:6px;letter-spacing:.5px}
.preview-box{width:100%;aspect-ratio:1;background:var(--bg);border-radius:6px;overflow:hidden;display:flex;align-items:center;justify-content:center;position:relative}
.preview-box canvas{image-rendering:pixelated;max-width:100%;max-height:100%}
/* Sprite list */
.sprite-item{display:flex;align-items:center;gap:6px;padding:4px 6px;border-radius:4px;cursor:pointer;font-size:12px;margin-bottom:2px}
.sprite-item:hover{background:var(--surface2)}
.sprite-item.active{background:var(--accent2)}
.sprite-item .name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sprite-item .size{font-size:10px;color:var(--text2)}
/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;display:flex;align-items:center;justify-content:center}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px;min-width:320px;max-width:90vw}
.modal h2{font-size:16px;margin-bottom:12px}
.modal .field{margin-bottom:10px}
.modal .field label{display:block;font-size:12px;color:var(--text2);margin-bottom:3px}
.modal .field input,.modal .field select{width:100%;padding:6px 8px}
.modal .actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.checkerboard{background-image:linear-gradient(45deg,#1a1e24 25%,transparent 25%),linear-gradient(-45deg,#1a1e24 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#1a1e24 75%),linear-gradient(-45deg,transparent 75%,#1a1e24 75%);background-size:16px 16px;background-position:0 0,0 8px,8px -8px,-8px 0}
.status-bar{display:flex;align-items:center;gap:12px;padding:3px 12px;background:var(--surface);border-top:1px solid var(--border);font-size:11px;color:var(--text2);flex-shrink:0}
.status-bar span{display:flex;align-items:center;gap:3px}
/* Scrollbar */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text2)}
/* Onion skin */
.onion-canvas{pointer-events:none;z-index:1;opacity:.25}
/* Brush size */
.brush-size-row{display:flex;align-items:center;gap:6px;margin-top:6px}
.brush-size-row label{font-size:11px;color:var(--text2);white-space:nowrap}
.brush-size-row input[type=range]{flex:1;accent-color:var(--accent)}
.brush-size-row .val{font-size:11px;width:16px;text-align:center}
/* Mirror indicator */
.mirror-btns{display:flex;gap:3px;margin-top:6px}
.mirror-btns button{flex:1;font-size:11px;padding:3px}
</style>
</head>
<body>

<div class="header">
  <h1>🎨 Pixel Forge</h1>
  <div class="sep"></div>
  <button onclick="newSpriteModal()">New</button>
  <button onclick="exportPNG()">Export PNG</button>
  <button onclick="exportGIF()">Export GIF</button>
  <button onclick="importPNG()">Import</button>
  <button onclick="saveProject()">💾 Save</button>
  <button onclick="loadProject()">📂 Load</button>
  <button onclick="showHelp()">? Help</button>
  <input type="file" id="importInput" accept="image/png,image/jpeg,image/gif" style="display:none" onchange="handleImport(event)">
  <input type="file" id="loadInput" accept=".json" style="display:none" onchange="handleLoad(event)">
</div>

<div class="main">
  <!-- Left Sidebar -->
  <div class="sidebar">
    <section>
      <h3>🔧 Tools</h3>
      <div class="tools-grid">
        <button class="tool-btn active" data-tool="pen" title="Pen (P)">✏️</button>
        <button class="tool-btn" data-tool="eraser" title="Eraser (E)">🧹</button>
        <button class="tool-btn" data-tool="fill" title="Fill Bucket (G)">🪣</button>
        <button class="tool-btn" data-tool="picker" title="Color Picker (I)">💉</button>
        <button class="tool-btn" data-tool="line" title="Line (L)">📏</button>
        <button class="tool-btn" data-tool="rect" title="Rectangle (R)">⬜</button>
        <button class="tool-btn" data-tool="circle" title="Circle (C)">⭕</button>
        <button class="tool-btn" data-tool="move" title="Move (M)">✋</button>
        <button class="tool-btn" data-tool="select" title="Select (S)">⬚</button>
        <button class="tool-btn" data-tool="dither" title="Dither (D)">🔲</button>
        <button class="tool-btn" data-tool="spray" title="Spray (Y)">💨</button>
        <button class="tool-btn" data-tool="pan" title="Pan (Space+Drag)">🖐️</button>
      </div>
      <div class="brush-size-row">
        <label>Size:</label>
        <input type="range" id="brushSize" min="1" max="16" value="1" oninput="brushSizeVal.textContent=this.value">
        <span class="val" id="brushSizeVal">1</span>
      </div>
      <div class="mirror-btns">
        <button id="mirrorXBtn" onclick="toggleMirror('x')">↔ Mirror X</button>
        <button id="mirrorYBtn" onclick="toggleMirror('y')">↕ Mirror Y</button>
      </div>
    </section>

    <section>
      <h3>🎨 Color</h3>
      <div class="color-current">
        <div class="color-swatch fg" id="fgSwatch" title="Foreground"></div>
        <input type="color" id="colorPicker" value="#ffffff" style="width:0;height:0;opacity:0;position:absolute">
        <input class="color-hex" id="colorHex" value="#ffffff" maxlength="7" onchange="setColorFromHex(this.value)">
      </div>
      <div class="palette-grid" id="paletteGrid"></div>
      <div class="recent-colors" id="recentColors"></div>
    </section>

    <section>
      <h3>📑 Layers</h3>
      <div id="layerList"></div>
      <div class="layer-actions">
        <button onclick="addLayer()">+ Add</button>
        <button onclick="deleteLayer()">🗑</button>
        <button onclick="moveLayer(-1)">↑</button>
        <button onclick="moveLayer(1)">↓</button>
        <button onclick="mergeDown()">⤵ Merge</button>
      </div>
      <div class="brush-size-row" style="margin-top:6px">
        <label>Opacity:</label>
        <input type="range" id="layerOpacity" min="0" max="100" value="100" oninput="setLayerOpacity(+this.value)">
        <span class="val" id="layerOpacityVal">100</span>
      </div>
    </section>

    <section>
      <h3>🎞 Frames</h3>
      <div class="frame-strip" id="frameStrip"></div>
      <div class="frame-actions">
        <button onclick="addFrame()">+ Add</button>
        <button onclick="dupFrame()">📋 Dup</button>
        <button onclick="deleteFrame()">🗑</button>
      </div>
      <div class="anim-controls">
        <button id="playBtn" onclick="togglePlay()">▶</button>
        <label>FPS:</label>
        <input type="number" id="fpsInput" value="8" min="1" max="60" onchange="state.fps=+this.value">
        <label><input type="checkbox" id="onionSkin" onchange="state.onionSkin=this.checked;render()"> Onion</label>
      </div>
    </section>
  </div>

  <!-- Canvas Area -->
  <div class="canvas-area">
    <div class="canvas-toolbar">
      <button onclick="zoomIn()" title="Zoom In (+)">🔍+</button>
      <button onclick="zoomOut()" title="Zoom Out (-)">🔍-</button>
      <button onclick="fitCanvas()" title="Fit (F)">⊞ Fit</button>
      <button onclick="resetView()" title="Reset View">1:1</button>
      <div class="sep" style="width:1px;height:16px;background:var(--border)"></div>
      <button id="gridToggle" onclick="toggleGrid()" class="active" title="Grid (#)">⊞ Grid</button>
      <button onclick="flipH()" title="Flip Horizontal">↔ Flip</button>
      <button onclick="flipV()" title="Flip Vertical">↕ Flip</button>
      <button onclick="rotateCW()" title="Rotate 90° CW">↻ Rot</button>
      <span class="info" id="canvasInfo">32×32 | Zoom: 100%</span>
    </div>
    <div class="canvas-wrap checkerboard" id="canvasWrap">
      <canvas id="onionCanvas" class="onion-canvas"></canvas>
      <canvas id="mainCanvas"></canvas>
      <canvas id="gridCanvas"></canvas>
      <canvas id="previewCanvas"></canvas>
      <canvas id="interactCanvas"></canvas>
    </div>
  </div>

  <!-- Right Panel -->
  <div class="right-panel">
    <section>
      <h3>🖼 Preview</h3>
      <div class="preview-box checkerboard">
        <canvas id="prevCanvas"></canvas>
      </div>
    </section>
    <section>
      <h3>📁 Sprites</h3>
      <div id="spriteList"></div>
      <button onclick="newSpriteModal()" style="width:100%;margin-top:4px;font-size:11px">+ New Sprite</button>
    </section>
  </div>
</div>

<div class="status-bar">
  <span id="statusCoord">X: 0  Y: 0</span>
  <span id="statusTool">Tool: Pen</span>
  <span id="statusSize">32 × 32</span>
  <span id="statusZoom">Zoom: 800%</span>
  <span id="statusFrame">Frame: 1/1</span>
  <span id="statusLayer">Layer: 1/1</span>
</div>

<!-- Modal container -->
<div id="modalOverlay" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeModal()"></div>

<script>
// ======================== STATE ========================
const PALETTES = {
  default: [
    '#000000','#1d2b53','#7e2553','#008751','#ab5236','#5f574f','#c2c3c7','#fff1e8',
    '#ff004d','#ffa300','#ffec27','#00e436','#29adff','#83769c','#ff77a8','#ffccaa',
    '#291814','#111d35','#422136','#125359','#742f29','#49333b','#a28879','#f2d3ab',
    '#eb6b6f','#f9a31b','#ff6c24','#a3ce27','#1b2632','#44891a','#68386c','#b55088'
  ]
};

let sprites = [];
let currentSpriteIdx = 0;
let state = {
  tool: 'pen', color: '#ffffff', zoom: 8, panX: 0, panY: 0,
  showGrid: true, fps: 8, onionSkin: false, mirrorX: false, mirrorY: false,
  recentColors: [], playing: false
};
let undoStack = [], redoStack = [];
let isDrawing = false, drawStart = null, lastPixel = null;
let selection = null; // {x,y,w,h,data}
let animInterval = null;
let spaceDown = false;

function sprite() { return sprites[currentSpriteIdx]; }
function frame() { return sprite().frames[sprite().currentFrame]; }
function layer() { return frame().layers[frame().currentLayer]; }

// ======================== INIT ========================
function init() {
  loadFromStorage();
  if (sprites.length === 0) {
    createSprite('My Sprite', 32, 32);
  }
  buildPalette();
  renderAll();
  setupEvents();
  fitCanvas();
}

function createSprite(name, w, h) {
  const s = {
    name, width: w, height: h,
    frames: [createFrame(w, h)],
    currentFrame: 0
  };
  sprites.push(s);
  currentSpriteIdx = sprites.length - 1;
  clearUndo();
  return s;
}

function createFrame(w, h) {
  return {
    layers: [createLayer(w, h, 'Layer 1')],
    currentLayer: 0
  };
}

function createLayer(w, h, name) {
  return {
    name: name || 'Layer',
    visible: true,
    opacity: 100,
    data: new Array(w * h * 4).fill(0) // RGBA flat array
  };
}

// ======================== UNDO ========================
function pushUndo() {
  const f = frame();
  const snap = f.layers.map(l => ({ ...l, data: [...l.data] }));
  undoStack.push({ frame: sprite().currentFrame, layers: snap, currentLayer: f.currentLayer });
  if (undoStack.length > 80) undoStack.shift();
  redoStack = [];
}

function undo() {
  if (!undoStack.length) return;
  const f = frame();
  const snap = f.layers.map(l => ({ ...l, data: [...l.data] }));
  redoStack.push({ frame: sprite().currentFrame, layers: snap, currentLayer: f.currentLayer });
  const prev = undoStack.pop();
  sprite().currentFrame = prev.frame;
  const cf = frame();
  cf.layers = prev.layers;
  cf.currentLayer = prev.currentLayer;
  renderAll();
}

function redo() {
  if (!redoStack.length) return;
  const f = frame();
  const snap = f.layers.map(l => ({ ...l, data: [...l.data] }));
  undoStack.push({ frame: sprite().currentFrame, layers: snap, currentLayer: f.currentLayer });
  const next = redoStack.pop();
  sprite().currentFrame = next.frame;
  const cf = frame();
  cf.layers = next.layers;
  cf.currentLayer = next.currentLayer;
  renderAll();
}

function clearUndo() { undoStack = []; redoStack = []; }

// ======================== PIXEL OPS ========================
function getPixel(layerData, x, y, w) {
  const i = (y * w + x) * 4;
  return [layerData[i], layerData[i+1], layerData[i+2], layerData[i+3]];
}

function setPixel(layerData, x, y, w, h, r, g, b, a) {
  if (x < 0 || y < 0 || x >= w || y >= h) return;
  const i = (y * w + x) * 4;
  layerData[i] = r; layerData[i+1] = g; layerData[i+2] = b; layerData[i+3] = a;
}

function hexToRGBA(hex) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return [r, g, b, 255];
}

function rgbaToHex(r, g, b) {
  return '#' + [r,g,b].map(c => c.toString(16).padStart(2,'0')).join('');
}

function paintPixel(x, y) {
  const s = sprite(), l = layer(), w = s.width, h = s.height;
  const [r, g, b, a] = state.tool === 'eraser' ? [0,0,0,0] : hexToRGBA(state.color);
  const sz = +document.getElementById('brushSize').value;

  function doPaint(px, py) {
    if (sz <= 1) {
      setPixel(l.data, px, py, w, h, r, g, b, a);
    } else {
      const half = Math.floor(sz / 2);
      for (let dy = -half; dy < sz - half; dy++) {
        for (let dx = -half; dx < sz - half; dx++) {
          setPixel(l.data, px + dx, py + dy, w, h, r, g, b, a);
        }
      }
    }
  }

  doPaint(x, y);
  if (state.mirrorX) doPaint(w - 1 - x, y);
  if (state.mirrorY) doPaint(x, h - 1 - y);
  if (state.mirrorX && state.mirrorY) doPaint(w - 1 - x, h - 1 - y);
}

function bresenhamLine(x0, y0, x1, y1, cb) {
  const dx = Math.abs(x1 - x0), dy = Math.abs(y1 - y0);
  const sx = x0 < x1 ? 1 : -1, sy = y0 < y1 ? 1 : -1;
  let err = dx - dy;
  while (true) {
    cb(x0, y0);
    if (x0 === x1 && y0 === y1) break;
    const e2 = 2 * err;
    if (e2 > -dy) { err -= dy; x0 += sx; }
    if (e2 < dx) { err += dx; y0 += sy; }
  }
}

function floodFill(startX, startY) {
  const s = sprite(), l = layer(), w = s.width, h = s.height;
  const target = getPixel(l.data, startX, startY, w);
  const [fr, fg, fb, fa] = hexToRGBA(state.color);
  if (target[0]===fr && target[1]===fg && target[2]===fb && target[3]===fa) return;
  const stack = [[startX, startY]];
  const visited = new Set();
  while (stack.length) {
    const [cx, cy] = stack.pop();
    if (cx < 0 || cy < 0 || cx >= w || cy >= h) continue;
    const key = cy * w + cx;
    if (visited.has(key)) continue;
    const p = getPixel(l.data, cx, cy, w);
    if (p[0]!==target[0]||p[1]!==target[1]||p[2]!==target[2]||p[3]!==target[3]) continue;
    visited.add(key);
    setPixel(l.data, cx, cy, w, h, fr, fg, fb, fa);
    stack.push([cx-1,cy],[cx+1,cy],[cx,cy-1],[cx,cy+1]);
  }
}

function drawRect(x0, y0, x1, y1, filled) {
  const s = sprite(), l = layer(), w = s.width, h = s.height;
  const [r, g, b, a] = hexToRGBA(state.color);
  const minX = Math.min(x0,x1), maxX = Math.max(x0,x1);
  const minY = Math.min(y0,y1), maxY = Math.max(y0,y1);
  for (let y = minY; y <= maxY; y++) {
    for (let x = minX; x <= maxX; x++) {
      if (filled || y === minY || y === maxY || x === minX || x === maxX) {
        setPixel(l.data, x, y, w, h, r, g, b, a);
      }
    }
  }
}

function drawCircle(cx, cy, ex, ey) {
  const s = sprite(), l = layer(), w = s.width, h = s.height;
  const [r, g, b, a] = hexToRGBA(state.color);
  const rx = Math.abs(ex - cx), ry = Math.abs(ey - cy);
  if (rx === 0 && ry === 0) { setPixel(l.data, cx, cy, w, h, r, g, b, a); return; }
  // Midpoint ellipse
  for (let angle = 0; angle < 360; angle += 0.5) {
    const rad = angle * Math.PI / 180;
    const px = Math.round(cx + rx * Math.cos(rad));
    const py = Math.round(cy + ry * Math.sin(rad));
    setPixel(l.data, px, py, w, h, r, g, b, a);
  }
}

function ditherPixel(x, y) {
  if ((x + y) % 2 === 0) paintPixel(x, y);
}

function sprayPixel(x, y) {
  const sz = +document.getElementById('brushSize').value;
  const radius = Math.max(sz * 2, 3);
  for (let i = 0; i < radius * 2; i++) {
    const dx = Math.round((Math.random() - 0.5) * radius * 2);
    const dy = Math.round((Math.random() - 0.5) * radius * 2);
    if (dx*dx + dy*dy <= radius*radius) {
      const [r,g,b,a] = hexToRGBA(state.color);
      const s = sprite(), w = s.width, h = s.height;
      setPixel(layer().data, x+dx, y+dy, w, h, r, g, b, a);
    }
  }
}

// ======================== RENDER ========================
function render() {
  const s = sprite(), w = s.width, h = s.height;
  const z = state.zoom;
  const cw = w * z, ch = h * z;
  const wrap = document.getElementById('canvasWrap');

  // Size all canvases
  ['mainCanvas','gridCanvas','previewCanvas','interactCanvas','onionCanvas'].forEach(id => {
    const c = document.getElementById(id);
    c.width = cw; c.height = ch;
    c.style.width = cw + 'px'; c.style.height = ch + 'px';
    c.style.left = state.panX + 'px';
    c.style.top = state.panY + 'px';
  });

  // Main canvas — composite layers
  const mainCtx = document.getElementById('mainCanvas').getContext('2d');
  mainCtx.clearRect(0, 0, cw, ch);
  const f = frame();
  const imgData = mainCtx.createImageData(w, h);

  for (let li = 0; li < f.layers.length; li++) {
    const l = f.layers[li];
    if (!l.visible) continue;
    const alpha = l.opacity / 100;
    for (let i = 0; i < w * h; i++) {
      const si = i * 4;
      const sr = l.data[si], sg = l.data[si+1], sb = l.data[si+2], sa = l.data[si+3];
      if (sa === 0) continue;
      const a = (sa / 255) * alpha;
      const da = imgData.data[si+3] / 255;
      const outA = a + da * (1 - a);
      if (outA > 0) {
        imgData.data[si]   = (sr * a + imgData.data[si] * da * (1 - a)) / outA;
        imgData.data[si+1] = (sg * a + imgData.data[si+1] * da * (1 - a)) / outA;
        imgData.data[si+2] = (sb * a + imgData.data[si+2] * da * (1 - a)) / outA;
        imgData.data[si+3] = outA * 255;
      }
    }
  }

  // Draw to temp canvas then scale
  const tmp = document.createElement('canvas');
  tmp.width = w; tmp.height = h;
  tmp.getContext('2d').putImageData(imgData, 0, 0);
  mainCtx.imageSmoothingEnabled = false;
  mainCtx.drawImage(tmp, 0, 0, cw, ch);

  // Onion skin
  const onionCtx = document.getElementById('onionCanvas').getContext('2d');
  onionCtx.clearRect(0, 0, cw, ch);
  if (state.onionSkin && sprite().currentFrame > 0) {
    const prevFrame = s.frames[s.currentFrame - 1];
    const onionImg = mainCtx.createImageData(w, h);
    for (const l of prevFrame.layers) {
      if (!l.visible) continue;
      for (let i = 0; i < w * h * 4; i++) {
        onionImg.data[i] = Math.max(onionImg.data[i], l.data[i]);
      }
    }
    const tmpO = document.createElement('canvas');
    tmpO.width = w; tmpO.height = h;
    tmpO.getContext('2d').putImageData(onionImg, 0, 0);
    onionCtx.imageSmoothingEnabled = false;
    onionCtx.drawImage(tmpO, 0, 0, cw, ch);
  }

  // Grid
  if (state.showGrid && z >= 4) {
    const gCtx = document.getElementById('gridCanvas').getContext('2d');
    gCtx.clearRect(0, 0, cw, ch);
    gCtx.strokeStyle = 'rgba(255,255,255,0.1)';
    gCtx.lineWidth = 0.5;
    for (let x = 0; x <= w; x++) {
      gCtx.beginPath(); gCtx.moveTo(x*z, 0); gCtx.lineTo(x*z, ch); gCtx.stroke();
    }
    for (let y = 0; y <= h; y++) {
      gCtx.beginPath(); gCtx.moveTo(0, y*z); gCtx.lineTo(cw, y*z); gCtx.stroke();
    }
  } else {
    document.getElementById('gridCanvas').getContext('2d').clearRect(0, 0, cw, ch);
  }

  // Preview
  const prevC = document.getElementById('prevCanvas');
  prevC.width = w; prevC.height = h;
  const pCtx = prevC.getContext('2d');
  pCtx.imageSmoothingEnabled = false;
  pCtx.drawImage(tmp, 0, 0);

  updateInfo();
}

function renderAll() {
  render();
  renderLayers();
  renderFrames();
  renderSprites();
}

// ======================== UI UPDATES ========================
function updateInfo() {
  const s = sprite();
  document.getElementById('canvasInfo').textContent = `${s.width}×${s.height} | Zoom: ${state.zoom * 100}%`;
  document.getElementById('statusCoord').textContent = `X: ${lastHoverX ?? 0}  Y: ${lastHoverY ?? 0}`;
  document.getElementById('statusTool').textContent = `Tool: ${state.tool.charAt(0).toUpperCase()+state.tool.slice(1)}`;
  document.getElementById('statusSize').textContent = `${s.width} × ${s.height}`;
  document.getElementById('statusZoom').textContent = `Zoom: ${state.zoom*100}%`;
  document.getElementById('statusFrame').textContent = `Frame: ${s.currentFrame+1}/${s.frames.length}`;
  document.getElementById('statusLayer').textContent = `Layer: ${frame().currentLayer+1}/${frame().layers.length}`;
}

let lastHoverX = 0, lastHoverY = 0;

function renderLayers() {
  const f = frame();
  const el = document.getElementById('layerList');
  el.innerHTML = '';
  // Render top-to-bottom
  for (let i = f.layers.length - 1; i >= 0; i--) {
    const l = f.layers[i];
    const d = document.createElement('div');
    d.className = 'layer-item' + (i === f.currentLayer ? ' active' : '');
    d.innerHTML = `
      <button class="vis-btn">${l.visible ? '👁' : '👁‍🗨'}</button>
      <span class="name">${l.name}</span>
      <span class="opacity-val">${l.opacity}%</span>
    `;
    d.querySelector('.vis-btn').onclick = (e) => { e.stopPropagation(); l.visible = !l.visible; renderAll(); };
    d.onclick = () => { f.currentLayer = i; document.getElementById('layerOpacity').value = l.opacity; document.getElementById('layerOpacityVal').textContent = l.opacity; renderAll(); };
    d.ondblclick = () => {
      const name = prompt('Layer name:', l.name);
      if (name) { l.name = name; renderAll(); }
    };
    el.appendChild(d);
  }
  const l = layer();
  document.getElementById('layerOpacity').value = l.opacity;
  document.getElementById('layerOpacityVal').textContent = l.opacity;
}

function renderFrames() {
  const s = sprite();
  const strip = document.getElementById('frameStrip');
  strip.innerHTML = '';
  s.frames.forEach((f, i) => {
    const thumb = document.createElement('canvas');
    thumb.width = 48; thumb.height = 48;
    thumb.className = 'frame-thumb' + (i === s.currentFrame ? ' active' : '');
    // Render mini composite
    const tmp = compositeFrame(f, s.width, s.height);
    const ctx = thumb.getContext('2d');
    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(tmp, 0, 0, 48, 48);
    thumb.onclick = () => { s.currentFrame = i; clearUndo(); renderAll(); };
    strip.appendChild(thumb);
  });
}

function renderSprites() {
  const el = document.getElementById('spriteList');
  el.innerHTML = '';
  sprites.forEach((s, i) => {
    const d = document.createElement('div');
    d.className = 'sprite-item' + (i === currentSpriteIdx ? ' active' : '');
    d.innerHTML = `<span class="name">${s.name}</span><span class="size">${s.width}×${s.height}</span>`;
    d.onclick = () => { currentSpriteIdx = i; clearUndo(); renderAll(); fitCanvas(); };
    d.ondblclick = () => {
      const name = prompt('Sprite name:', s.name);
      if (name) { s.name = name; renderAll(); }
    };
    el.appendChild(d);
  });
}

function compositeFrame(f, w, h) {
  const tmp = document.createElement('canvas');
  tmp.width = w; tmp.height = h;
  const ctx = tmp.getContext('2d');
  const imgData = ctx.createImageData(w, h);
  for (const l of f.layers) {
    if (!l.visible) continue;
    const alpha = l.opacity / 100;
    for (let i = 0; i < w * h; i++) {
      const si = i * 4;
      const sa = l.data[si+3];
      if (sa === 0) continue;
      const a = (sa / 255) * alpha;
      const da = imgData.data[si+3] / 255;
      const outA = a + da * (1 - a);
      if (outA > 0) {
        imgData.data[si]   = (l.data[si] * a + imgData.data[si] * da * (1-a)) / outA;
        imgData.data[si+1] = (l.data[si+1] * a + imgData.data[si+1] * da * (1-a)) / outA;
        imgData.data[si+2] = (l.data[si+2] * a + imgData.data[si+2] * da * (1-a)) / outA;
        imgData.data[si+3] = outA * 255;
      }
    }
  }
  ctx.putImageData(imgData, 0, 0);
  return tmp;
}

// ======================== PALETTE ========================
function buildPalette() {
  const grid = document.getElementById('paletteGrid');
  grid.innerHTML = '';
  PALETTES.default.forEach(c => {
    const d = document.createElement('div');
    d.className = 'palette-cell';
    d.style.background = c;
    d.onclick = () => setColor(c);
    grid.appendChild(d);
  });
}

function setColor(hex) {
  state.color = hex;
  document.getElementById('fgSwatch').style.background = hex;
  document.getElementById('colorHex').value = hex;
  document.getElementById('colorPicker').value = hex;
  addRecentColor(hex);
}

function setColorFromHex(v) {
  if (/^#[0-9a-f]{6}$/i.test(v)) setColor(v);
}

function addRecentColor(hex) {
  state.recentColors = [hex, ...state.recentColors.filter(c => c !== hex)].slice(0, 16);
  const el = document.getElementById('recentColors');
  el.innerHTML = '';
  state.recentColors.forEach(c => {
    const d = document.createElement('div');
    d.className = 'recent-cell';
    d.style.background = c;
    d.onclick = () => setColor(c);
    el.appendChild(d);
  });
}

// ======================== TOOLS ========================
function setTool(t) {
  state.tool = t;
  document.querySelectorAll('.tool-btn').forEach(b => b.classList.toggle('active', b.dataset.tool === t));
  document.getElementById('canvasWrap').style.cursor =
    t === 'pan' ? 'grab' : t === 'picker' ? 'crosshair' : t === 'move' ? 'move' : 'crosshair';
  updateInfo();
}

// ======================== CANVAS EVENTS ========================
function setupEvents() {
  const ic = document.getElementById('interactCanvas');
  const wrap = document.getElementById('canvasWrap');

  function getPixelCoord(e) {
    const rect = ic.getBoundingClientRect();
    const x = Math.floor((e.clientX - rect.left) / state.zoom);
    const y = Math.floor((e.clientY - rect.top) / state.zoom);
    return [x, y];
  }

  ic.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    if (spaceDown || state.tool === 'pan') {
      isDrawing = false;
      wrap._panning = true;
      wrap._panStart = { x: e.clientX - state.panX, y: e.clientY - state.panY };
      wrap.style.cursor = 'grabbing';
      return;
    }

    const [px, py] = getPixelCoord(e);
    isDrawing = true;
    drawStart = { x: px, y: py };
    lastPixel = { x: px, y: py };

    if (state.tool === 'picker') {
      // Pick from composite
      const s = sprite(), w = s.width;
      for (let li = frame().layers.length - 1; li >= 0; li--) {
        const l = frame().layers[li];
        if (!l.visible) continue;
        const [r,g,b,a] = getPixel(l.data, px, py, w);
        if (a > 0) { setColor(rgbaToHex(r,g,b)); break; }
      }
      isDrawing = false;
      return;
    }

    if (['line','rect','circle','select'].includes(state.tool)) return;

    pushUndo();
    if (state.tool === 'fill') {
      floodFill(px, py);
      render();
      return;
    }
    if (state.tool === 'dither') { ditherPixel(px, py); }
    else if (state.tool === 'spray') { sprayPixel(px, py); }
    else { paintPixel(px, py); }
    render();
  });

  ic.addEventListener('pointermove', (e) => {
    const [px, py] = getPixelCoord(e);
    lastHoverX = px; lastHoverY = py;

    if (wrap._panning) {
      state.panX = e.clientX - wrap._panStart.x;
      state.panY = e.clientY - wrap._panStart.y;
      render();
      return;
    }

    updateInfo();
    // Preview for shape tools
    const pCtx = document.getElementById('previewCanvas').getContext('2d');
    const cw = sprite().width * state.zoom, ch = sprite().height * state.zoom;
    pCtx.clearRect(0, 0, cw, ch);

    if (!isDrawing) return;

    if (state.tool === 'line' || state.tool === 'rect' || state.tool === 'circle' || state.tool === 'select') {
      // Draw preview
      pCtx.strokeStyle = state.color;
      pCtx.lineWidth = state.zoom;
      if (state.tool === 'line') {
        pCtx.beginPath();
        pCtx.moveTo(drawStart.x * state.zoom + state.zoom/2, drawStart.y * state.zoom + state.zoom/2);
        pCtx.lineTo(px * state.zoom + state.zoom/2, py * state.zoom + state.zoom/2);
        pCtx.stroke();
      } else if (state.tool === 'rect' || state.tool === 'select') {
        const rx = Math.min(drawStart.x, px) * state.zoom;
        const ry = Math.min(drawStart.y, py) * state.zoom;
        const rw = (Math.abs(px - drawStart.x) + 1) * state.zoom;
        const rh = (Math.abs(py - drawStart.y) + 1) * state.zoom;
        if (state.tool === 'select') {
          pCtx.setLineDash([state.zoom, state.zoom]);
          pCtx.strokeStyle = '#58a6ff';
        }
        pCtx.strokeRect(rx, ry, rw, rh);
        pCtx.setLineDash([]);
      } else if (state.tool === 'circle') {
        const cx = (drawStart.x + px) / 2 * state.zoom + state.zoom/2;
        const cy = (drawStart.y + py) / 2 * state.zoom + state.zoom/2;
        const rx = Math.abs(px - drawStart.x) / 2 * state.zoom;
        const ry = Math.abs(py - drawStart.y) / 2 * state.zoom;
        pCtx.beginPath();
        pCtx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI*2);
        pCtx.stroke();
      }
      return;
    }

    // Freehand drawing with interpolation
    if (state.tool === 'pen' || state.tool === 'eraser') {
      bresenhamLine(lastPixel.x, lastPixel.y, px, py, (x, y) => paintPixel(x, y));
    } else if (state.tool === 'dither') {
      bresenhamLine(lastPixel.x, lastPixel.y, px, py, (x, y) => ditherPixel(x, y));
    } else if (state.tool === 'spray') {
      sprayPixel(px, py);
    }
    lastPixel = { x: px, y: py };
    render();
  });

  const finishDraw = (e) => {
    if (wrap._panning) {
      wrap._panning = false;
      wrap.style.cursor = state.tool === 'pan' ? 'grab' : 'crosshair';
      return;
    }
    if (!isDrawing) return;
    isDrawing = false;

    const [px, py] = getPixelCoord(e);
    document.getElementById('previewCanvas').getContext('2d').clearRect(0, 0, sprite().width*state.zoom, sprite().height*state.zoom);

    if (state.tool === 'line') {
      pushUndo();
      bresenhamLine(drawStart.x, drawStart.y, px, py, (x, y) => paintPixel(x, y));
      render();
    } else if (state.tool === 'rect') {
      pushUndo();
      drawRect(drawStart.x, drawStart.y, px, py, false);
      render();
    } else if (state.tool === 'circle') {
      pushUndo();
      const cx = Math.round((drawStart.x + px) / 2);
      const cy = Math.round((drawStart.y + py) / 2);
      drawCircle(cx, cy, px, py);
      render();
    } else if (state.tool === 'select') {
      selection = {
        x: Math.min(drawStart.x, px), y: Math.min(drawStart.y, py),
        w: Math.abs(px - drawStart.x) + 1, h: Math.abs(py - drawStart.y) + 1
      };
    }

    autoSave();
  };

  ic.addEventListener('pointerup', finishDraw);
  ic.addEventListener('pointerleave', (e) => { if (isDrawing) finishDraw(e); });

  // Zoom
  wrap.addEventListener('wheel', (e) => {
    e.preventDefault();
    if (e.deltaY < 0) zoomIn(); else zoomOut();
  }, { passive: false });

  // Color picker
  document.getElementById('fgSwatch').onclick = () => document.getElementById('colorPicker').click();
  document.getElementById('colorPicker').oninput = (e) => setColor(e.target.value);

  // Tool buttons
  document.querySelectorAll('.tool-btn').forEach(b => {
    b.onclick = () => setTool(b.dataset.tool);
  });

  // Keyboard
  document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    if (e.code === 'Space') { spaceDown = true; e.preventDefault(); return; }
    const key = e.key.toLowerCase();
    if ((e.metaKey || e.ctrlKey) && key === 'z') { e.preventDefault(); if (e.shiftKey) redo(); else undo(); return; }
    if ((e.metaKey || e.ctrlKey) && key === 'y') { e.preventDefault(); redo(); return; }
    if ((e.metaKey || e.ctrlKey) && key === 's') { e.preventDefault(); saveProject(); return; }
    switch(key) {
      case 'p': setTool('pen'); break;
      case 'e': setTool('eraser'); break;
      case 'g': setTool('fill'); break;
      case 'i': setTool('picker'); break;
      case 'l': setTool('line'); break;
      case 'r': setTool('rect'); break;
      case 'c': setTool('circle'); break;
      case 'm': setTool('move'); break;
      case 's': setTool('select'); break;
      case 'd': setTool('dither'); break;
      case 'y': setTool('spray'); break;
      case 'f': fitCanvas(); break;
      case '#': toggleGrid(); break;
      case '=': case '+': zoomIn(); break;
      case '-': zoomOut(); break;
      case '[': if (frame().currentLayer > 0) { frame().currentLayer--; renderAll(); } break;
      case ']': if (frame().currentLayer < frame().layers.length-1) { frame().currentLayer++; renderAll(); } break;
      case ',': if (sprite().currentFrame > 0) { sprite().currentFrame--; clearUndo(); renderAll(); } break;
      case '.': if (sprite().currentFrame < sprite().frames.length-1) { sprite().currentFrame++; clearUndo(); renderAll(); } break;
      case 'x': // Swap recent colors
        if (state.recentColors.length >= 2) setColor(state.recentColors[1]);
        break;
      case 'delete': case 'backspace':
        if (selection) { clearSelection(); render(); }
        break;
      case '?': showHelp(); break;
    }
  });

  document.addEventListener('keyup', (e) => {
    if (e.code === 'Space') spaceDown = false;
  });
}

function clearSelection() {
  if (!selection) return;
  pushUndo();
  const s = sprite(), l = layer(), w = s.width, h = s.height;
  for (let y = selection.y; y < selection.y + selection.h; y++) {
    for (let x = selection.x; x < selection.x + selection.w; x++) {
      setPixel(l.data, x, y, w, h, 0, 0, 0, 0);
    }
  }
  selection = null;
}

// ======================== ZOOM/PAN ========================
function zoomIn() { state.zoom = Math.min(64, state.zoom * 2); render(); }
function zoomOut() { state.zoom = Math.max(1, state.zoom / 2); render(); }
function resetView() { state.zoom = 1; state.panX = 0; state.panY = 0; render(); }

function fitCanvas() {
  const wrap = document.getElementById('canvasWrap');
  const ww = wrap.clientWidth, wh = wrap.clientHeight;
  const s = sprite();
  const maxZ = Math.floor(Math.min(ww / s.width, wh / s.height));
  state.zoom = Math.max(1, Math.min(64, maxZ));
  state.panX = Math.floor((ww - s.width * state.zoom) / 2);
  state.panY = Math.floor((wh - s.height * state.zoom) / 2);
  render();
}

// ======================== GRID ========================
function toggleGrid() {
  state.showGrid = !state.showGrid;
  document.getElementById('gridToggle').classList.toggle('active', state.showGrid);
  render();
}

// ======================== MIRROR ========================
function toggleMirror(axis) {
  if (axis === 'x') { state.mirrorX = !state.mirrorX; document.getElementById('mirrorXBtn').classList.toggle('active', state.mirrorX); }
  else { state.mirrorY = !state.mirrorY; document.getElementById('mirrorYBtn').classList.toggle('active', state.mirrorY); }
}

// ======================== FLIP/ROTATE ========================
function flipH() {
  pushUndo();
  const s = sprite(), l = layer(), w = s.width, h = s.height;
  const copy = [...l.data];
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const si = (y * w + x) * 4;
      const di = (y * w + (w - 1 - x)) * 4;
      l.data[di] = copy[si]; l.data[di+1] = copy[si+1]; l.data[di+2] = copy[si+2]; l.data[di+3] = copy[si+3];
    }
  }
  render();
}

function flipV() {
  pushUndo();
  const s = sprite(), l = layer(), w = s.width, h = s.height;
  const copy = [...l.data];
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const si = (y * w + x) * 4;
      const di = ((h - 1 - y) * w + x) * 4;
      l.data[di] = copy[si]; l.data[di+1] = copy[si+1]; l.data[di+2] = copy[si+2]; l.data[di+3] = copy[si+3];
    }
  }
  render();
}

function rotateCW() {
  pushUndo();
  const s = sprite(), f = frame(), w = s.width, h = s.height;
  if (w !== h) { alert('Rotation only supported for square canvases'); return; }
  for (let li = 0; li < f.layers.length; li++) {
    const l = f.layers[li];
    const copy = [...l.data];
    for (let y = 0; y < h; y++) {
      for (let x = 0; x < w; x++) {
        const si = (y * w + x) * 4;
        const di = (x * w + (w - 1 - y)) * 4;
        l.data[di] = copy[si]; l.data[di+1] = copy[si+1]; l.data[di+2] = copy[si+2]; l.data[di+3] = copy[si+3];
      }
    }
  }
  render();
}

// ======================== LAYERS ========================
function addLayer() {
  const s = sprite(), f = frame();
  const name = 'Layer ' + (f.layers.length + 1);
  f.layers.push(createLayer(s.width, s.height, name));
  f.currentLayer = f.layers.length - 1;
  clearUndo();
  renderAll();
}

function deleteLayer() {
  const f = frame();
  if (f.layers.length <= 1) return;
  f.layers.splice(f.currentLayer, 1);
  f.currentLayer = Math.min(f.currentLayer, f.layers.length - 1);
  clearUndo();
  renderAll();
}

function moveLayer(dir) {
  const f = frame();
  const i = f.currentLayer, ni = i + dir;
  if (ni < 0 || ni >= f.layers.length) return;
  [f.layers[i], f.layers[ni]] = [f.layers[ni], f.layers[i]];
  f.currentLayer = ni;
  renderAll();
}

function mergeDown() {
  const f = frame();
  if (f.currentLayer <= 0) return;
  pushUndo();
  const top = f.layers[f.currentLayer];
  const bot = f.layers[f.currentLayer - 1];
  const w = sprite().width, h = sprite().height;
  for (let i = 0; i < w * h; i++) {
    const si = i * 4;
    const sa = top.data[si+3] / 255 * (top.opacity / 100);
    if (sa === 0) continue;
    const da = bot.data[si+3] / 255;
    const outA = sa + da * (1 - sa);
    if (outA > 0) {
      bot.data[si]   = (top.data[si] * sa + bot.data[si] * da * (1-sa)) / outA;
      bot.data[si+1] = (top.data[si+1] * sa + bot.data[si+1] * da * (1-sa)) / outA;
      bot.data[si+2] = (top.data[si+2] * sa + bot.data[si+2] * da * (1-sa)) / outA;
      bot.data[si+3] = outA * 255;
    }
  }
  f.layers.splice(f.currentLayer, 1);
  f.currentLayer--;
  renderAll();
}

function setLayerOpacity(v) {
  layer().opacity = v;
  document.getElementById('layerOpacityVal').textContent = v;
  render();
}

// ======================== FRAMES ========================
function addFrame() {
  const s = sprite();
  s.frames.push(createFrame(s.width, s.height));
  s.currentFrame = s.frames.length - 1;
  clearUndo();
  renderAll();
}

function dupFrame() {
  const s = sprite();
  const src = s.frames[s.currentFrame];
  const dup = { layers: src.layers.map(l => ({ ...l, data: [...l.data] })), currentLayer: src.currentLayer };
  s.frames.splice(s.currentFrame + 1, 0, dup);
  s.currentFrame++;
  clearUndo();
  renderAll();
}

function deleteFrame() {
  const s = sprite();
  if (s.frames.length <= 1) return;
  s.frames.splice(s.currentFrame, 1);
  s.currentFrame = Math.min(s.currentFrame, s.frames.length - 1);
  clearUndo();
  renderAll();
}

function togglePlay() {
  state.playing = !state.playing;
  document.getElementById('playBtn').textContent = state.playing ? '⏸' : '▶';
  if (state.playing) {
    animInterval = setInterval(() => {
      const s = sprite();
      s.currentFrame = (s.currentFrame + 1) % s.frames.length;
      render();
      renderFrames();
    }, 1000 / state.fps);
  } else {
    clearInterval(animInterval);
  }
}

function exportGIF() {
  // Simple GIF encoder (uncompressed)
  const s = sprite();
  if (s.frames.length < 2) { alert('Add at least 2 frames for GIF export'); return; }
  const scale = +prompt('Export scale (1, 2, 4):', '2') || 2;
  const w = s.width * scale, h = s.height * scale;
  const delay = Math.round(100 / state.fps); // centiseconds

  // Use canvas to get pixel data per frame
  const frameImages = s.frames.map(f => {
    const comp = compositeFrame(f, s.width, s.height);
    const out = document.createElement('canvas');
    out.width = w; out.height = h;
    const ctx = out.getContext('2d');
    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(comp, 0, 0, w, h);
    return ctx.getImageData(0, 0, w, h);
  });

  // Build a simple animated GIF using minimal GIF89a spec
  // This is a basic encoder — quantizes to 256 colors per frame
  const gif = buildGIF(frameImages, w, h, delay);
  const blob = new Blob([gif], { type: 'image/gif' });
  const a = document.createElement('a');
  a.download = `${s.name}-animated.gif`;
  a.href = URL.createObjectURL(blob);
  a.click();
}

// Minimal GIF89a encoder
function buildGIF(frames, w, h, delay) {
  const buf = [];
  const write = (v) => buf.push(v);
  const writeStr = (s) => { for (let i=0;i<s.length;i++) write(s.charCodeAt(i)); };
  const writeLE16 = (v) => { write(v & 0xff); write((v >> 8) & 0xff); };

  // Header
  writeStr('GIF89a');
  writeLE16(w); writeLE16(h);
  write(0xF7); // GCT flag, 256 colors (2^(7+1))
  write(0); // bg index
  write(0); // pixel aspect

  // Global Color Table (256 entries = 768 bytes) — will use per-frame but need GCT
  // Build a unified palette from all frames (simple: take first frame's top 256)
  const palette = buildPalette256(frames[0], w, h);
  for (let i = 0; i < 256; i++) {
    write(palette[i*3]); write(palette[i*3+1]); write(palette[i*3+2]);
  }

  // Netscape extension for looping
  write(0x21); write(0xFF); write(0x0B);
  writeStr('NETSCAPE2.0');
  write(0x03); write(0x01); writeLE16(0); write(0x00);

  // Frames
  for (const fimg of frames) {
    // GCE
    write(0x21); write(0xF9); write(0x04);
    write(0x04); // disposal: restore to bg, no transparency... actually let's use transparency
    writeLE16(delay); write(0xFF); // transparent index = 255
    write(0x00);

    // Image descriptor
    write(0x2C);
    writeLE16(0); writeLE16(0); writeLE16(w); writeLE16(h);
    write(0x00); // no LCT

    // LZW encode
    const indices = quantizeFrame(fimg, palette, w, h);
    const minCode = 8;
    write(minCode);
    const lzwData = lzwEncode(indices, minCode);
    // Write sub-blocks
    let offset = 0;
    while (offset < lzwData.length) {
      const chunk = Math.min(255, lzwData.length - offset);
      write(chunk);
      for (let i = 0; i < chunk; i++) write(lzwData[offset++]);
    }
    write(0x00); // block terminator
  }

  write(0x3B); // trailer
  return new Uint8Array(buf);
}

function buildPalette256(imgData, w, h) {
  // Simple median cut / frequency-based 256 color palette
  const colors = new Map();
  for (let i = 0; i < w * h; i++) {
    const r = imgData.data[i*4], g = imgData.data[i*4+1], b = imgData.data[i*4+2], a = imgData.data[i*4+3];
    if (a < 128) continue;
    const key = (r << 16) | (g << 8) | b;
    colors.set(key, (colors.get(key) || 0) + 1);
  }
  const sorted = [...colors.entries()].sort((a,b) => b[1] - a[1]).slice(0, 255);
  const palette = new Uint8Array(768);
  sorted.forEach(([key], i) => {
    palette[i*3] = (key >> 16) & 0xff;
    palette[i*3+1] = (key >> 8) & 0xff;
    palette[i*3+2] = key & 0xff;
  });
  // Index 255 = transparent (black)
  return palette;
}

function quantizeFrame(imgData, palette, w, h) {
  const indices = new Uint8Array(w * h);
  for (let i = 0; i < w * h; i++) {
    const r = imgData.data[i*4], g = imgData.data[i*4+1], b = imgData.data[i*4+2], a = imgData.data[i*4+3];
    if (a < 128) { indices[i] = 255; continue; }
    // Find nearest color
    let bestDist = Infinity, bestIdx = 0;
    for (let j = 0; j < 255; j++) {
      const dr = r - palette[j*3], dg = g - palette[j*3+1], db = b - palette[j*3+2];
      const dist = dr*dr + dg*dg + db*db;
      if (dist < bestDist) { bestDist = dist; bestIdx = j; }
      if (dist === 0) break;
    }
    indices[i] = bestIdx;
  }
  return indices;
}

function lzwEncode(indices, minCodeSize) {
  const clearCode = 1 << minCodeSize;
  const eoiCode = clearCode + 1;
  let codeSize = minCodeSize + 1;
  let nextCode = eoiCode + 1;

  // Build initial table
  let table = new Map();
  for (let i = 0; i < clearCode; i++) table.set(String(i), i);

  const output = [];
  let bits = 0, buf = 0, bitCount = 0;

  function writeBits(code, size) {
    buf |= code << bitCount;
    bitCount += size;
    while (bitCount >= 8) {
      output.push(buf & 0xff);
      buf >>= 8;
      bitCount -= 8;
    }
  }

  writeBits(clearCode, codeSize);

  let w = String(indices[0]);
  for (let i = 1; i < indices.length; i++) {
    const k = String(indices[i]);
    const wk = w + ',' + k;
    if (table.has(wk)) {
      w = wk;
    } else {
      writeBits(table.get(w), codeSize);
      if (nextCode < 4096) {
        table.set(wk, nextCode++);
        if (nextCode > (1 << codeSize) && codeSize < 12) codeSize++;
      } else {
        writeBits(clearCode, codeSize);
        table = new Map();
        for (let j = 0; j < clearCode; j++) table.set(String(j), j);
        nextCode = eoiCode + 1;
        codeSize = minCodeSize + 1;
      }
      w = k;
    }
  }
  writeBits(table.get(w), codeSize);
  writeBits(eoiCode, codeSize);
  if (bitCount > 0) output.push(buf & 0xff);
  return output;
}

// ======================== IMPORT ========================
function importPNG() { document.getElementById('importInput').click(); }

function handleImport(e) {
  const file = e.target.files[0];
  if (!file) return;
  const img = new Image();
  img.onload = () => {
    const w = Math.min(img.width, 128);
    const h = Math.min(img.height, 128);
    createSprite(file.name.replace(/\.[^.]+$/, ''), w, h);
    const s = sprite();
    const tmp = document.createElement('canvas');
    tmp.width = w; tmp.height = h;
    const ctx = tmp.getContext('2d');
    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(img, 0, 0, w, h);
    const data = ctx.getImageData(0, 0, w, h);
    const l = layer();
    for (let i = 0; i < w * h * 4; i++) l.data[i] = data.data[i];
    renderAll();
    fitCanvas();
  };
  img.src = URL.createObjectURL(file);
  e.target.value = '';
}

// ======================== SAVE/LOAD ========================
function saveProject() {
  const data = JSON.stringify({ sprites, state: { recentColors: state.recentColors } });
  const a = document.createElement('a');
  a.download = 'pixel-forge-project.json';
  a.href = URL.createObjectURL(new Blob([data], { type: 'application/json' }));
  a.click();
}

function loadProject() { document.getElementById('loadInput').click(); }

function handleLoad(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      const data = JSON.parse(ev.target.result);
      sprites = data.sprites || [];
      if (data.state?.recentColors) state.recentColors = data.state.recentColors;
      currentSpriteIdx = 0;
      clearUndo();
      renderAll();
      fitCanvas();
    } catch(e) { alert('Invalid project file'); }
  };
  reader.readAsText(file);
  e.target.value = '';
}

function autoSave() {
  try {
    const data = JSON.stringify({ sprites, state: { recentColors: state.recentColors } });
    localStorage.setItem('pixel-forge', data);
  } catch(e) {}
}

function loadFromStorage() {
  try {
    const raw = localStorage.getItem('pixel-forge');
    if (!raw) return;
    const data = JSON.parse(raw);
    sprites = data.sprites || [];
    if (data.state?.recentColors) state.recentColors = data.state.recentColors;
    currentSpriteIdx = 0;
  } catch(e) {}
}
