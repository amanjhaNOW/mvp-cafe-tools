<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contract Forge — Freelance & Business Agreement Generator</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0d1117;--surface:#161b22;--surface2:#1c2333;--border:#30363d;--text:#e6edf3;--text2:#8b949e;--accent:#58a6ff;--accent2:#1f6feb;--green:#3fb950;--red:#f85149;--yellow:#d29922;--orange:#db6d28;--purple:#bc8cff;--radius:8px;--shadow:0 2px 8px rgba(0,0,0,.3)}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;overflow:hidden;font-size:14px}
button{cursor:pointer;font-family:inherit;font-size:13px;border:none;background:none;color:var(--text)}
input,textarea,select{font-family:inherit;font-size:13px;background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:var(--radius);padding:8px 10px;outline:none;width:100%}
input:focus,textarea:focus,select:focus{border-color:var(--accent)}
textarea{resize:vertical;min-height:60px}
select{appearance:auto}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* Sidebar */
.sidebar{width:260px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sidebar-header{padding:16px;border-bottom:1px solid var(--border)}
.sidebar-header h2{font-size:15px;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.sidebar-search{position:relative}
.sidebar-search input{padding-left:30px;font-size:12px}
.sidebar-search::before{content:'🔍';position:absolute;left:8px;top:50%;transform:translateY(-50%);font-size:11px}
.sidebar-list{flex:1;overflow-y:auto;padding:8px}
.sidebar-item{padding:10px 12px;border-radius:var(--radius);cursor:pointer;margin-bottom:2px;display:flex;justify-content:space-between;align-items:center}
.sidebar-item:hover{background:var(--surface2)}
.sidebar-item.active{background:var(--accent2);color:#fff}
.sidebar-item .name{font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.sidebar-item .badge{font-size:10px;padding:2px 6px;border-radius:10px;background:var(--surface2)}
.sidebar-item.active .badge{background:rgba(255,255,255,.2)}
.sidebar-footer{padding:12px;border-top:1px solid var(--border);display:flex;gap:6px}
.sidebar-footer button{flex:1;padding:8px;border-radius:var(--radius);background:var(--accent2);color:#fff;font-size:12px}
.sidebar-footer button:hover{background:var(--accent)}
.sidebar-footer button.secondary{background:var(--surface2)}
.sidebar-footer button.secondary:hover{background:var(--border)}

/* Main */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{padding:12px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;background:var(--surface)}
.topbar .tabs{display:flex;gap:4px}
.topbar .tab{padding:6px 14px;border-radius:var(--radius);font-size:13px;color:var(--text2)}
.topbar .tab:hover{background:var(--surface2);color:var(--text)}
.topbar .tab.active{background:var(--accent2);color:#fff}
.topbar .spacer{flex:1}
.topbar .btn{padding:6px 12px;border-radius:var(--radius);font-size:12px;background:var(--surface2);color:var(--text2)}
.topbar .btn:hover{background:var(--border);color:var(--text)}
.topbar .btn.primary{background:var(--accent2);color:#fff}
.topbar .btn.primary:hover{background:var(--accent)}

.content{flex:1;overflow-y:auto;padding:24px}

/* Forms */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-group.full{grid-column:1/-1}
.form-group label{font-size:12px;color:var(--text2);font-weight:500}
.form-group .hint{font-size:11px;color:var(--text2);opacity:.7}

/* Cards */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.card h3{font-size:14px;margin-bottom:8px}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}

/* Clause editor */
.clause-item{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:12px;margin-bottom:8px;position:relative}
.clause-item .clause-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.clause-item .clause-title{font-weight:600;font-size:13px}
.clause-item .clause-body{font-size:13px;color:var(--text2);line-height:1.6}
.clause-item .clause-actions{display:flex;gap:4px}
.clause-item .clause-actions button{font-size:11px;padding:3px 8px;border-radius:4px;background:var(--surface);border:1px solid var(--border)}
.clause-item .clause-actions button:hover{border-color:var(--accent)}
.clause-item .clause-actions button.danger:hover{border-color:var(--red);color:var(--red)}

/* Variable chips */
.var-chip{display:inline-block;background:var(--accent2);color:#fff;padding:2px 8px;border-radius:4px;font-size:11px;margin:2px;cursor:pointer}
.var-chip:hover{background:var(--accent)}

/* Preview */
.preview-container{max-width:800px;margin:0 auto;background:#fff;color:#1a1a1a;padding:48px;border-radius:var(--radius);box-shadow:var(--shadow);font-family:'Georgia','Times New Roman',serif;line-height:1.8}
.preview-container h1{font-size:22px;text-align:center;margin-bottom:4px;text-transform:uppercase;letter-spacing:1px}
.preview-container .subtitle{text-align:center;color:#666;margin-bottom:32px;font-size:14px}
.preview-container h2{font-size:16px;margin:24px 0 12px;border-bottom:1px solid #ddd;padding-bottom:4px}
.preview-container p{margin-bottom:12px;font-size:14px;text-align:justify}
.preview-container .signature-block{display:flex;justify-content:space-between;margin-top:48px;gap:60px}
.preview-container .sig-party{flex:1}
.preview-container .sig-line{border-top:1px solid #333;margin-top:60px;padding-top:8px;font-size:13px}
.preview-container .sig-label{font-size:12px;color:#666}
.preview-container .highlight{background:#fff3cd;padding:0 4px;border-radius:2px}
.preview-container ul{margin:0 0 12px 20px;font-size:14px}
.preview-container li{margin-bottom:4px}

/* Dashboard */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;text-align:center}
.stat-card .value{font-size:28px;font-weight:700;color:var(--accent)}
.stat-card .label{font-size:12px;color:var(--text2);margin-top:4px}

/* Clause library */
.lib-category{margin-bottom:20px}
.lib-category h4{font-size:13px;color:var(--accent);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.lib-item{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:var(--surface2);border-radius:var(--radius);margin-bottom:4px;cursor:pointer}
.lib-item:hover{border:1px solid var(--accent);margin:-1px;padding:7px 11px}
.lib-item .lib-name{font-size:13px;flex:1}
.lib-item .lib-add{font-size:11px;padding:3px 10px;border-radius:4px;background:var(--accent2);color:#fff}

/* Status badges */
.status{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:500}
.status.draft{background:#30363d;color:var(--text2)}
.status.review{background:#1f3a5f;color:var(--accent)}
.status.sent{background:#1a3a2a;color:var(--green)}
.status.signed{background:#2d1f3d;color:var(--purple)}
.status.expired{background:#3d1f1f;color:var(--red)}

/* Template gallery */
.template-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.template-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;cursor:pointer;transition:border-color .2s}
.template-card:hover{border-color:var(--accent)}
.template-card .emoji{font-size:32px;margin-bottom:8px}
.template-card h3{font-size:15px;margin-bottom:6px}
.template-card p{font-size:12px;color:var(--text2);line-height:1.5}
.template-card .tag{display:inline-block;font-size:10px;padding:2px 6px;background:var(--surface2);border-radius:4px;margin-top:8px;margin-right:4px;color:var(--text2)}

/* Modal */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;width:560px;max-height:80vh;overflow-y:auto;padding:24px}
.modal h3{font-size:16px;margin-bottom:16px}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:16px}
.modal-actions button{padding:8px 16px;border-radius:var(--radius);font-size:13px}
.modal-actions .cancel{background:var(--surface2);color:var(--text2)}
.modal-actions .cancel:hover{background:var(--border)}
.modal-actions .save{background:var(--accent2);color:#fff}
.modal-actions .save:hover{background:var(--accent)}

/* Print */
@media print{.sidebar,.topbar{display:none!important}.main{width:100%}.content{padding:0}.preview-container{box-shadow:none;border-radius:0;padding:24px}}

/* Help */
.help-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:200}
.help-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;width:480px;max-height:80vh;overflow-y:auto}
.help-box h3{margin-bottom:16px}
.help-box table{width:100%;border-collapse:collapse}
.help-box td{padding:6px 8px;font-size:13px;border-bottom:1px solid var(--border)}
.help-box td:first-child{font-family:monospace;color:var(--accent);width:100px}
</style>
</head>
<body>
<div class="sidebar">
<div class="sidebar-header">
<h2>📜 Contract Forge</h2>
<div class="sidebar-search"><input id="sideSearch" placeholder="Search contracts..." oninput="renderSidebar()"></div>
</div>
<div class="sidebar-list" id="sidebarList"></div>
<div class="sidebar-footer">
<button onclick="newContract()">+ New</button>
<button class="secondary" onclick="showTemplates()">📋 Templates</button>
</div>
</div>
<div class="main">
<div class="topbar">
<div class="tabs">
<button class="tab active" data-view="editor" onclick="switchView('editor')">✏️ Editor</button>
<button class="tab" data-view="clauses" onclick="switchView('clauses')">📑 Clauses</button>
<button class="tab" data-view="preview" onclick="switchView('preview')">👁️ Preview</button>
<button class="tab" data-view="library" onclick="switchView('library')">📚 Library</button>
<button class="tab" data-view="dashboard" onclick="switchView('dashboard')">📊 Dashboard</button>
</div>
<div class="spacer"></div>
<button class="btn" onclick="exportMarkdown()">📄 Markdown</button>
<button class="btn" onclick="printContract()">🖨️ Print</button>
<button class="btn" onclick="exportJSON()">💾 Export</button>
<button class="btn" onclick="importJSON()">📥 Import</button>
<button class="btn" onclick="showHelp()">?</button>
</div>
<div class="content" id="content"></div>
</div>

<script>
// ===== DATA =====
const STATUSES = ['draft','review','sent','signed','expired'];
const STATUS_LABELS = {draft:'Draft',review:'Under Review',sent:'Sent',signed:'Signed',expired:'Expired'};

// ===== STATE =====
let state = {contracts:[],activeId:null,view:'editor',clauseEditIdx:null};

function loadState(){
  try{const s=localStorage.getItem('contract-forge');if(s){state={...state,...JSON.parse(s)}};}catch(e){}
  if(!state.contracts.length) seedData();
}
function saveState(){localStorage.setItem('contract-forge',JSON.stringify(state));}

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,8)}

function getActive(){return state.contracts.find(c=>c.id===state.activeId)}

function createFromTemplate(tpl){
  const clauses = tpl.clauseKeys.map(([cat,title],i)=>{
    const lib = CLAUSE_LIBRARY[cat]?.find(c=>c.title===title);
    return lib ? {id:uid(),title:lib.title,body:lib.body,category:cat,order:i} : null;
  }).filter(Boolean);
  const vars = {};
  clauses.forEach(c=>{(c.body.match(/\{\{(\w+)\}\}/g)||[]).forEach(v=>{const k=v.slice(2,-2);if(!vars[k])vars[k]='';})});
  return {
    id:uid(), name:tpl.name+' — '+new Date().toLocaleDateString(), type:tpl.type,
    parties:JSON.parse(JSON.stringify(tpl.parties)),
    clauses, variables:vars, notes:'', status:'draft',
    createdAt:new Date().toISOString(), updatedAt:new Date().toISOString()
  };
}

// ===== VIEWS =====
function switchView(v){
  state.view=v;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.view===v));
  render();
}

function render(){
  const c = getActive();
  const el = document.getElementById('content');
  if(state.view==='dashboard'){el.innerHTML=renderDashboard();return;}
  if(state.view==='library'){el.innerHTML=renderLibrary();return;}
  if(!c){el.innerHTML='<div style="text-align:center;padding:80px;color:var(--text2)"><p style="font-size:48px;margin-bottom:16px">📜</p><p>Select a contract or create a new one</p></div>';return;}
  switch(state.view){
    case 'editor':el.innerHTML=renderEditor(c);break;
    case 'clauses':el.innerHTML=renderClauses(c);break;
    case 'preview':el.innerHTML=renderPreview(c);break;
  }
}

function renderEditor(c){
  const partyKeys = Object.keys(c.parties);
  let html = `<div style="max-width:800px">`;
  html += `<div class="card"><div class="card-header"><h3>Contract Details</h3><div style="display:flex;gap:8px;align-items:center"><select onchange="updateField('status',this.value)" style="width:auto;padding:4px 8px;font-size:12px">${STATUSES.map(s=>`<option value="${s}" ${c.status===s?'selected':''}>${STATUS_LABELS[s]}</option>`).join('')}</select><button class="topbar btn" style="font-size:11px;color:var(--red)" onclick="deleteContract()">🗑️ Delete</button></div></div>`;
  html += `<div class="form-grid">
    <div class="form-group full"><label>Contract Name</label><input value="${esc(c.name)}" onchange="updateField('name',this.value)"></div>
    <div class="form-group"><label>Type</label><input value="${esc(c.type)}" onchange="updateField('type',this.value)"></div>
    <div class="form-group"><label>Notes</label><input value="${esc(c.notes||'')}" onchange="updateField('notes',this.value)"></div>
  </div></div>`;

  // Parties
  html += `<div class="card"><div class="card-header"><h3>Parties</h3><button class="topbar btn" onclick="addParty()">+ Add Party</button></div>`;
  html += `<div class="form-grid">`;
  partyKeys.forEach(pk=>{
    html += `<div class="card" style="margin:0"><div class="card-header"><h3 style="font-size:13px">${esc(c.parties[pk].label)}</h3><button style="font-size:11px;color:var(--red)" onclick="removeParty('${pk}')">✕</button></div>
    <div class="form-group"><label>Label</label><input value="${esc(c.parties[pk].label)}" onchange="updateParty('${pk}','label',this.value)"></div>
    <div class="form-group" style="margin-top:8px"><label>Name ({{${pk}_name}})</label><input value="${esc(c.variables[pk+'_name']||'')}" onchange="updateVar('${pk}_name',this.value)"></div>
    <div class="form-group" style="margin-top:8px"><label>Company ({{${pk}_company}})</label><input value="${esc(c.variables[pk+'_company']||'')}" onchange="updateVar('${pk}_company',this.value)"></div>
    </div>`;
  });
  html += `</div></div>`;

  // Variables
  const allVars = extractVariables(c);
  const partyVars = new Set();
  partyKeys.forEach(pk=>{partyVars.add(pk+'_name');partyVars.add(pk+'_company');});
  const otherVars = allVars.filter(v=>!partyVars.has(v));
  if(otherVars.length){
    html += `<div class="card"><h3 style="margin-bottom:12px">Variables</h3><div class="form-grid">`;
    otherVars.forEach(v=>{
      html += `<div class="form-group"><label>{{${v}}}</label><input value="${esc(c.variables[v]||'')}" onchange="updateVar('${v}',this.value)" placeholder="${v.replace(/_/g,' ')}"></div>`;
    });
    html += `</div></div>`;
  }

  html += `</div>`;
  return html;
}

function renderClauses(c){
  let html = `<div style="max-width:800px"><div class="card-header"><h3>${c.clauses.length} Clauses</h3><div style="display:flex;gap:6px"><button class="topbar btn primary" onclick="addClauseModal()">+ Add Clause</button><button class="topbar btn" onclick="addFromLibrary()">📚 From Library</button></div></div>`;
  c.clauses.forEach((cl,i)=>{
    html += `<div class="clause-item">
      <div class="clause-header">
        <div><span class="clause-title">${i+1}. ${esc(cl.title)}</span><span class="status draft" style="margin-left:8px;font-size:10px">${esc(cl.category)}</span></div>
        <div class="clause-actions">
          ${i>0?`<button onclick="moveClause(${i},-1)">↑</button>`:''}
          ${i<c.clauses.length-1?`<button onclick="moveClause(${i},1)">↓</button>`:''}
          <button onclick="editClause(${i})">✏️</button>
          <button class="danger" onclick="removeClause(${i})">✕</button>
        </div>
      </div>
      <div class="clause-body">${highlightVars(esc(cl.body))}</div>
    </div>`;
  });
  html += `</div>`;
  return html;
}

function renderPreview(c){
  let html = `<div class="preview-container">`;
  html += `<h1>${esc(c.type||c.name)}</h1>`;
  html += `<div class="subtitle">${esc(c.name)}</div>`;

  // Preamble
  const partyKeys = Object.keys(c.parties);
  const effDate = c.variables.effective_date || '[DATE]';
  html += `<p>This ${esc(c.type)} ("Agreement") is entered into as of <strong>${esc(effDate)}</strong> by and between:</p>`;
  partyKeys.forEach((pk,i)=>{
    const name = c.variables[pk+'_name'] || `[${c.parties[pk].label} Name]`;
    const company = c.variables[pk+'_company'] || '';
    html += `<p><strong>${c.parties[pk].label}:</strong> ${esc(name)}${company?', '+esc(company):''}</p>`;
  });
  html += `<p>Collectively referred to as the "Parties."</p>`;

  // Clauses
  c.clauses.forEach((cl,i)=>{
    html += `<h2>${i+1}. ${esc(cl.title)}</h2>`;
    html += `<p>${substituteVars(esc(cl.body), c.variables)}</p>`;
  });

  // Signatures
  html += `<div class="signature-block">`;
  partyKeys.forEach(pk=>{
    const name = c.variables[pk+'_name'] || `[${c.parties[pk].label}]`;
    html += `<div class="sig-party"><strong>${esc(c.parties[pk].label)}</strong><div class="sig-line">${esc(name)}</div><div class="sig-label">Signature</div><div class="sig-line" style="margin-top:24px">Date: _______________</div></div>`;
  });
  html += `</div></div>`;
  return html;
}

function renderLibrary(){
  let html = `<div style="max-width:800px"><h3 style="margin-bottom:16px">📚 Clause Library</h3><p style="color:var(--text2);margin-bottom:20px;font-size:13px">Click "Add" to insert a clause into the active contract.</p>`;

  const types = [...new Set(cs.map(c=>c.type))];

  let html = `<div style="max-width:900px">`;
  html += `<h3 style="margin-bottom:16px">📊 Dashboard</h3>`;
  html += `<div class="stats-grid">
    <div class="stat-card"><div class="value">${cs.length}</div><div class="label">Total Contracts</div></div>
    <div class="stat-card"><div class="value" style="color:var(--green)">${byStatus.signed||0}</div><div class="label">Signed</div></div>

    const pct = cs.length?(byStatus[s]/cs.length*100):0;
    html += `<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
      <span style="width:100px;font-size:12px">${STATUS_LABELS[s]}</span>
      <div style="flex:1;height:20px;background:var(--surface2);border-radius:4px;overflow:hidden"><div style="height:100%;width:${pct}%;background:var(--accent2);border-radius:4px;transition:width .3s"></div></div>

  // All contracts table
  html += `<div class="card"><h3>All Contracts</h3><table style="width:100%;border-collapse:collapse;margin-top:12px"><thead><tr>
    <th style="text-align:left;padding:8px;border-bottom:1px solid var(--border);font-size:12px;color:var(--text2)">Name</th>
    <th style="text-align:left;padding:8px;border-bottom:1px solid var(--border);font-size:12px;color:var(--text2)">Type</th>
    <th style="text-align:left;padding:8px;border-bottom:1px solid var(--border);font-size:12px;color:var(--text2)">Clauses</th>
    <th style="text-align:left;padding:8px;border-bottom:1px solid var(--border);font-size:12px;color:var(--text2)">Status</th>
    <th style="text-align:left;padding:8px;border-bottom:1px solid var(--border);font-size:12px;color:var(--text2)">Created</th>

  cs.forEach(c=>{

// ===== SIDEBAR =====
function renderSidebar(){
  const q = document.getElementById('sideSearch')?.value?.toLowerCase()||'';
  const list = document.getElementById('sidebarList');
  const filtered = state.contracts.filter(c=>!q||c.name.toLowerCase().includes(q)||c.type.toLowerCase().includes(q));
  list.innerHTML = filtered.map(c=>`
    <div class="sidebar-item ${c.id===state.activeId?'active':''}" onclick="selectContract('${c.id}')">
      <span class="name">${esc(c.name)}</span>
      <span class="badge status ${c.status}">${STATUS_LABELS[c.status]}</span>
    </div>
  `).join('');
}

function selectContract(id){
  state.activeId=id;
  if(state.view==='dashboard'||state.view==='library') state.view='editor';
  saveState();renderSidebar();
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.view===state.view));
  render();
}

// ===== ACTIONS =====
function newContract(){
  const c = {id:uid(),name:'New Contract',type:'Custom',parties:{party_a:{label:'Party A'},party_b:{label:'Party B'}},clauses:[],variables:{effective_date:'',party_a_name:'',party_a_company:'',party_b_name:'',party_b_company:''},notes:'',status:'draft',createdAt:new Date().toISOString(),updatedAt:new Date().toISOString()};
  state.contracts.unshift(c);state.activeId=c.id;state.view='editor';
  saveState();renderSidebar();
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.view===state.view));
  render();
}

function showTemplates(){
  let html = `<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal" style="width:720px">
    <h3>📋 Choose a Template</h3>
    <div class="template-grid">`;
  TEMPLATES.forEach((t,i)=>{
    html += `<div class="template-card" onclick="useTemplate(${i})">
      <div class="emoji">${t.emoji}</div><h3>${esc(t.name)}</h3><p>${esc(t.desc)}</p>
      <div>${t.tags.map(tg=>`<span class="tag">${tg}</span>`).join('')}</div>
    </div>`;
  });
  html += `</div><div class="modal-actions"><button class="cancel" onclick="closeModal()">Cancel</button></div></div></div>`;
  document.body.insertAdjacentHTML('beforeend',html);
}

function useTemplate(i){
  const c = createFromTemplate(TEMPLATES[i]);
  state.contracts.unshift(c);state.activeId=c.id;state.view='editor';
  closeModal();saveState();renderSidebar();
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.view===state.view));
  render();
}

function deleteContract(){
  if(!confirm('Delete this contract?'))return;
  state.contracts=state.contracts.filter(c=>c.id!==state.activeId);
  state.activeId=state.contracts[0]?.id||null;
  saveState();renderSidebar();render();
}

function updateField(f,v){const c=getActive();if(!c)return;c[f]=v;c.updatedAt=new Date().toISOString();saveState();renderSidebar();render();}
function updateVar(k,v){const c=getActive();if(!c)return;c.variables[k]=v;c.updatedAt=new Date().toISOString();saveState();}
function updateParty(pk,f,v){const c=getActive();if(!c)return;c.parties[pk][f]=v;c.updatedAt=new Date().toISOString();saveState();render();}

function addParty(){
  const c=getActive();if(!c)return;
  const key='party_'+uid().slice(0,4);
  c.parties[key]={label:'New Party'};
  c.variables[key+'_name']='';c.variables[key+'_company']='';
  c.updatedAt=new Date().toISOString();saveState();render();
}
function removeParty(pk){
  const c=getActive();if(!c)return;
  if(Object.keys(c.parties).length<=2){alert('Need at least 2 parties');return;}
  delete c.parties[pk];delete c.variables[pk+'_name'];delete c.variables[pk+'_company'];
  c.updatedAt=new Date().toISOString();saveState();render();
}

// Clauses
function addClauseModal(){
  const c=getActive();if(!c)return;
  const cats = Object.keys(CLAUSE_LIBRARY);
  let html = `<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal">
    <h3>Add New Clause</h3>
    <div class="form-grid">
      <div class="form-group"><label>Title</label><input id="mc_title" placeholder="Clause title"></div>
      <div class="form-group"><label>Category</label><select id="mc_cat">${cats.map(c=>`<option>${c}</option>`).join('')}<option>Custom</option></select></div>
      <div class="form-group full"><label>Body</label><textarea id="mc_body" rows="6" placeholder="Use {{variable_name}} for dynamic fields..."></textarea></div>
    </div>
    <div class="modal-actions"><button class="cancel" onclick="closeModal()">Cancel</button><button class="save" onclick="saveNewClause()">Add Clause</button></div>
  </div></div>`;
  document.body.insertAdjacentHTML('beforeend',html);
}

function saveNewClause(){
  const c=getActive();if(!c)return;
  const title=document.getElementById('mc_title').value.trim();
  const cat=document.getElementById('mc_cat').value;
  const body=document.getElementById('mc_body').value.trim();
  if(!title||!body){alert('Title and body required');return;}
  c.clauses.push({id:uid(),title,body,category:cat,order:c.clauses.length});
  // Extract new variables
  (body.match(/\{\{(\w+)\}\}/g)||[]).forEach(v=>{const k=v.slice(2,-2);if(!(k in c.variables))c.variables[k]='';});
  c.updatedAt=new Date().toISOString();closeModal();saveState();render();
}

function addLibClause(cat,title){
  const c=getActive();
  if(!c){alert('Select a contract first');return;}
  const lib=CLAUSE_LIBRARY[cat]?.find(cl=>cl.title===title);
  if(!lib)return;
  c.clauses.push({id:uid(),title:lib.title,body:lib.body,category:cat,order:c.clauses.length});
  (lib.body.match(/\{\{(\w+)\}\}/g)||[]).forEach(v=>{const k=v.slice(2,-2);if(!(k in c.variables))c.variables[k]='';});
  c.updatedAt=new Date().toISOString();saveState();render();
  if(state.view==='library'){/* stay */}
}

function addFromLibrary(){switchView('library');}

function editClause(i){
  const c=getActive();if(!c)return;
  const cl=c.clauses[i];
  const cats=Object.keys(CLAUSE_LIBRARY);
  let html=`<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal">
    <h3>Edit Clause</h3>
    <div class="form-grid">
      <div class="form-group"><label>Title</label><input id="ec_title" value="${esc(cl.title)}"></div>
      <div class="form-group"><label>Category</label><select id="ec_cat">${cats.map(c=>`<option ${c===cl.category?'selected':''}>${c}</option>`).join('')}<option ${!cats.includes(cl.category)?'selected':''}>Custom</option></select></div>
      <div class="form-group full"><label>Body</label><textarea id="ec_body" rows="8">${esc(cl.body)}</textarea></div>
    </div>
    <div class="modal-actions"><button class="cancel" onclick="closeModal()">Cancel</button><button class="save" onclick="saveEditClause(${i})">Save</button></div>
  </div></div>`;
  document.body.insertAdjacentHTML('beforeend',html);
}

function saveEditClause(i){
  const c=getActive();if(!c)return;
  c.clauses[i].title=document.getElementById('ec_title').value.trim();
  c.clauses[i].category=document.getElementById('ec_cat').value;
  c.clauses[i].body=document.getElementById('ec_body').value.trim();
  (c.clauses[i].body.match(/\{\{(\w+)\}\}/g)||[]).forEach(v=>{const k=v.slice(2,-2);if(!(k in c.variables))c.variables[k]='';});
  c.updatedAt=new Date().toISOString();closeModal();saveState();render();
}

function removeClause(i){const c=getActive();if(!c)return;c.clauses.splice(i,1);c.updatedAt=new Date().toISOString();saveState();render();}
function moveClause(i,dir){const c=getActive();if(!c)return;const j=i+dir;if(j<0||j>=c.clauses.length)return;[c.clauses[i],c.clauses[j]]=[c.clauses[j],c.clauses[i]];c.updatedAt=new Date().toISOString();saveState();render();}

// ===== EXPORT =====
function exportMarkdown(){
  const c=getActive();if(!c)return;
  const partyKeys=Object.keys(c.parties);
  let md=`# ${c.type}\n\n**${c.name}**\n\n`;
  md+=`**Effective Date:** ${c.variables.effective_date||'[DATE]'}\n\n`;
  md+=`## Parties\n\n`;
  partyKeys.forEach(pk=>{
    md+=`- **${c.parties[pk].label}:** ${c.variables[pk+'_name']||'[Name]'}${c.variables[pk+'_company']?', '+c.variables[pk+'_company']:''}\n`;
  });
  md+=`\n---\n\n`;
  c.clauses.forEach((cl,i)=>{
    md+=`## ${i+1}. ${cl.title}\n\n${subVarsPlain(cl.body,c.variables)}\n\n`;
  });
  md+=`---\n\n## Signatures\n\n`;
  partyKeys.forEach(pk=>{
    md+=`**${c.parties[pk].label}**\n\nName: ${c.variables[pk+'_name']||'_______________'}\n\nSignature: _______________\n\nDate: _______________\n\n`;
  });
  const blob=new Blob([md],{type:'text/markdown'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=c.name.replace(/[^a-zA-Z0-9-_ ]/g,'')+'.md';a.click();
}

function printContract(){
  if(state.view!=='preview'){switchView('preview');}
  setTimeout(()=>window.print(),300);
}

function exportJSON(){
  const blob=new Blob([JSON.stringify(state.contracts,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='contract-forge-backup.json';a.click();
}

function importJSON(){
  const inp=document.createElement('input');inp.type='file';inp.accept='.json';
  inp.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{
    try{const data=JSON.parse(ev.target.result);
    if(Array.isArray(data)){
      const ids=new Set(state.contracts.map(c=>c.id));
      data.forEach(c=>{if(!ids.has(c.id)){state.contracts.push(c);ids.add(c.id);}});
    }
    saveState();renderSidebar();render();}catch(e){alert('Invalid JSON');}
  };r.readAsText(f);};inp.click();
}

// ===== HELPERS =====
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function extractVariables(c){
  const vars = new Set();
  c.clauses.forEach(cl=>{(cl.body.match(/\{\{(\w+)\}\}/g)||[]).forEach(v=>vars.add(v.slice(2,-2)));});
  Object.keys(c.parties).forEach(pk=>{vars.add(pk+'_name');vars.add(pk+'_company');});
  vars.add('effective_date');
  return [...vars];
}

function highlightVars(text){
  return text.replace(/\{\{(\w+)\}\}/g,'<span class="var-chip">{{$1}}</span>');
}

function substituteVars(text,vars){
  return text.replace(/\{\{(\w+)\}\}/g,(m,k)=>{
    const v=vars[k];
    return v?`<strong>${v}</strong>`:`<span class="highlight">[${k.replace(/_/g,' ')}]</span>`;
  });
}

function subVarsPlain(text,vars){
  return text.replace(/\{\{(\w+)\}\}/g,(m,k)=>{
    return vars[k]||`[${k.replace(/_/g,' ')}]`;
  });
}

function closeModal(){document.querySelectorAll('.modal-overlay').forEach(m=>m.remove());}

// ===== HELP =====
function showHelp(){
  let html=`<div class="help-overlay" onclick="if(event.target===this)this.remove()"><div class="help-box">
    <h3>⌨️ Keyboard Shortcuts</h3>
    <table>
      <tr><td>N</td><td>New contract</td></tr>
      <tr><td>/</td><td>Focus search</td></tr>
      <tr><td>1-5</td><td>Switch views (Editor/Clauses/Preview/Library/Dashboard)</td></tr>
      <tr><td>E</td><td>Export JSON</td></tr>
      <tr><td>I</td><td>Import JSON</td></tr>
      <tr><td>M</td><td>Export Markdown</td></tr>
      <tr><td>P</td><td>Print / PDF</td></tr>
      <tr><td>T</td><td>Templates gallery</td></tr>
      <tr><td>Esc</td><td>Close modal/dialog</td></tr>
      <tr><td>?</td><td>This help</td></tr>
    </table>
    <h3 style="margin-top:16px">📝 Variables</h3>
    <p style="font-size:13px;color:var(--text2);margin-top:8px">Use <code>{{variable_name}}</code> in clause text. Variables are auto-detected and appear in the Editor for filling. They're substituted in Preview and Markdown export.</p>
    <h3 style="margin-top:16px">📚 Clause Library</h3>
    <p style="font-size:13px;color:var(--text2);margin-top:8px">${Object.keys(CLAUSE_LIBRARY).length} categories with ${Object.values(CLAUSE_LIBRARY).reduce((s,a)=>s+a.length,0)} pre-written clauses covering Confidentiality, Payment, IP, Termination, Liability, Scope, General, Non-Compete, and Data Privacy.</p>
    <div class="modal-actions"><button class="cancel" onclick="this.closest('.help-overlay').remove()">Close</button></div>
  </div></div>`;
  document.body.insertAdjacentHTML('beforeend',html);
}

// ===== KEYBOARD =====
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT'){
    if(e.key==='Escape')e.target.blur();
    return;
  }
  if(document.querySelector('.modal-overlay')||document.querySelector('.help-overlay')){
    if(e.key==='Escape'){closeModal();document.querySelectorAll('.help-overlay').forEach(h=>h.remove());}
    return;
  }
  const views=['editor','clauses','preview','library','dashboard'];
  if(e.key>='1'&&e.key<='5'){e.preventDefault();switchView(views[+e.key-1]);return;}
  switch(e.key){
    case 'n':case 'N':e.preventDefault();newContract();break;
    case '/':e.preventDefault();document.getElementById('sideSearch')?.focus();break;
    case 'e':e.preventDefault();exportJSON();break;
    case 'i':e.preventDefault();importJSON();break;
    case 'm':e.preventDefault();exportMarkdown();break;
    case 'p':e.preventDefault();printContract();break;
    case 't':e.preventDefault();showTemplates();break;
    case '?':e.preventDefault();showHelp();break;
  }
});

// ===== INIT =====
loadState();renderSidebar();
document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.view===state.view));
render();
</script>
