<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Persona Forge — User Persona & Empathy Map Builder</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f1117;--surface:#1a1d27;--surface2:#242836;--surface3:#2e3244;--border:#363a4e;--text:#e4e6f0;--text2:#9ca0b4;--accent:#7c5cfc;--accent2:#5c8afc;--accent3:#fc5c8a;--green:#34d399;--yellow:#fbbf24;--red:#f87171;--orange:#fb923c;--blue:#60a5fa;--purple:#a78bfa;--pink:#f472b6;--radius:12px;--shadow:0 4px 24px rgba(0,0,0,.4)}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow:hidden}
button{cursor:pointer;border:none;font-family:inherit;font-size:.875rem}
input,textarea,select{font-family:inherit;font-size:.875rem;background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:8px 12px;outline:none;width:100%}
input:focus,textarea:focus,select:focus{border-color:var(--accent)}
textarea{resize:vertical;min-height:60px}
select{cursor:pointer}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* Layout */
.app{display:flex;height:100vh}
.sidebar{width:280px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sidebar-header{padding:16px 20px;border-bottom:1px solid var(--border)}
.sidebar-header h1{font-size:1.1rem;background:linear-gradient(135deg,var(--accent),var(--accent3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:700}
.sidebar-header p{font-size:.7rem;color:var(--text2);margin-top:2px}
.sidebar-actions{padding:12px;display:flex;gap:8px}
.btn{padding:8px 14px;border-radius:8px;font-weight:500;transition:all .2s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{opacity:.85}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{border-color:var(--accent);color:var(--text)}
.btn-sm{padding:5px 10px;font-size:.75rem}
.btn-danger{background:var(--red);color:#fff}
.btn-danger:hover{opacity:.85}
.sidebar-list{flex:1;overflow-y:auto;padding:8px}
.persona-item{padding:10px 12px;border-radius:8px;cursor:pointer;display:flex;align-items:center;gap:10px;transition:background .15s;margin-bottom:2px}
.persona-item:hover{background:var(--surface2)}
.persona-item.active{background:var(--surface3);border:1px solid var(--border)}
.persona-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0;background:var(--surface3);overflow:hidden}
.persona-avatar img{width:100%;height:100%;object-fit:cover}
.persona-info{flex:1;min-width:0}
.persona-info h3{font-size:.85rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.persona-info p{font-size:.7rem;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.persona-count{font-size:.65rem;color:var(--text2);padding:12px 16px;border-top:1px solid var(--border)}

/* Main */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;border-bottom:1px solid var(--border);background:var(--surface);gap:12px}
.tabs{display:flex;gap:4px}
.tab{padding:7px 14px;border-radius:8px;background:transparent;color:var(--text2);font-size:.8rem;font-weight:500;transition:all .15s}
.tab:hover{color:var(--text)}
.tab.active{background:var(--accent);color:#fff}
.topbar-right{display:flex;gap:8px;align-items:center}
.content{flex:1;overflow-y:auto;padding:24px}

/* Empty state */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text2);text-align:center}
.empty-icon{font-size:4rem;margin-bottom:16px;opacity:.5}
.empty h2{font-size:1.2rem;margin-bottom:8px;color:var(--text)}
.empty p{font-size:.85rem;max-width:360px}

/* Profile tab */
.profile-grid{display:grid;grid-template-columns:300px 1fr;gap:24px;max-width:1200px}
.profile-card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:24px;text-align:center}
.profile-avatar-lg{width:100px;height:100px;border-radius:50%;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;font-size:3rem;overflow:hidden;border:3px solid var(--accent)}
.profile-avatar-lg img{width:100%;height:100%;object-fit:cover}
.profile-name{font-size:1.3rem;font-weight:700;margin-bottom:4px}
.profile-role{color:var(--accent);font-size:.9rem;margin-bottom:12px}
.profile-quote{font-style:italic;color:var(--text2);font-size:.85rem;padding:12px;background:var(--surface2);border-radius:8px;margin-bottom:16px;border-left:3px solid var(--accent)}
.profile-meta{text-align:left}
.meta-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:.85rem}
.meta-row:last-child{border:none}
.meta-label{color:var(--text2)}
.profile-details{display:flex;flex-direction:column;gap:16px}
.detail-section{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:20px}
.detail-section h3{font-size:.95rem;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.tag-list{display:flex;flex-wrap:wrap;gap:6px}
.tag{padding:4px 10px;border-radius:20px;font-size:.75rem;font-weight:500}
.tag-green{background:rgba(52,211,153,.15);color:var(--green)}
.tag-red{background:rgba(248,113,113,.15);color:var(--red)}
.tag-blue{background:rgba(96,165,250,.15);color:var(--blue)}
.tag-purple{background:rgba(167,139,250,.15);color:var(--purple)}
.tag-yellow{background:rgba(251,191,36,.15);color:var(--yellow)}
.bio-text{color:var(--text2);font-size:.85rem;line-height:1.6}

/* Empathy Map */
.empathy-grid{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:16px;max-width:900px;margin:0 auto;min-height:500px}
.empathy-quad{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:20px;display:flex;flex-direction:column}
.empathy-quad h3{font-size:.9rem;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.empathy-quad h3 .emoji{font-size:1.1rem}
.quad-says h3{color:var(--blue)}
.quad-thinks h3{color:var(--purple)}
.quad-does h3{color:var(--green)}
.quad-feels h3{color:var(--pink)}
.empathy-items{flex:1;display:flex;flex-direction:column;gap:6px;overflow-y:auto}
.empathy-item{background:var(--surface2);padding:8px 12px;border-radius:8px;font-size:.8rem;display:flex;align-items:center;justify-content:space-between;gap:8px}
.empathy-item span{flex:1}
.empathy-item button{background:none;color:var(--text2);font-size:.7rem;padding:2px 6px;flex-shrink:0}
.empathy-item button:hover{color:var(--red)}
.empathy-add{display:flex;gap:6px;margin-top:8px}
.empathy-add input{flex:1;font-size:.8rem;padding:6px 10px}
.empathy-add button{background:var(--accent);color:#fff;padding:6px 12px;border-radius:8px;font-size:.75rem;flex-shrink:0}
.empathy-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:80px;height:80px;border-radius:50%;background:var(--surface3);border:2px solid var(--accent);display:flex;align-items:center;justify-content:center;font-size:2rem;z-index:2}
.empathy-wrapper{position:relative}

/* Journey Map */
.journey-container{max-width:1100px;margin:0 auto}
.journey-stages{display:flex;gap:4px;margin-bottom:24px;overflow-x:auto;padding-bottom:8px}
.journey-stage{flex:1;min-width:180px;background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:16px;display:flex;flex-direction:column}
.journey-stage h3{font-size:.85rem;text-align:center;margin-bottom:4px}
.journey-stage .stage-num{text-align:center;font-size:.65rem;color:var(--text2);margin-bottom:12px}
.journey-section{margin-bottom:12px}
.journey-section h4{font-size:.7rem;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.journey-section ul{list-style:none;display:flex;flex-direction:column;gap:4px}
.journey-section li{font-size:.78rem;display:flex;align-items:flex-start;gap:4px}
.journey-section li::before{content:'•';color:var(--accent);flex-shrink:0}
.emotion-bar{display:flex;align-items:center;gap:8px;margin-top:auto;padding-top:8px;border-top:1px solid var(--border)}
.emotion-bar .emoji{font-size:1.2rem}
.emotion-bar .label{font-size:.7rem;color:var(--text2)}
.journey-add-stage{min-width:60px;display:flex;align-items:center;justify-content:center;border:2px dashed var(--border);border-radius:var(--radius);cursor:pointer;color:var(--text2);font-size:1.5rem;transition:all .2s}
.journey-add-stage:hover{border-color:var(--accent);color:var(--accent)}
.journey-connector{display:flex;align-items:center;margin-bottom:24px;overflow-x:auto}
.connector-line{flex:1;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px;min-width:30px}
.connector-dot{width:12px;height:12px;border-radius:50%;background:var(--accent);flex-shrink:0}

/* Comparison */
.comparison-grid{display:grid;gap:16px}
.comparison-header{display:grid;gap:16px;padding:12px 0;border-bottom:2px solid var(--border);font-weight:600;font-size:.85rem}
.comparison-row{display:grid;gap:16px;padding:12px 0;border-bottom:1px solid var(--border);font-size:.85rem;align-items:start}
.comparison-row:last-child{border:none}
.comparison-label{color:var(--text2);font-weight:500;display:flex;align-items:center;gap:6px}
.comparison-cell{display:flex;flex-direction:column;gap:4px}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);width:100%;max-width:600px;max-height:85vh;overflow-y:auto;box-shadow:var(--shadow)}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border)}
.modal-header h2{font-size:1rem}
.modal-close{background:none;color:var(--text2);font-size:1.2rem;padding:4px 8px}
.modal-close:hover{color:var(--text)}
.modal-body{padding:20px;display:flex;flex-direction:column;gap:14px}
.modal-footer{padding:12px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-group label{font-size:.75rem;color:var(--text2);font-weight:500}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* Templates */
.template-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;max-width:1000px;margin:0 auto}
.template-card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:20px;cursor:pointer;transition:all .2s}
.template-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:var(--shadow)}
.template-card h3{font-size:.95rem;margin-bottom:6px}
.template-card p{font-size:.8rem;color:var(--text2);margin-bottom:12px;line-height:1.5}
.template-tags{display:flex;flex-wrap:wrap;gap:4px}

/* Dashboard */
.dash-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:20px}
.stat-card .num{font-size:2rem;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stat-card .label{font-size:.8rem;color:var(--text2);margin-top:4px}

/* Stage editor */
.stage-editor{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:20px;margin-bottom:16px}
.stage-editor h3{font-size:.9rem;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.list-editor{display:flex;flex-direction:column;gap:6px;margin-bottom:8px}
.list-editor-item{display:flex;gap:6px;align-items:center}
.list-editor-item input{flex:1}
.list-editor-item button{background:none;color:var(--text2);padding:4px 8px}
.list-editor-item button:hover{color:var(--red)}
.add-item-row{display:flex;gap:6px}
.add-item-row input{flex:1}

/* Kbd */
.kbd-help{position:fixed;bottom:16px;right:16px;font-size:.65rem;color:var(--text2);background:var(--surface);padding:6px 10px;border-radius:8px;border:1px solid var(--border);z-index:10}
.kbd{background:var(--surface3);padding:1px 5px;border-radius:4px;font-family:monospace;font-size:.7rem}

/* Hidden */
.hidden{display:none!important}

/* Export */
.export-preview{background:var(--surface2);border-radius:8px;padding:16px;font-size:.8rem;white-space:pre-wrap;font-family:monospace;max-height:400px;overflow-y:auto;color:var(--text2)}
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="sidebar-header">
      <h1>🎭 Persona Forge</h1>
      <p>User Persona & Empathy Map Builder</p>
    </div>
    <div class="sidebar-actions">
      <button class="btn btn-primary btn-sm" style="flex:1" onclick="openNewModal()">+ New Persona</button>
      <button class="btn btn-ghost btn-sm" onclick="showTemplates()" title="Templates">📋</button>
    </div>
    <div class="sidebar-list" id="personaList"></div>
    <div class="persona-count" id="personaCount"></div>
  </div>
  <div class="main">
    <div class="topbar">
      <div class="tabs" id="tabBar">
        <button class="tab active" data-tab="profile" onclick="switchTab('profile')">👤 Profile</button>
        <button class="tab" data-tab="empathy" onclick="switchTab('empathy')">🧠 Empathy Map</button>
        <button class="tab" data-tab="journey" onclick="switchTab('journey')">🗺️ Journey</button>
        <button class="tab" data-tab="compare" onclick="switchTab('compare')">⚖️ Compare</button>
        <button class="tab" data-tab="dashboard" onclick="switchTab('dashboard')">📊 Dashboard</button>
      </div>
      <div class="topbar-right">
        <button class="btn btn-ghost btn-sm" onclick="exportData()" title="Export JSON">📥 Export</button>
        <button class="btn btn-ghost btn-sm" onclick="importData()" title="Import JSON">📤 Import</button>
        <button class="btn btn-ghost btn-sm" onclick="exportMarkdown()" title="Export Markdown">📝 MD</button>
      </div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>
<div class="kbd-help">
  <kbd class="kbd">N</kbd> New &nbsp;
  <kbd class="kbd">E</kbd> Edit &nbsp;
  <kbd class="kbd">/</kbd> Search &nbsp;
  <kbd class="kbd">1-5</kbd> Tabs &nbsp;
  <kbd class="kbd">D</kbd> Dark &nbsp;
  <kbd class="kbd">?</kbd> Help
</div>

<script>
// ===== State =====
let personas = [];
let activeId = null;
let activeTab = 'profile';

const EMOTIONS = ['😫','😟','😐','🙂','😊'];
const EMOTION_LABELS = ['Frustrated','Worried','Neutral','Pleased','Delighted'];

// ===== Storage =====
function save() { localStorage.setItem('persona-forge-data', JSON.stringify(personas)); }
function load() {
  const d = localStorage.getItem('persona-forge-data');
  if (d) { personas = JSON.parse(d); }
  else { seedDemo(); }
  if (personas.length && !activeId) activeId = personas[0].id;
}

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,8); }

function newPersona(overrides = {}) {
  return {
    id: uid(),
    name: '', role: '', company: '', age: '', location: '', income: '',
    avatar: '', quote: '', bio: '',
    goals: [], frustrations: [], behaviors: [], tools: [],
    empathy: { says: [], thinks: [], does: [], feels: [] },
    journey: [],
    tags: [],
    created: new Date().toISOString(),
    ...overrides
  };
}

// ===== Demo Data =====
function seedDemo() {
  personas = [
    newPersona({
      id: 'demo1',
      name: 'Marketing Maya',
      role: 'Head of Marketing',
      company: 'B2B SaaS Startup (50-200 employees)',
      age: '34',
      location: 'Bangalore, India',
      income: '₹30-40 LPA',
      avatar: '👩‍💼',
      quote: 'I need to prove every marketing dollar drives pipeline. Vanity metrics don\'t pay salaries.',
      bio: 'Maya manages a 6-person marketing team at a Series A SaaS startup. She\'s responsible for demand gen, content, and brand. She\'s under constant pressure to show ROI on every initiative. She adopted UTMStamp to track email signature clicks after realizing her team of 50 was sending 500+ emails daily with zero tracking.',
      goals: ['Prove marketing ROI to the CEO', 'Track every touchpoint in the funnel', 'Scale team\'s email signature as a channel', 'Reduce CAC below ₹5000'],
      frustrations: ['Can\'t track email signature clicks', 'Team uses inconsistent UTM parameters', 'No visibility into which campaigns drive pipeline', 'Manual signature updates across 50 people'],
      behaviors: ['Checks analytics dashboard 3x daily', 'Creates weekly performance reports', 'Tests new tools aggressively', 'Active on LinkedIn, shares marketing insights'],
      tools: ['HubSpot', 'Google Analytics', 'Slack', 'Notion', 'Canva', 'UTMStamp'],
      empathy: {
        says: ['\"We need better attribution for email\"', '\"How do I know signatures are driving clicks?\"', '\"Can we A/B test our signatures?\"', '\"I need this rolled out to the whole team by Friday\"'],
        thinks: ['Is this tool worth the team\'s time to adopt?', 'Will the CEO see ROI in the next board deck?', 'I wish I could track everything like we track ads', 'Our email signatures are wasted real estate'],
        does: ['Manually updates team signatures quarterly', 'Builds UTM links in spreadsheets', 'Screenshots analytics for weekly standups', 'Tries free tools before committing budget'],
        feels: ['Anxious about proving marketing spend ROI', 'Frustrated by manual signature management', 'Excited when she finds a new growth channel', 'Overwhelmed by the number of tools to manage']
      },
      journey: [
        { name: 'Awareness', actions: ['Sees LinkedIn post about email signature tracking', 'Googles "UTM tracking for email signatures"'], thoughts: ['Is this even a real channel?', 'How much traffic could signatures drive?'], pains: ['No idea signatures can be tracked', 'Skeptical about impact'], emotion: 3 },
        { name: 'Consideration', actions: ['Visits UTMStamp website', 'Watches demo video', 'Checks pricing page'], thoughts: ['This looks easy to set up', 'Free plan lets me test first', 'Will my team actually use this?'], pains: ['Comparing with Exclaimer and WiseStamp', 'Need to justify to CEO'], emotion: 3 },
        { name: 'Onboarding', actions: ['Signs up for free plan', 'Creates first signature template', 'Adds UTM parameters'], thoughts: ['This is simpler than expected', 'The preview looks professional', 'How do I deploy to the whole team?'], pains: ['Wants Google Workspace auto-push', 'Some team members resist change'], emotion: 4 },
        { name: 'Activation', actions: ['Deploys to 5 team members', 'Adds campaign banner', 'Checks first day analytics'], thoughts: ['We got 47 clicks on day one!', 'The banner CTR is 3.2%', 'I need to show this to the CEO'], pains: ['Wants more detailed analytics', 'Needs team-wide deployment'], emotion: 4 },
        { name: 'Advocacy', actions: ['Upgrades to paid plan', 'Rolls out to all 50 employees', 'Shares results on LinkedIn'], thoughts: ['This is a no-brainer for any SaaS', 'Signatures are our highest CTR channel', 'I should tell other marketing heads'], pains: ['Wants API integration with HubSpot', 'Needs advanced A/B testing'], emotion: 4 }
      ],
      tags: ['Primary', 'B2B', 'Decision Maker']
    }),
    newPersona({
      id: 'demo2',
      name: 'Founder Farhan',
      role: 'CEO & Co-founder',
      company: 'Early-stage startup (5-15 employees)',
      age: '29',
      location: 'Mumbai, India',
      income: '₹15-25 LPA (+ equity)',
      avatar: '👨‍💻',
      quote: 'Every dollar counts pre-Series A. If a tool doesn\'t move the needle in week one, it\'s gone.',
      bio: 'Farhan is building a developer tools startup. He wears every hat — product, marketing, sales, support. He discovered UTMStamp while looking for ways to make his cold outreach more trackable. He personally sends 50+ emails/day and wants to know which signature CTAs drive demo bookings.',
      goals: ['Get first 100 paying customers', 'Track which outreach channels convert', 'Look professional despite tiny team', 'Automate everything possible'],
      frustrations: ['No budget for enterprise tools', 'Can\'t tell which emails drive signups', 'Signatures look different across the team', 'Too many tools, too little time'],
      behaviors: ['Ships features at midnight', 'Tests every free tool on Product Hunt', 'Obsesses over unit economics', 'Reads HN and Indie Hackers daily'],
      tools: ['VS Code', 'Linear', 'Superhuman', 'Notion', 'Stripe', 'UTMStamp'],
      empathy: {
        says: ['\"Is there a free plan?\"', '\"How fast can I set this up?\"', '\"Show me the data, not the features\"', '\"Can I use this for cold outreach tracking?\"'],
        thinks: ['Will this save me 30 minutes a week?', 'Can I justify this to my co-founder?', 'Free tier better not be crippled', 'I need results before the next investor meeting'],
        does: ['Tries the product within 5 minutes of landing', 'Checks pricing before features', 'Cancels anything not used in 2 weeks', 'Builds integrations himself if API exists'],
        feels: ['Excited by tools that "just work"', 'Impatient with complex onboarding', 'Anxious about burn rate', 'Proud when team looks polished to investors']
      },
      journey: [
        { name: 'Discovery', actions: ['Sees UTMStamp on Product Hunt', 'Clicks through, scans landing page in 30 seconds'], thoughts: ['Interesting — signatures as a channel', 'Is there a free plan?'], pains: ['Skeptical of new tools', 'Time-poor'], emotion: 2 },
        { name: 'Trial', actions: ['Signs up in under 1 minute', 'Creates signature with CTA', 'Sends 10 test emails'], thoughts: ['This was fast', 'Let me see if anyone clicks'], pains: ['Wants instant gratification', 'No patience for tutorials'], emotion: 3 },
        { name: 'Value Discovery', actions: ['Gets first click notification', 'Sees which CTA performed better', 'Shares with co-founder'], thoughts: ['Wait, 5 clicks from signatures today?', 'This is like free advertising'], pains: ['Wants Slack notifications for clicks', 'Needs team deployment'], emotion: 4 }
      ],
      tags: ['Secondary', 'Startup', 'Hands-on']
    }),
    newPersona({
      id: 'demo3',
      name: 'Sales Sam',
      role: 'Sales Development Rep',
      company: 'Mid-market SaaS (200-500 employees)',
      age: '26',
      location: 'Delhi NCR, India',
      income: '₹12-18 LPA',
      avatar: '🧑‍💼',
      quote: 'I send 80 emails a day. If my signature can book even one extra meeting a month, that\'s worth it.',
      bio: 'Sam is an SDR who lives in his inbox. He sends 80+ prospecting emails daily through Outreach and direct Gmail. He noticed his colleague was getting more replies after updating their signature with a case study link. He wants to track which signature elements drive engagement.',
      goals: ['Book 20 qualified meetings per month', 'Stand out in prospect\'s inbox', 'Track what resonates with prospects', 'Get promoted to Account Executive'],
      frustrations: ['Generic signatures that look like spam', 'No way to know if prospects clicked anything', 'Manager wants metrics on everything', 'Signature changes require IT tickets'],
      behaviors: ['A/B tests email subject lines obsessively', 'Tracks every metric in Salesforce', 'Updates LinkedIn profile weekly', 'Listens to sales podcasts during commute'],
      tools: ['Salesforce', 'Outreach', 'LinkedIn Sales Navigator', 'Gong', 'Gmail', 'UTMStamp'],
      empathy: {
        says: ['\"Can I see who clicked my signature?\"', '\"Does this integrate with Salesforce?\"', '\"I need to change my CTA weekly\"', '\"My manager wants click-through data\"'],
        thinks: ['If I can track signature clicks, I can optimize my outreach', 'The prospect saw my case study — warm lead!', 'I need an edge over other SDRs', 'Every touchpoint matters in sales'],
        does: ['Changes signature CTA based on campaign', 'Screenshots click data for 1-on-1s with manager', 'Shares best-performing signatures with team', 'Tests different banner images'],
        feels: ['Motivated by data-driven wins', 'Frustrated by black-box email metrics', 'Competitive with other SDRs', 'Proud when signature clicks lead to meetings']
      },
      journey: [
        { name: 'Need Recognition', actions: ['Sees colleague getting more replies', 'Asks what changed — it was the signature'], thoughts: ['Could my signature be costing me meetings?', 'I send 80 emails — that\'s 80 impressions'], pains: ['Never thought about signatures as a channel'], emotion: 2 },
        { name: 'Setup', actions: ['Gets UTMStamp link from colleague', 'Creates professional signature in 10 min', 'Adds case study banner CTA'], thoughts: ['This looks way better than my old signature', 'Now I can track which CTA works'], pains: ['Wants Outreach integration', 'Needs mobile-friendly signatures'], emotion: 3 },
        { name: 'Impact', actions: ['Sees 12% CTR on case study banner', 'Books 2 meetings from signature clicks', 'Presents data in team standup'], thoughts: ['This is basically free leads', 'Manager is impressed', 'I need to rotate CTAs monthly'], pains: ['Wants automated A/B testing', 'Needs Salesforce activity logging'], emotion: 4 }
      ],
      tags: ['Secondary', 'End User', 'Sales']
    })
  ];
  save();
}

// ===== Rendering =====
function render() {
  renderSidebar();
  renderContent();
}

function renderSidebar() {
  const list = document.getElementById('personaList');
  list.innerHTML = personas.map(p => `
    <div class="persona-item ${p.id === activeId ? 'active' : ''}" onclick="selectPersona('${p.id}')">
      <div class="persona-avatar">${p.avatar ? (p.avatar.startsWith('http') ? `<img src="${p.avatar}">` : p.avatar) : '👤'}</div>
      <div class="persona-info">
        <h3>${p.name || 'Untitled'}</h3>
        <p>${p.role || 'No role'}</p>
      </div>
    </div>
  `).join('');
  document.getElementById('personaCount').textContent = `${personas.length} persona${personas.length !== 1 ? 's' : ''}`;
}

function renderContent() {
  const el = document.getElementById('content');
  const p = personas.find(x => x.id === activeId);
  if (!p) { el.innerHTML = renderEmpty(); return; }
  switch(activeTab) {
    case 'profile': el.innerHTML = renderProfile(p); break;
    case 'empathy': el.innerHTML = renderEmpathy(p); break;
    case 'journey': el.innerHTML = renderJourney(p); break;
    case 'compare': el.innerHTML = renderCompare(); break;
    case 'dashboard': el.innerHTML = renderDashboard(); break;
  }
}

function renderEmpty() {
  return `<div class="empty">
    <div class="empty-icon">🎭</div>
    <h2>No Persona Selected</h2>
    <p>Create a new persona or pick one from the sidebar to start building.</p>
    <button class="btn btn-primary" style="margin-top:16px" onclick="openNewModal()">+ Create Persona</button>
  </div>`;
}

function renderProfile(p) {
  const tagColors = ['tag-blue','tag-purple','tag-green','tag-yellow','tag-red'];
  return `
  <div class="profile-grid">
    <div>
      <div class="profile-card">
        <div class="profile-avatar-lg">${p.avatar ? (p.avatar.startsWith('http') ? `<img src="${p.avatar}">` : p.avatar) : '👤'}</div>
        <div class="profile-name">${p.name || 'Untitled'}</div>
        <div class="profile-role">${p.role || 'No role'}</div>
        ${p.quote ? `<div class="profile-quote">"${p.quote}"</div>` : ''}
        <div class="profile-meta">
          ${metaRow('Company', p.company)}
          ${metaRow('Age', p.age)}
          ${metaRow('Location', p.location)}
          ${metaRow('Income', p.income)}
          ${p.tags.length ? `<div class="meta-row"><span class="meta-label">Tags</span><div class="tag-list">${p.tags.map((t,i) => `<span class="tag ${tagColors[i % tagColors.length]}">${t}</span>`).join('')}</div></div>` : ''}
        </div>
        <div style="margin-top:16px;display:flex;gap:8px;justify-content:center">
          <button class="btn btn-ghost btn-sm" onclick="openEditModal('${p.id}')">✏️ Edit</button>
          <button class="btn btn-ghost btn-sm" style="color:var(--red)" onclick="deletePersona('${p.id}')">🗑️ Delete</button>
        </div>
      </div>
    </div>
    <div class="profile-details">
      ${p.bio ? `<div class="detail-section"><h3>📖 Bio</h3><div class="bio-text">${p.bio}</div></div>` : ''}
      ${listSection('🎯 Goals', p.goals, 'tag-green')}
      ${listSection('😤 Frustrations', p.frustrations, 'tag-red')}
      ${listSection('🔄 Behaviors', p.behaviors, 'tag-blue')}
      ${listSection('🛠️ Tools & Channels', p.tools, 'tag-purple')}
    </div>
  </div>`;
}

function metaRow(label, val) {
  return val ? `<div class="meta-row"><span class="meta-label">${label}</span><span>${val}</span></div>` : '';
}

function listSection(title, items, tagClass) {
  if (!items || !items.length) return '';
  return `<div class="detail-section"><h3>${title}</h3><div class="tag-list">${items.map(i => `<span class="tag ${tagClass}">${i}</span>`).join('')}</div></div>`;
}

function renderEmpathy(p) {
  const quads = [
    { key: 'says', label: 'Says', emoji: '💬', cls: 'quad-says' },
    { key: 'thinks', label: 'Thinks', emoji: '💭', cls: 'quad-thinks' },
    { key: 'does', label: 'Does', emoji: '⚡', cls: 'quad-does' },
    { key: 'feels', label: 'Feels', emoji: '❤️', cls: 'quad-feels' }
  ];
  return `<div class="empathy-wrapper"><div class="empathy-grid">${quads.map(q => `
    <div class="empathy-quad ${q.cls}">
      <h3><span class="emoji">${q.emoji}</span> ${q.label}</h3>
      <div class="empathy-items" id="eq-${q.key}">
        ${(p.empathy[q.key]||[]).map((item, i) => `
          <div class="empathy-item">
            <span>${item}</span>
            <button onclick="removeEmpathyItem('${q.key}',${i})">✕</button>
          </div>
        `).join('')}
      </div>
      <div class="empathy-add">
        <input placeholder="Add ${q.label.toLowerCase()} item..." id="emp-input-${q.key}" onkeydown="if(event.key==='Enter')addEmpathyItem('${q.key}')">
        <button onclick="addEmpathyItem('${q.key}')">Add</button>
      </div>
    </div>
  `).join('')}</div></div>`;
}

function addEmpathyItem(key) {
  const input = document.getElementById(`emp-input-${key}`);
  const val = input.value.trim();
  if (!val) return;
  const p = personas.find(x => x.id === activeId);
  if (!p) return;
  if (!p.empathy[key]) p.empathy[key] = [];
  p.empathy[key].push(val);
  input.value = '';
  save(); renderContent();
}

function removeEmpathyItem(key, idx) {
  const p = personas.find(x => x.id === activeId);
  if (!p) return;
  p.empathy[key].splice(idx, 1);
  save(); renderContent();
}

function renderJourney(p) {
  const stages = p.journey || [];
  return `<div class="journey-container">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <h2 style="font-size:1.1rem">🗺️ ${p.name}'s Journey</h2>
      <button class="btn btn-primary btn-sm" onclick="addJourneyStage()">+ Add Stage</button>
    </div>
    ${stages.length ? `
      <div class="journey-connector">
        ${stages.map((s, i) => `<div class="connector-dot"></div>${i < stages.length - 1 ? '<div class="connector-line"></div>' : ''}`).join('')}
      </div>
      <div class="journey-stages">
        ${stages.map((s, i) => `
          <div class="journey-stage">
            <h3>${s.name || `Stage ${i+1}`}</h3>
            <div class="stage-num">Stage ${i+1} of ${stages.length}</div>
            ${journeySection('Actions', s.actions)}
            ${journeySection('Thoughts', s.thoughts)}
            ${journeySection('Pain Points', s.pains)}
            <div class="emotion-bar">
              <span class="emoji">${EMOTIONS[s.emotion || 2]}</span>
              <span class="label">${EMOTION_LABELS[s.emotion || 2]}</span>
            </div>
            <div style="display:flex;gap:4px;margin-top:8px">
              <button class="btn btn-ghost btn-sm" style="flex:1" onclick="editJourneyStage(${i})">Edit</button>
              <button class="btn btn-ghost btn-sm" style="color:var(--red)" onclick="removeJourneyStage(${i})">✕</button>
            </div>
          </div>
        `).join('')}
      </div>
    ` : '<div class="empty"><div class="empty-icon">🗺️</div><h2>No Journey Map Yet</h2><p>Add stages to map out this persona\'s experience.</p></div>'}
  </div>`;
}

function journeySection(title, items) {
  if (!items || !items.length) return '';
  return `<div class="journey-section"><h4>${title}</h4><ul>${items.map(i => `<li>${i}</li>`).join('')}</ul></div>`;
}

function renderCompare() {
  if (personas.length < 2) {
    return `<div class="empty"><div class="empty-icon">⚖️</div><h2>Need 2+ Personas</h2><p>Create at least two personas to compare them.</p></div>`;
  }
  const cols = personas.length + 1;
  const gridCols = `200px repeat(${personas.length}, 1fr)`;
  const fields = [
    { label: '👤 Role', fn: p => p.role || '—' },
    { label: '🏢 Company', fn: p => p.company || '—' },
    { label: '📍 Location', fn: p => p.location || '—' },
    { label: '🎯 Top Goal', fn: p => (p.goals[0] || '—') },
    { label: '😤 Top Frustration', fn: p => (p.frustrations[0] || '—') },
    { label: '🛠️ Key Tools', fn: p => (p.tools.slice(0,3).join(', ') || '—') },
    { label: '🏷️ Tags', fn: p => (p.tags.join(', ') || '—') },
    { label: '🗺️ Journey Stages', fn: p => p.journey.length.toString() },
    { label: '🧠 Empathy Items', fn: p => Object.values(p.empathy).flat().length.toString() }
  ];
  return `<div style="max-width:1100px;margin:0 auto">
    <h2 style="font-size:1.1rem;margin-bottom:16px">⚖️ Persona Comparison</h2>
    <div style="overflow-x:auto">
      <div class="comparison-header" style="grid-template-columns:${gridCols}">
        <div></div>
        ${personas.map(p => `<div style="text-align:center"><div style="font-size:1.5rem;margin-bottom:4px">${p.avatar || '👤'}</div><div>${p.name}</div></div>`).join('')}
      </div>
      ${fields.map(f => `
        <div class="comparison-row" style="grid-template-columns:${gridCols}">
          <div class="comparison-label">${f.label}</div>
          ${personas.map(p => `<div class="comparison-cell">${f.fn(p)}</div>`).join('')}
        </div>
      `).join('')}
    </div>
  </div>`;
}

function renderDashboard() {
  const totalEmpathy = personas.reduce((s, p) => s + Object.values(p.empathy).flat().length, 0);
  const totalJourney = personas.reduce((s, p) => s + p.journey.length, 0);
  const totalGoals = personas.reduce((s, p) => s + p.goals.length, 0);
  const totalFrustrations = personas.reduce((s, p) => s + p.frustrations.length, 0);
  const allTags = [...new Set(personas.flatMap(p => p.tags))];
  const allTools = {};
  personas.forEach(p => p.tools.forEach(t => { allTools[t] = (allTools[t]||0) + 1; }));
  const topTools = Object.entries(allTools).sort((a,b) => b[1]-a[1]).slice(0, 8);

  return `<div style="max-width:1000px;margin:0 auto">
    <h2 style="font-size:1.1rem;margin-bottom:16px">📊 Persona Dashboard</h2>
    <div class="dash-stats">
      <div class="stat-card"><div class="num">${personas.length}</div><div class="label">Personas</div></div>
      <div class="stat-card"><div class="num">${totalEmpathy}</div><div class="label">Empathy Items</div></div>
      <div class="stat-card"><div class="num">${totalJourney}</div><div class="label">Journey Stages</div></div>
      <div class="stat-card"><div class="num">${totalGoals}</div><div class="label">Goals Tracked</div></div>
      <div class="stat-card"><div class="num">${totalFrustrations}</div><div class="label">Frustrations Found</div></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
      <div class="detail-section">
        <h3>🏷️ All Tags</h3>
        <div class="tag-list" style="margin-top:8px">
          ${allTags.map((t, i) => `<span class="tag tag-${['blue','purple','green','yellow','red'][i%5]}">${t}</span>`).join('')}
        </div>
      </div>
      <div class="detail-section">
        <h3>🛠️ Most Used Tools</h3>
        <div style="margin-top:8px;display:flex;flex-direction:column;gap:6px">
          ${topTools.map(([name, count]) => `
            <div style="display:flex;align-items:center;gap:8px;font-size:.85rem">
              <span style="flex:1">${name}</span>
              <div style="width:${count/personas.length*100}px;height:8px;background:var(--accent);border-radius:4px"></div>
              <span style="color:var(--text2);width:30px;text-align:right">${count}</span>
            </div>
          `).join('')}
        </div>
      </div>
    </div>
    <div class="detail-section" style="margin-top:16px">
      <h3>🎯 Goals vs Frustrations by Persona</h3>
      <div style="margin-top:12px;display:flex;flex-direction:column;gap:12px">
        ${personas.map(p => `
          <div style="display:flex;align-items:center;gap:12px;font-size:.85rem">
            <span style="width:120px;flex-shrink:0">${p.avatar || '👤'} ${p.name.split(' ')[0]}</span>
            <div style="flex:1;display:flex;gap:4px;align-items:center">
              <div style="width:${p.goals.length*30}px;height:20px;background:var(--green);border-radius:4px;opacity:.7" title="${p.goals.length} goals"></div>
              <span style="color:var(--green);font-size:.7rem">${p.goals.length}G</span>
            </div>
            <div style="flex:1;display:flex;gap:4px;align-items:center">
              <div style="width:${p.frustrations.length*30}px;height:20px;background:var(--red);border-radius:4px;opacity:.7" title="${p.frustrations.length} frustrations"></div>
              <span style="color:var(--red);font-size:.7rem">${p.frustrations.length}F</span>
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  </div>`;
}

// ===== Actions =====
function selectPersona(id) { activeId = id; render(); }
function switchTab(tab) { activeTab = tab; document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab)); renderContent(); }

function deletePersona(id) {
  if (!confirm('Delete this persona?')) return;
  personas = personas.filter(p => p.id !== id);
  if (activeId === id) activeId = personas[0]?.id || null;
  save(); render();
}

function openNewModal() { openModal(); }

function openEditModal(id) {
  const p = personas.find(x => x.id === id);
  if (p) openModal(p);
}

function openModal(existing = null) {
  const isEdit = !!existing;
  const p = existing || newPersona();
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.onclick = e => { if (e.target === overlay) overlay.remove(); };
  overlay.innerHTML = `
  <div class="modal">
    <div class="modal-header">
      <h2>${isEdit ? 'Edit' : 'New'} Persona</h2>
      <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group"><label>Name</label><input id="m-name" value="${esc(p.name)}" placeholder="e.g. Marketing Maya"></div>
        <div class="form-group"><label>Avatar (emoji or URL)</label><input id="m-avatar" value="${esc(p.avatar)}" placeholder="👩‍💼 or https://..."></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Role / Title</label><input id="m-role" value="${esc(p.role)}" placeholder="Head of Marketing"></div>
        <div class="form-group"><label>Company / Context</label><input id="m-company" value="${esc(p.company)}" placeholder="B2B SaaS Startup"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Age</label><input id="m-age" value="${esc(p.age)}" placeholder="34"></div>
        <div class="form-group"><label>Location</label><input id="m-location" value="${esc(p.location)}" placeholder="Bangalore, India"></div>
      </div>
      <div class="form-group"><label>Income / Budget Range</label><input id="m-income" value="${esc(p.income)}" placeholder="₹30-40 LPA"></div>
      <div class="form-group"><label>Quote / Mantra</label><input id="m-quote" value="${esc(p.quote)}" placeholder="A defining quote from this persona"></div>
      <div class="form-group"><label>Bio / Background</label><textarea id="m-bio" rows="3" placeholder="Who is this person? What's their story?">${esc(p.bio)}</textarea></div>
      <div class="form-group"><label>Goals (comma-separated)</label><textarea id="m-goals" rows="2" placeholder="Track ROI, Scale team...">${p.goals.join(', ')}</textarea></div>
      <div class="form-group"><label>Frustrations (comma-separated)</label><textarea id="m-frustrations" rows="2" placeholder="Can't track clicks, Manual updates...">${p.frustrations.join(', ')}</textarea></div>
      <div class="form-group"><label>Behaviors (comma-separated)</label><textarea id="m-behaviors" rows="2" placeholder="Checks analytics daily, Tests new tools...">${p.behaviors.join(', ')}</textarea></div>
      <div class="form-group"><label>Tools & Channels (comma-separated)</label><textarea id="m-tools" rows="2" placeholder="HubSpot, Slack, Notion...">${p.tools.join(', ')}</textarea></div>
      <div class="form-group"><label>Tags (comma-separated)</label><input id="m-tags" value="${p.tags.join(', ')}" placeholder="Primary, B2B, Decision Maker"></div>
    </div>
    <div class="modal-footer">
      ${isEdit ? `<button class="btn btn-danger btn-sm" onclick="deletePersona('${p.id}');this.closest('.modal-overlay').remove()">Delete</button>` : ''}
      <button class="btn btn-ghost" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
      <button class="btn btn-primary" onclick="saveModal('${p.id}', ${isEdit})">Save</button>
    </div>
  </div>`;
  document.body.appendChild(overlay);
  overlay.querySelector('#m-name').focus();
}

function saveModal(id, isEdit) {
  const g = i => document.getElementById(i).value;
  const splitList = v => v.split(',').map(x => x.trim()).filter(Boolean);
  const data = {
    name: g('m-name'), avatar: g('m-avatar'), role: g('m-role'), company: g('m-company'),
    age: g('m-age'), location: g('m-location'), income: g('m-income'),
    quote: g('m-quote'), bio: g('m-bio'),
    goals: splitList(g('m-goals')), frustrations: splitList(g('m-frustrations')),
    behaviors: splitList(g('m-behaviors')), tools: splitList(g('m-tools')),
    tags: splitList(g('m-tags'))
  };
  if (isEdit) {
    const p = personas.find(x => x.id === id);
    Object.assign(p, data);
  } else {
    const p = newPersona({ ...data, id });
    personas.push(p);
    activeId = p.id;
  }
  save(); render();
  document.querySelector('.modal-overlay')?.remove();
}

function esc(s) { return (s||'').replace(/"/g, '&quot;').replace(/</g, '&lt;'); }

// ===== Journey Stage Modal =====
function addJourneyStage() {
  openStageModal();
}

function editJourneyStage(idx) {
  const p = personas.find(x => x.id === activeId);
  if (!p) return;
  openStageModal(p.journey[idx], idx);
}

function removeJourneyStage(idx) {
  const p = personas.find(x => x.id === activeId);
  if (!p) return;
  p.journey.splice(idx, 1);
  save(); renderContent();
}

function openStageModal(existing = null, idx = -1) {
  const isEdit = existing !== null;
  const s = existing || { name: '', actions: [], thoughts: [], pains: [], emotion: 2 };
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.onclick = e => { if (e.target === overlay) overlay.remove(); };
  overlay.innerHTML = `
  <div class="modal">
    <div class="modal-header">
      <h2>${isEdit ? 'Edit' : 'Add'} Journey Stage</h2>
      <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group"><label>Stage Name</label><input id="s-name" value="${esc(s.name)}" placeholder="e.g. Awareness, Consideration, Purchase..."></div>
      <div class="form-group"><label>Actions (comma-separated)</label><textarea id="s-actions" rows="2" placeholder="What does the user do?">${(s.actions||[]).join(', ')}</textarea></div>
      <div class="form-group"><label>Thoughts (comma-separated)</label><textarea id="s-thoughts" rows="2" placeholder="What are they thinking?">${(s.thoughts||[]).join(', ')}</textarea></div>
      <div class="form-group"><label>Pain Points (comma-separated)</label><textarea id="s-pains" rows="2" placeholder="What frustrates them?">${(s.pains||[]).join(', ')}</textarea></div>
      <div class="form-group">
        <label>Emotion: ${EMOTIONS.map((e,i) => `<span onclick="document.getElementById('s-emotion').value=${i};this.parentElement.querySelectorAll('span').forEach(x=>x.style.opacity=0.4);this.style.opacity=1" style="cursor:pointer;font-size:1.3rem;${i===s.emotion?'':'opacity:0.4'}">${e}</span>`).join(' ')}</label>
        <input type="hidden" id="s-emotion" value="${s.emotion || 2}">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
      <button class="btn btn-primary" onclick="saveStageModal(${idx})">Save</button>
    </div>
  </div>`;
  document.body.appendChild(overlay);
}

function saveStageModal(idx) {
  const g = i => document.getElementById(i).value;
  const splitList = v => v.split(',').map(x => x.trim()).filter(Boolean);
  const stage = {
    name: g('s-name'),
    actions: splitList(g('s-actions')),
    thoughts: splitList(g('s-thoughts')),
    pains: splitList(g('s-pains')),
    emotion: parseInt(g('s-emotion')) || 2
  };
  const p = personas.find(x => x.id === activeId);
  if (!p) return;
  if (idx >= 0) { p.journey[idx] = stage; }
  else { p.journey.push(stage); }
  save(); renderContent();
  document.querySelector('.modal-overlay')?.remove();
}

// ===== Templates =====

  activeTab = 'templates';
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  const el = document.getElementById('content');
  el.innerHTML = `<div style="max-width:1000px;margin:0 auto">
    <h2 style="font-size:1.1rem;margin-bottom:8px">📋 Persona Templates</h2>
    <p style="color:var(--text2);font-size:.85rem;margin-bottom:20px">Start with a template and customize. Click to create.</p>
    <div class="template-grid">
      ${TEMPLATES.map((t, i) => `
        <div class="template-card" onclick="useTemplate(${i})">
          <h3>${t.avatar} ${t.name}</h3>

          <div class="template-tags">${t.tags.map(tag => `<span class="tag tag-blue">${tag}</span>`).join('')}</div>
        </div>
      `).join('')}

  </div>`;
}

function useTemplate(idx) {
  const t = TEMPLATES[idx];
  const p = newPersona({ ...t.data, name: t.name, avatar: t.avatar, tags: [...t.tags] });
  openModal(p);
}

// ===== Import/Export =====
function exportData() {
  const blob = new Blob([JSON.stringify(personas, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `persona-forge-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
}

function importData() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        if (Array.isArray(data)) {
          personas = data;
          activeId = personas[0]?.id || null;
          save(); render();
        }
      } catch(e) { alert('Invalid JSON file'); }
    };
    reader.readAsText(file);
  };
  input.click();
}

function exportMarkdown() {
  const p = personas.find(x => x.id === activeId);
  if (!p) { alert('Select a persona first'); return; }
  const md = generateMarkdown(p);
  const blob = new Blob([md], { type: 'text/markdown' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${(p.name || 'persona').toLowerCase().replace(/\s+/g, '-')}.md`;
  a.click();
}

function generateMarkdown(p) {
  let md = `# ${p.avatar || '👤'} ${p.name}\n\n`;
  md += `**${p.role}** at ${p.company}\n\n`;
  if (p.quote) md += `> "${p.quote}"\n\n`;
  md += `## Demographics\n`;
  if (p.age) md += `- **Age:** ${p.age}\n`;
  if (p.location) md += `- **Location:** ${p.location}\n`;
  if (p.income) md += `- **Income:** ${p.income}\n`;
  if (p.tags.length) md += `- **Tags:** ${p.tags.join(', ')}\n`;
  md += '\n';
  if (p.bio) md += `## Bio\n${p.bio}\n\n`;
  if (p.goals.length) md += `## 🎯 Goals\n${p.goals.map(g => `- ${g}`).join('\n')}\n\n`;
  if (p.frustrations.length) md += `## 😤 Frustrations\n${p.frustrations.map(f => `- ${f}`).join('\n')}\n\n`;
  if (p.behaviors.length) md += `## 🔄 Behaviors\n${p.behaviors.map(b => `- ${b}`).join('\n')}\n\n`;
  if (p.tools.length) md += `## 🛠️ Tools\n${p.tools.map(t => `- ${t}`).join('\n')}\n\n`;
  const eq = p.empathy;
  if (Object.values(eq).flat().length) {
    md += `## 🧠 Empathy Map\n\n`;
    if (eq.says?.length) md += `### 💬 Says\n${eq.says.map(s => `- "${s}"`).join('\n')}\n\n`;
    if (eq.thinks?.length) md += `### 💭 Thinks\n${eq.thinks.map(s => `- ${s}`).join('\n')}\n\n`;
    if (eq.does?.length) md += `### ⚡ Does\n${eq.does.map(s => `- ${s}`).join('\n')}\n\n`;
    if (eq.feels?.length) md += `### ❤️ Feels\n${eq.feels.map(s => `- ${s}`).join('\n')}\n\n`;
  }
  if (p.journey.length) {
    md += `## 🗺️ User Journey\n\n`;
    p.journey.forEach((s, i) => {
      md += `### Stage ${i+1}: ${s.name} ${EMOTIONS[s.emotion||2]}\n`;
      if (s.actions?.length) md += `**Actions:** ${s.actions.join(' → ')}\n`;
      if (s.thoughts?.length) md += `**Thoughts:** ${s.thoughts.join('; ')}\n`;
      if (s.pains?.length) md += `**Pain Points:** ${s.pains.join('; ')}\n`;
      md += '\n';
    });
  }
  return md;
}

// ===== Keyboard Shortcuts =====
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;
  if (document.querySelector('.modal-overlay')) {
    if (e.key === 'Escape') document.querySelector('.modal-overlay').remove();
    return;
  }
  switch(e.key) {
    case 'n': case 'N': e.preventDefault(); openNewModal(); break;
    case 'e': case 'E': if (activeId) { e.preventDefault(); openEditModal(activeId); } break;
    case '1': e.preventDefault(); switchTab('profile'); break;
    case '2': e.preventDefault(); switchTab('empathy'); break;
    case '3': e.preventDefault(); switchTab('journey'); break;
    case '4': e.preventDefault(); switchTab('compare'); break;
    case '5': e.preventDefault(); switchTab('dashboard'); break;
    case 'Escape': break;
  }
});

// ===== Init =====
load(); render();
