<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEO Forge — On-Page SEO Toolkit</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0d1117;--surface:#161b22;--surface2:#1c2333;--border:#30363d;--text:#e6edf3;--text2:#8b949e;--accent:#58a6ff;--accent2:#388bfd;--green:#3fb950;--yellow:#d29922;--red:#f85149;--orange:#db6d28;--purple:#bc8cff;--radius:8px;--font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
body{background:var(--bg);color:var(--text);font-family:var(--font);height:100vh;display:flex;overflow:hidden}
button{cursor:pointer;font-family:inherit;border:none;background:none;color:var(--text)}
input,textarea,select{font-family:inherit;background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:var(--radius);padding:8px 12px;font-size:14px;width:100%}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--accent)}
textarea{resize:vertical;min-height:60px}
select{cursor:pointer}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text2)}

/* Layout */
.sidebar{width:240px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sidebar-header{padding:16px;border-bottom:1px solid var(--border)}
.sidebar-header h1{font-size:16px;display:flex;align-items:center;gap:8px}
.sidebar-header h1 span{font-size:20px}
.nav{flex:1;overflow-y:auto;padding:8px}
.nav-item{padding:10px 12px;border-radius:var(--radius);cursor:pointer;display:flex;align-items:center;gap:10px;font-size:14px;color:var(--text2);transition:all .15s}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:var(--accent);color:#fff}
.nav-item .icon{font-size:16px;width:20px;text-align:center}

.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{padding:12px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.topbar h2{font-size:18px;font-weight:600}
.topbar-actions{display:flex;gap:8px}
.content{flex:1;overflow-y:auto;padding:20px}

.btn{padding:8px 16px;border-radius:var(--radius);font-size:13px;font-weight:500;transition:all .15s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2)}
.btn-secondary{background:var(--surface2);border:1px solid var(--border);color:var(--text)}
.btn-secondary:hover{background:var(--border)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-icon{padding:6px 8px;font-size:14px}

.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.card h3{font-size:15px;margin-bottom:12px;display:flex;align-items:center;gap:8px}

.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:13px;color:var(--text2);margin-bottom:6px;font-weight:500}
.form-row{display:flex;gap:12px}
.form-row .form-group{flex:1}

.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600}
.badge-green{background:rgba(63,185,80,.15);color:var(--green)}
.badge-yellow{background:rgba(210,153,34,.15);color:var(--yellow)}
.badge-red{background:rgba(248,81,73,.15);color:var(--red)}
.badge-blue{background:rgba(88,166,255,.15);color:var(--accent)}

.char-count{font-size:11px;margin-top:4px;text-align:right}
.char-count.good{color:var(--green)}
.char-count.warn{color:var(--yellow)}
.char-count.bad{color:var(--red)}

.tabs{display:flex;gap:4px;margin-bottom:16px;flex-wrap:wrap}
.tab{padding:6px 14px;border-radius:var(--radius);font-size:13px;color:var(--text2);cursor:pointer;transition:all .15s}
.tab:hover{background:var(--surface2);color:var(--text)}
.tab.active{background:var(--accent);color:#fff}

.copy-btn{position:relative}
.copy-btn .tooltip{position:absolute;top:-28px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;padding:2px 8px;border-radius:4px;font-size:11px;opacity:0;pointer-events:none;transition:opacity .2s;white-space:nowrap}
.copy-btn .tooltip.show{opacity:1}

/* SERP Preview */
.serp-preview{background:var(--surface2);border-radius:var(--radius);padding:16px;margin-bottom:16px}
.serp-google{font-family:Arial,sans-serif}
.serp-google .url{font-size:12px;color:var(--green);margin-bottom:2px}
.serp-google .title{font-size:18px;color:var(--accent);margin-bottom:4px;cursor:pointer;text-decoration:none;display:block}
.serp-google .title:hover{text-decoration:underline}
.serp-google .desc{font-size:13px;color:var(--text2);line-height:1.4}

/* Social Previews */
.social-preview{background:var(--surface2);border-radius:var(--radius);overflow:hidden;margin-bottom:12px;max-width:500px}
.social-preview .preview-img{width:100%;height:260px;background:var(--border);display:flex;align-items:center;justify-content:center;color:var(--text2);font-size:13px;background-size:cover;background-position:center}
.social-preview .preview-body{padding:12px}
.social-preview .preview-domain{font-size:11px;color:var(--text2);text-transform:uppercase;margin-bottom:4px}
.social-preview .preview-title{font-size:14px;font-weight:600;margin-bottom:4px;line-height:1.3}
.social-preview .preview-desc{font-size:12px;color:var(--text2);line-height:1.3}

.social-preview.twitter{border:1px solid var(--border);border-radius:12px}
.social-preview.twitter .preview-img{height:250px}
.social-preview.linkedin{border:1px solid var(--border)}
.social-preview.linkedin .preview-img{height:250px}

/* Structured Data */
.code-block{background:#0d1117;border:1px solid var(--border);border-radius:var(--radius);padding:12px;font-family:'SF Mono',Consolas,monospace;font-size:13px;line-height:1.5;overflow-x:auto;position:relative;white-space:pre-wrap;word-break:break-all;max-height:500px;overflow-y:auto}
.code-block .key{color:var(--accent)}
.code-block .str{color:var(--green)}
.code-block .num{color:var(--orange)}
.code-block .bool{color:var(--purple)}
.code-block .null{color:var(--red)}

/* Checklist */
.checklist-item{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.checklist-item:last-child{border-bottom:none}
.checklist-icon{font-size:16px;flex-shrink:0;margin-top:2px}
.checklist-text{flex:1}
.checklist-text .label{font-size:14px;font-weight:500}
.checklist-text .hint{font-size:12px;color:var(--text2);margin-top:2px}

/* Score */
.score-ring{width:80px;height:80px;position:relative}
.score-ring svg{width:100%;height:100%;transform:rotate(-90deg)}
.score-ring .value{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:20px;font-weight:700}
.score-section{display:flex;align-items:center;gap:20px;margin-bottom:20px}

/* Stats */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:20px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;text-align:center}
.stat-card .stat-value{font-size:24px;font-weight:700;color:var(--accent)}
.stat-card .stat-label{font-size:12px;color:var(--text2);margin-top:4px}

/* Tag input */
.tag-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.tag{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;background:rgba(88,166,255,.15);color:var(--accent);border-radius:12px;font-size:12px}
.tag .remove{cursor:pointer;opacity:.6;font-size:14px}
.tag .remove:hover{opacity:1}

/* Robots.txt */
.robots-builder .rule-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.robots-builder .rule-row select{width:140px;flex-shrink:0}
.robots-builder .rule-row input{flex:1}
.robots-builder .rule-row button{flex-shrink:0}

/* Heading analyzer */
.heading-tree{padding-left:0;list-style:none}
.heading-tree li{padding:4px 0;font-size:14px;display:flex;align-items:center;gap:8px}
.heading-tree .h-tag{font-size:11px;font-weight:700;padding:2px 6px;border-radius:4px;background:rgba(88,166,255,.15);color:var(--accent);min-width:28px;text-align:center}
.heading-tree .h-text{color:var(--text)}
.heading-tree .h-issue{color:var(--red);font-size:11px}

/* Pages/Sites */
.page-list{margin-top:12px}
.page-item{padding:8px 12px;border-radius:var(--radius);cursor:pointer;display:flex;align-items:center;justify-content:space-between;font-size:13px;color:var(--text2);transition:all .15s}
.page-item:hover{background:var(--surface2);color:var(--text)}
.page-item.active{background:rgba(88,166,255,.15);color:var(--accent)}
.page-item .score{font-size:11px;font-weight:600}
.page-item .score.good{color:var(--green)}
.page-item .score.ok{color:var(--yellow)}
.page-item .score.bad{color:var(--red)}

.page-actions{display:flex;gap:4px;margin-top:8px}

/* Help modal */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.show{opacity:1;pointer-events:auto}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;max-width:600px;width:90%;max-height:80vh;overflow-y:auto}
.modal h2{margin-bottom:16px;font-size:18px}
.modal .shortcut-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px}
.modal .shortcut-row:last-child{border-bottom:none}
.modal kbd{background:var(--surface2);padding:2px 6px;border-radius:4px;font-size:12px;border:1px solid var(--border);font-family:monospace}

/* Two-col layout */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:20px}
@media(max-width:1200px){.two-col{grid-template-columns:1fr}}
</style>
</head>

<div class="main">

    </div>
  </div>
  <div class="content" id="content"></div>
</div>

<!-- Help Modal -->
<div class="modal-overlay" id="helpModal">

    <br>

  </div>
</div>

function init() {
  const saved = localStorage.getItem('seoforge_data');
  if (saved) {
    try { pages = JSON.parse(saved); } catch(e) { pages = []; }
  }
  if (!pages.length) seedDemo();
  currentPageId = pages[0]?.id;
  renderPageList();
  renderView();
}

function save() {
  localStorage.setItem('seoforge_data', JSON.stringify(pages));
}

function getPage() {
  return pages.find(p => p.id === currentPageId) || pages[0];
}

// Render
function renderPageList() {
  const el = document.getElementById('pageList');
  el.innerHTML = pages.map(p => {
    const score = calcPageScore(p);
    const cls = score >= 80 ? 'good' : score >= 50 ? 'ok' : 'bad';
    return `<div class="page-item ${p.id===currentPageId?'active':''}" onclick="selectPage('${p.id}')">
      <span>${esc(p.name)}</span>
      <span class="score ${cls}">${score}</span>
    </div>`;
  }).join('');
}

function selectPage(id) {
  currentPageId = id;
  renderPageList();
  renderView();
}

function addPage() {
  const name = prompt('Page name:', 'New Page');
  if (!name) return;
  const p = defaultPage(name);
  pages.push(p);
  currentPageId = p.id;
  save();
  renderPageList();
  renderView();
}

function deletePage() {
  if (pages.length <= 1) return alert('Need at least one page.');
  if (!confirm(`Delete "${getPage().name}"?`)) return;
  pages = pages.filter(p => p.id !== currentPageId);
  currentPageId = pages[0].id;
  save();
  renderPageList();
  renderView();
}

function setView(v) {
  currentView = v;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.toggle('active', n.dataset.view === v));
  document.getElementById('viewTitle').textContent = viewTitles[v];
  renderView();
}

function renderView() {
  const c = document.getElementById('content');
  const p = getPage();
  if (!p) return;
  switch(currentView) {
    case 'meta': renderMeta(c, p); break;
    case 'social': renderSocial(c, p); break;
    case 'structured': renderStructured(c, p); break;
    case 'robots': renderRobots(c, p); break;
    case 'sitemap': renderSitemap(c, p); break;
    case 'headings': renderHeadings(c, p); break;
    case 'keywords': renderKeywords(c, p); break;
    case 'audit': renderAudit(c, p); break;
    case 'dashboard': renderDashboard(c, p); break;
  }
}

function generateMetaTags(p) {
  let t = '';
  if (p.title) t += `<title>${p.title}</title>\n`;
  if (p.description) t += `<meta name="description" content="${p.description}">\n`;
  if (p.keywords.length) t += `<meta name="keywords" content="${p.keywords.join(', ')}">\n`;
  if (p.author) t += `<meta name="author" content="${p.author}">\n`;
  if (p.canonicalUrl) t += `<link rel="canonical" href="${p.canonicalUrl}">\n`;
  if (p.language) t += `<meta http-equiv="content-language" content="${p.language}">\n`;
  t += '\n<!-- Open Graph -->\n';
  t += `<meta property="og:type" content="${p.ogType}">\n`;
  if (p.ogTitle||p.title) t += `<meta property="og:title" content="${p.ogTitle||p.title}">\n`;
  if (p.ogDescription||p.description) t += `<meta property="og:description" content="${p.ogDescription||p.description}">\n`;
  if (p.ogImage) t += `<meta property="og:image" content="${p.ogImage}">\n`;
  if (p.url) t += `<meta property="og:url" content="${p.url}">\n`;
  if (p.ogSiteName) t += `<meta property="og:site_name" content="${p.ogSiteName}">\n`;
  t += '\n<!-- Twitter Card -->\n';
  t += `<meta name="twitter:card" content="${p.twitterCard}">\n`;
  if (p.ogTitle||p.title) t += `<meta name="twitter:title" content="${p.ogTitle||p.title}">\n`;
  if (p.ogDescription||p.description) t += `<meta name="twitter:description" content="${p.ogDescription||p.description}">\n`;
  if (p.ogImage) t += `<meta name="twitter:image" content="${p.ogImage}">\n`;
  if (p.twitterSite) t += `<meta name="twitter:site" content="${p.twitterSite}">\n`;
  if (p.twitterCreator) t += `<meta name="twitter:creator" content="${p.twitterCreator}">\n`;
  return t;
}

function addKeyword(kw) {
  kw = kw.trim();
  if (!kw) return;
  const p = getPage();
  if (!p.keywords.includes(kw)) { p.keywords.push(kw); save(); renderView(); }
}
function removeKeyword(i) {
  const p = getPage(); p.keywords.splice(i,1); save(); renderView();
}

function generateStructuredData(p) {
  let obj = {};
  switch(p.structuredDataType) {
    case 'Article': {
      const d = p.sdArticle;
      obj = {"@context":"https://schema.org","@type":"Article"};
      if (d.headline) obj.headline = d.headline;
      if (d.author) obj.author = {"@type":"Person","name":d.author};
      if (d.publisher) obj.publisher = {"@type":"Organization","name":d.publisher};
      if (d.datePublished) obj.datePublished = d.datePublished;
      if (d.dateModified) obj.dateModified = d.dateModified;
      if (d.image) obj.image = d.image;
      if (d.description) obj.description = d.description;
      break;
    }
    case 'Product': {
      const d = p.sdProduct;
      obj = {"@context":"https://schema.org","@type":"Product"};
      if (d.name) obj.name = d.name;
      if (d.description) obj.description = d.description;
      if (d.image) obj.image = d.image;
      if (d.brand) obj.brand = {"@type":"Brand","name":d.brand};
      if (d.price) obj.offers = {"@type":"Offer","price":d.price,"priceCurrency":d.currency,"availability":`https://schema.org/${d.availability}`};
      if (d.sku) obj.sku = d.sku;
      if (d.ratingValue) obj.aggregateRating = {"@type":"AggregateRating","ratingValue":d.ratingValue,"reviewCount":d.reviewCount||"0"};
      break;
    }
    case 'FAQ': {
      obj = {"@context":"https://schema.org","@type":"FAQPage","mainEntity":[]};
      p.sdFAQ.filter(f => f.q && f.a).forEach(f => {
        obj.mainEntity.push({"@type":"Question","name":f.q,"acceptedAnswer":{"@type":"Answer","text":f.a}});
      });
      break;
    }
    case 'Organization': {
      const d = p.sdOrg;
      obj = {"@context":"https://schema.org","@type":"Organization"};
      if (d.name) obj.name = d.name;
      if (d.url) obj.url = d.url;
      if (d.logo) obj.logo = d.logo;
      if (d.description) obj.description = d.description;
      if (d.email) obj.email = d.email;
      if (d.phone) obj.telephone = d.phone;
      if (d.address) obj.address = {"@type":"PostalAddress","addressLocality":d.address};
      if (d.foundingDate) obj.foundingDate = d.foundingDate;
      break;
    }
    case 'Person': {
      const d = p.sdPerson;
      obj = {"@context":"https://schema.org","@type":"Person"};
      if (d.name) obj.name = d.name;
      if (d.url) obj.url = d.url;
      if (d.image) obj.image = d.image;
      if (d.jobTitle) obj.jobTitle = d.jobTitle;
      if (d.worksFor) obj.worksFor = {"@type":"Organization","name":d.worksFor};
      if (d.sameAs?.length) obj.sameAs = d.sameAs;
      break;
    }
    case 'BreadcrumbList': {
      obj = {"@context":"https://schema.org","@type":"BreadcrumbList","itemListElement":[]};
      p.sdBreadcrumb.forEach((b,i) => {
        obj.itemListElement.push({"@type":"ListItem","position":i+1,"name":b.name,"item":b.url});
      });
      break;
    }
  }
  return JSON.stringify(obj, null, 2);
}

function addSameAs(url) { if (!url.trim()) return; const p = getPage(); p.sdPerson.sameAs = p.sdPerson.sameAs||[]; p.sdPerson.sameAs.push(url.trim()); save(); renderView(); }
function removeSameAs(i) { const p = getPage(); p.sdPerson.sameAs.splice(i,1); save(); renderView(); }

function generateRobotsTxt(p) {
  const grouped = {};
  p.robotsRules.forEach(r => {
    if (!grouped[r.agent]) grouped[r.agent] = [];
    grouped[r.agent].push(r);
  });
  let out = '';
  Object.entries(grouped).forEach(([agent, rules]) => {
    out += `User-agent: ${agent}\n`;
    rules.forEach(r => out += `${r.type}: ${r.path}\n`);
    out += '\n';
  });
  if (p.robotsSitemap) out += `Sitemap: ${p.robotsSitemap}\n`;
  return out.trim();
}

}

function generateSitemapXml(p) {
  let xml = `<?xml version="1.0" encoding="UTF-8"?>\n<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">\n`;
  p.sitemapUrls.forEach(u => {
    xml += `  <url>\n    <loc>${u.loc}</loc>\n`;
    if (u.lastmod) xml += `    <lastmod>${u.lastmod}</lastmod>\n`;
    if (u.changefreq) xml += `    <changefreq>${u.changefreq}</changefreq>\n`;
    if (u.priority) xml += `    <priority>${u.priority}</priority>\n`;
    xml += `  </url>\n`;
  });
  xml += `</urlset>`;
  return xml;
}

function renderHeadings(c, p) {
  const headings = parseHeadings(p.headingsHtml);
  const issues = analyzeHeadings(headings);

  c.innerHTML = `

        <textarea oninput="upd('headingsHtml',this.value)" rows="12" placeholder="<h1>Main Title</h1>\n<h2>Section</h2>\n<h3>Subsection</h3>">${esc(p.headingsHtml)}</textarea>
      </div>
      <div>
        <div class="card">
          <h3>📊 Heading Structure</h3>
          ${headings.length ? `
            <ul class="heading-tree">
              ${headings.map(h => `<li style="padding-left:${(h.level-1)*20}px">
                <span class="h-tag">H${h.level}</span>
                <span class="h-text">${esc(h.text)}</span>
              </li>`).join('')}
            </ul>` : '<p style="color:var(--text2);font-size:14px">Paste HTML above to analyze heading structure</p>'}
        </div>
        ${issues.length ? `
          <div class="card">
            <h3>⚠️ Issues Found (${issues.length})</h3>
            ${issues.map(iss => `
              <div class="checklist-item">
                <span class="checklist-icon">${iss.type==='error'?'❌':'⚠️'}</span>
                <div class="checklist-text">
                  <div class="label">${esc(iss.message)}</div>
                  <div class="hint">${esc(iss.hint)}</div>
                </div>
              </div>`).join('')}
          </div>` : headings.length ? `<div class="card"><h3>✅ No Issues</h3><p style="color:var(--green);font-size:14px">Heading structure looks good!</p></div>` : ''}
      </div>
    </div>`;
}

function parseHeadings(html) {
  const re = /<h([1-6])[^>]*>(.*?)<\/h[1-6]>/gi;
  const result = [];
  let m;
  while ((m = re.exec(html)) !== null) {
    result.push({level: parseInt(m[1]), text: m[2].replace(/<[^>]*>/g,'').trim()});
  }
  return result;
}

function analyzeHeadings(headings) {
  const issues = [];
  if (!headings.length) return issues;
  const h1s = headings.filter(h => h.level === 1);
  if (h1s.length === 0) issues.push({type:'error',message:'No H1 tag found',hint:'Every page should have exactly one H1 tag'});
  if (h1s.length > 1) issues.push({type:'error',message:`Multiple H1 tags (${h1s.length})`,hint:'Use only one H1 per page for SEO best practices'});
  for (let i = 1; i < headings.length; i++) {
    if (headings[i].level > headings[i-1].level + 1) {
      issues.push({type:'warn',message:`Skipped heading level: H${headings[i-1].level} → H${headings[i].level}`,hint:`Add H${headings[i-1].level+1} between them for proper hierarchy`});
    }
  }
  if (headings[0].level !== 1) issues.push({type:'warn',message:`First heading is H${headings[0].level}, not H1`,hint:'Start your heading hierarchy with H1'});
  headings.forEach(h => { if (h.text.length > 70) issues.push({type:'warn',message:`H${h.level} too long (${h.text.length} chars): "${h.text.substring(0,40)}..."`,hint:'Keep headings concise (under 70 characters)'}); });
  return issues;
}

function analyzeKeywords(text) {
  if (!text.trim()) return {totalWords:0,uniqueWords:0,sentences:0,singles:[],phrases:[]};
  const stopWords = new Set('the a an and or but in on at to for of is it this that with from by as are was were be been has have had do does did will would could should may might can shall not no nor so if then than too very just about above after again all also am any because before below between both can did do each few further get got had has have her here him his how its just know let like make me might more most my new now only other our out over own same she some still such take tell than that the their them then there these they this those through to too under until up us very want was we well what when where which while who why will with would you your'.split(' '));
  const words = text.toLowerCase().replace(/[^a-z0-9\s]/g,' ').split(/\s+/).filter(w => w.length > 1);
  const totalWords = words.length;
  const filtered = words.filter(w => !stopWords.has(w) && w.length > 2);
  const sentences = (text.match(/[.!?]+/g) || []).length || 1;

  // Singles
  const singleCounts = {};
  filtered.forEach(w => { singleCounts[w] = (singleCounts[w]||0) + 1; });
  const singles = Object.entries(singleCounts).map(([word, count]) => ({word, count, density: ((count/totalWords)*100).toFixed(1)})).sort((a,b) => b.count - a.count);

  // Phrases (bigrams + trigrams)
  const phraseCounts = {};
  for (let i = 0; i < filtered.length - 1; i++) {
    const bi = filtered[i] + ' ' + filtered[i+1];
    phraseCounts[bi] = (phraseCounts[bi]||0) + 1;
    if (i < filtered.length - 2) {
      const tri = bi + ' ' + filtered[i+2];
      phraseCounts[tri] = (phraseCounts[tri]||0) + 1;
    }
  }
  const phrases = Object.entries(phraseCounts).filter(([_,c]) => c >= 2).map(([word, count]) => ({word, count, density: ((count/totalWords)*100).toFixed(2)})).sort((a,b) => b.count - a.count);

  const uniqueWords = new Set(filtered).size;
  return {totalWords, uniqueWords, sentences, singles, phrases};
}

// === SEO AUDIT ===
function renderAudit(c, p) {
  const checks = runAudit(p);
  const passed = checks.filter(c => c.status === 'pass').length;
  const warned = checks.filter(c => c.status === 'warn').length;
  const failed = checks.filter(c => c.status === 'fail').length;
  const score = Math.round((passed / checks.length) * 100);

  c.innerHTML = `
    <div class="score-section">
      <div class="score-ring">
        <svg viewBox="0 0 36 36">
          <circle cx="18" cy="18" r="15.9" fill="none" stroke="var(--border)" stroke-width="2.5"/>
          <circle cx="18" cy="18" r="15.9" fill="none" stroke="${score>=80?'var(--green)':score>=50?'var(--yellow)':'var(--red)'}" stroke-width="2.5" stroke-dasharray="${score} ${100-score}" stroke-linecap="round"/>
        </svg>
        <div class="value" style="color:${score>=80?'var(--green)':score>=50?'var(--yellow)':'var(--red)'}">${score}</div>
      </div>
      <div>
        <div style="font-size:18px;font-weight:600">${p.name}</div>
        <div style="font-size:14px;color:var(--text2);margin-top:4px">
          <span class="badge badge-green">${passed} passed</span>
          <span class="badge badge-yellow" style="margin-left:6px">${warned} warnings</span>
          <span class="badge badge-red" style="margin-left:6px">${failed} failed</span>
        </div>
      </div>
    </div>
    <div class="card">
      ${checks.map(ch => `
        <div class="checklist-item">
          <span class="checklist-icon">${ch.status==='pass'?'✅':ch.status==='warn'?'⚠️':'❌'}</span>
          <div class="checklist-text">
            <div class="label">${esc(ch.label)}</div>
            <div class="hint">${esc(ch.hint)}</div>
          </div>
        </div>`).join('')}
    </div>`;
}

function runAudit(p) {
  const checks = [];
  const add = (label, status, hint) => checks.push({label, status, hint});

  // Title
  if (!p.title) add('Title tag', 'fail', 'Missing title tag — critical for SEO');
  else if (p.title.length < 30) add('Title tag', 'warn', `Title is short (${p.title.length} chars). Aim for 30-60 characters.`);
  else if (p.title.length > 60) add('Title tag', 'warn', `Title is long (${p.title.length} chars). Google may truncate after 60.`);
  else add('Title tag', 'pass', `Good length (${p.title.length} chars)`);

  // Description
  if (!p.description) add('Meta description', 'fail', 'Missing meta description — important for click-through rate');
  else if (p.description.length < 120) add('Meta description', 'warn', `Description is short (${p.description.length} chars). Aim for 120-160.`);
  else if (p.description.length > 160) add('Meta description', 'warn', `Description is long (${p.description.length} chars). Google truncates after ~160.`);
  else add('Meta description', 'pass', `Good length (${p.description.length} chars)`);

  // URL
  if (!p.url) add('Page URL', 'fail', 'Set a page URL for proper canonical and OG tags');
  else add('Page URL', 'pass', 'URL is set');

  // Canonical
  if (!p.canonicalUrl) add('Canonical URL', 'warn', 'No canonical URL set — prevents duplicate content issues');
  else add('Canonical URL', 'pass', 'Canonical URL is set');

  // OG Tags
  if (!p.ogTitle && !p.title) add('OG Title', 'fail', 'No Open Graph title — social shares will look broken');
  else add('OG Title', 'pass', 'OG title available');
  if (!p.ogDescription && !p.description) add('OG Description', 'fail', 'No OG description');
  else add('OG Description', 'pass', 'OG description available');
  if (!p.ogImage) add('OG Image', 'warn', 'No OG image — social shares without images get 2-3x fewer clicks');
  else add('OG Image', 'pass', 'OG image is set');

  // Twitter
  if (!p.twitterCard) add('Twitter Card', 'warn', 'No Twitter card type set');
  else add('Twitter Card', 'pass', `Card type: ${p.twitterCard}`);

  // Keywords
  if (!p.keywords.length) add('Meta keywords', 'warn', 'No keywords set (low impact but still useful for tracking)');
  else add('Meta keywords', 'pass', `${p.keywords.length} keywords defined`);

  // Author
  if (!p.author) add('Author', 'warn', 'No author meta tag');
  else add('Author', 'pass', 'Author is set');

  // Language
  add('Language', 'pass', `Language set to "${p.language}"`);

  // Structured data
  const sd = generateStructuredData(p);
  const sdObj = JSON.parse(sd);
  const hasContent = Object.keys(sdObj).length > 2;
  if (hasContent) add('Structured data', 'pass', `${p.structuredDataType} schema configured`);
  else add('Structured data', 'warn', 'Structured data fields are mostly empty');

  // Headings
  if (p.headingsHtml) {
    const headings = parseHeadings(p.headingsHtml);
    const issues = analyzeHeadings(headings);
    if (issues.length === 0) add('Heading structure', 'pass', 'Clean heading hierarchy');
    else add('Heading structure', 'warn', `${issues.length} heading issue(s) found`);
  } else add('Heading structure', 'warn', 'No headings analyzed — paste HTML in Heading Analyzer');

  // Content
  if (p.contentText) {
    const a = analyzeKeywords(p.contentText);
    if (a.totalWords >= 300) add('Content length', 'pass', `${a.totalWords} words — good for SEO`);
    else add('Content length', 'warn', `Only ${a.totalWords} words — aim for 300+`);
  } else add('Content analysis', 'warn', 'No content analyzed — paste text in Keyword Density');

  // Robots
  if (p.robotsRules.length) add('Robots.txt', 'pass', `${p.robotsRules.length} rules configured`);
  else add('Robots.txt', 'warn', 'No robots.txt rules');

  // Sitemap
  if (p.sitemapUrls.length) add('Sitemap', 'pass', `${p.sitemapUrls.length} URLs in sitemap`);
  else add('Sitemap', 'warn', 'Empty sitemap');

  return checks;
}

        <div class="checklist-item" style="cursor:pointer" onclick="setView('meta')">
          <span class="checklist-icon">🏷️</span>
          <div class="checklist-text"><div class="label">Edit Meta Tags</div><div class="hint">Title, description, canonical URL</div></div>
        </div>
        <div class="checklist-item" style="cursor:pointer" onclick="setView('social')">
          <span class="checklist-icon">📱</span>
          <div class="checklist-text"><div class="label">Preview Social Cards</div><div class="hint">See how links look on Twitter/LinkedIn</div></div>
        </div>
        <div class="checklist-item" style="cursor:pointer" onclick="setView('structured')">
          <span class="checklist-icon">📊</span>
          <div class="checklist-text"><div class="label">Add Structured Data</div><div class="hint">Rich snippets in search results</div></div>
        </div>
        <div class="checklist-item" style="cursor:pointer" onclick="setView('audit')">
          <span class="checklist-icon">✅</span>
          <div class="checklist-text"><div class="label">Run SEO Audit</div><div class="hint">Full page health check</div></div>
        </div>
      </div>
    </div>
    <div class="card">
      <h3>📋 All Pages Overview</h3>
      <table style="width:100%;font-size:13px;border-collapse:collapse">
        <tr style="color:var(--text2);border-bottom:1px solid var(--border)">
          <th style="text-align:left;padding:8px">Page</th>
          <th>Title</th>
          <th>Description</th>
          <th>OG Image</th>
          <th>Keywords</th>
          <th>Schema</th>
          <th>Score</th>
        </tr>
        ${pages.map(pg => {
          const sc = calcPageScore(pg);
          return `<tr style="border-bottom:1px solid var(--border);cursor:pointer" onclick="selectPage('${pg.id}');setView('meta')">
            <td style="padding:8px;font-weight:500">${esc(pg.name)}</td>
            <td style="text-align:center">${pg.title?'✅':'❌'}</td>
            <td style="text-align:center">${pg.description?'✅':'❌'}</td>
            <td style="text-align:center">${pg.ogImage?'✅':'❌'}</td>
            <td style="text-align:center">${pg.keywords.length||'—'}</td>
            <td style="text-align:center">${pg.structuredDataType}</td>
            <td style="text-align:center"><span class="badge ${sc>=80?'badge-green':sc>=50?'badge-yellow':'badge-red'}">${sc}</span></td>
          </tr>`;
        }).join('')}
      </table>
    </div>`;
}

function calcPageScore(p) {
  let score = 0;
  const checks = runAudit(p);
  const passed = checks.filter(c => c.status === 'pass').length;
  score = Math.round((passed / checks.length) * 100);
  return score;
}

// === UTILITIES ===
function upd(key, val) {
  const p = getPage();
  p[key] = val;
  save();
  // Debounced re-render for live previews
  clearTimeout(upd._t);
  upd._t = setTimeout(() => renderView(), 150);
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function truncate(s, n) { return s.length > n ? s.substring(0, n) + '...' : s; }
function getDomain(url) { try { return new URL(url).hostname; } catch { return url || 'example.com'; } }

function highlightHtml(html) {
  return esc(html)
    .replace(/(&lt;\/?[a-z][a-z0-9]*)/gi, '<span style="color:var(--accent)">$1</span>')
    .replace(/([\w-]+)=&quot;/g, '<span style="color:var(--yellow)">$1</span>=&quot;')
    .replace(/&quot;([^&]*)&quot;/g, '&quot;<span style="color:var(--green)">$1</span>&quot;');
}

function highlightJson(json) {
  return esc(json)
    .replace(/&quot;([^&]*)&quot;\s*:/g, '<span class="key">&quot;$1&quot;</span>:')
    .replace(/:\s*&quot;([^&]*)&quot;/g, ': <span class="str">&quot;$1&quot;</span>')
    .replace(/:\s*(\d+(?:\.\d+)?)/g, ': <span class="num">$1</span>')
    .replace(/:\s*(true|false)/g, ': <span class="bool">$1</span>')
    .replace(/:\s*(null)/g, ': <span class="null">$1</span>');
}

function highlightXml(xml) {
  return esc(xml)
    .replace(/(&lt;\/?[\w:]+)/g, '<span style="color:var(--accent)">$1</span>')
    .replace(/(&gt;)([^&<]+)(&lt;)/g, '$1<span style="color:var(--green)">$2</span>$3');
}

function copyText(text) {
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('#copyBtn');
    const orig = btn.textContent;
    btn.textContent = '✅ Copied!';
    setTimeout(() => btn.textContent = orig, 1500);
  });
}

function copyOutput() {
  const p = getPage();
  let text = '';
  switch(currentView) {
    case 'meta': text = generateMetaTags(p); break;
    case 'structured': text = `<script type="application/ld+json">\n${generateStructuredData(p)}\n</` + 'script>'; break;
    case 'robots': text = generateRobotsTxt(p); break;
    case 'sitemap': text = generateSitemapXml(p); break;
    default: text = generateMetaTags(p); break;
  }
  copyText(text);
}

function downloadFile(name, content, type) {
  const blob = new Blob([content], {type});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = name; a.click();
  URL.revokeObjectURL(url);
}

function exportAll() {
  const data = JSON.stringify(pages, null, 2);
  downloadFile('seoforge-export.json', data, 'application/json');
}

function importAll() {
  document.getElementById('importFile').click();
}

function handleImport(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      const data = JSON.parse(ev.target.result);
      if (Array.isArray(data)) {
        const existing = new Set(pages.map(p => p.id));
        data.forEach(d => { if (!existing.has(d.id)) pages.push(d); });
        save();
        renderPageList();
        renderView();
        alert(`Imported ${data.length} page(s)`);
      }
    } catch(err) { alert('Invalid JSON file'); }
  };
  reader.readAsText(file);
  e.target.value = '';
}

function showHelp() { document.getElementById('helpModal').classList.add('show'); }
function hideHelp() { document.getElementById('helpModal').classList.remove('show'); }

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;
  const modal = document.getElementById('helpModal');
  if (modal.classList.contains('show')) { if (e.key === 'Escape') hideHelp(); return; }

  if (e.key >= '1' && e.key <= '9') {
    const idx = parseInt(e.key) - 1;
    if (idx < views.length) { e.preventDefault(); setView(views[idx]); }
  }
  if (e.key === 'n' || e.key === 'N') { e.preventDefault(); addPage(); }
  if (e.key === 'c' || e.key === 'C') { e.preventDefault(); copyOutput(); }
  if (e.key === 'e' || e.key === 'E') { e.preventDefault(); exportAll(); }
  if (e.key === 'i' || e.key === 'I') { e.preventDefault(); importAll(); }
  if (e.key === '?') { e.preventDefault(); showHelp(); }
  if (e.key === 'Escape') hideHelp();
  if (e.key === 'Delete' || e.key === 'Backspace') {
    if (e.metaKey || e.ctrlKey) { e.preventDefault(); deletePage(); }
  }
});

// Init
init();
</script>
