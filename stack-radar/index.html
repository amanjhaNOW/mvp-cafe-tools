<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stack Radar — Tech Stack Auditor & Cost Tracker</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0d1117;--surface:#161b22;--surface2:#21262d;--surface3:#30363d;--border:#30363d;--text:#e6edf3;--text2:#8b949e;--text3:#6e7681;--accent:#58a6ff;--accent2:#388bfd;--green:#3fb950;--yellow:#d29922;--red:#f85149;--orange:#d18616;--purple:#bc8cff;--pink:#f778ba;--cyan:#76e3ea;--radius:8px;--shadow:0 2px 8px rgba(0,0,0,.3)}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);display:flex;height:100vh;overflow:hidden}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:var(--text)}
input,textarea,select{font-family:inherit;background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:8px 12px;font-size:14px;outline:none}
input:focus,textarea:focus,select:focus{border-color:var(--accent)}
textarea{resize:vertical}

/* Sidebar */
.sidebar{width:260px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sidebar-header{padding:16px;border-bottom:1px solid var(--border)}
.sidebar-header h1{font-size:16px;font-weight:700;display:flex;align-items:center;gap:8px}
.sidebar-header h1 span{font-size:20px}
.sidebar-search{padding:8px 12px}
.sidebar-search input{width:100%;padding:6px 10px;font-size:13px}
.sidebar-section{padding:8px 12px}
.sidebar-section h3{font-size:11px;text-transform:uppercase;color:var(--text3);margin-bottom:6px;letter-spacing:.5px}
.stack-list{flex:1;overflow-y:auto;padding:4px 8px}
.stack-item{padding:8px 12px;border-radius:6px;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:8px;margin-bottom:2px;transition:background .15s}
.stack-item:hover{background:var(--surface2)}
.stack-item.active{background:var(--accent);color:#fff}
.stack-item .emoji{font-size:16px}
.stack-item .name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stack-item .count{font-size:11px;color:var(--text3);background:var(--surface3);padding:1px 6px;border-radius:10px}
.stack-item.active .count{background:rgba(255,255,255,.2);color:#fff}
.sidebar-bottom{padding:12px;border-top:1px solid var(--border);display:flex;gap:6px}
.sidebar-bottom button{flex:1;padding:6px;border-radius:6px;font-size:12px;background:var(--surface2);transition:background .15s}
.sidebar-bottom button:hover{background:var(--surface3)}

/* Main */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{display:flex;align-items:center;padding:12px 20px;border-bottom:1px solid var(--border);gap:8px;flex-shrink:0}
.topbar .stack-name{font-size:18px;font-weight:600;flex:1}
.tab-bar{display:flex;gap:2px;background:var(--surface2);padding:3px;border-radius:8px}
.tab-btn{padding:6px 14px;border-radius:6px;font-size:13px;font-weight:500;color:var(--text2);transition:all .15s}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{background:var(--accent);color:#fff}
.content{flex:1;overflow-y:auto;padding:20px}

/* Cards */
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;transition:border-color .15s}
.card:hover{border-color:var(--accent)}
.card-header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.card-header .icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.card-header .info{flex:1;min-width:0}
.card-header .info h3{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-header .info .type{font-size:11px;color:var(--text3)}
.card-actions{display:flex;gap:4px}
.card-actions button{padding:4px 8px;border-radius:4px;font-size:12px;color:var(--text2)}
.card-actions button:hover{background:var(--surface2);color:var(--text)}
.card-body{display:flex;flex-direction:column;gap:8px}
.card-row{display:flex;justify-content:space-between;align-items:center;font-size:13px}
.card-row .label{color:var(--text2)}
.card-row .value{font-weight:500}
.card-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.tag{padding:2px 8px;border-radius:10px;font-size:11px;font-weight:500}
.tag-cat{background:rgba(88,166,255,.15);color:var(--accent)}
.tag-license{background:rgba(63,185,80,.15);color:var(--green)}
.tag-risk-low{background:rgba(63,185,80,.15);color:var(--green)}
.tag-risk-med{background:rgba(210,153,34,.15);color:var(--yellow)}
.tag-risk-high{background:rgba(248,81,73,.15);color:var(--red)}
.tag-risk-crit{background:rgba(248,81,73,.25);color:var(--red);font-weight:700}
.tag-status{padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.status-active{background:rgba(63,185,80,.15);color:var(--green)}
.status-degraded{background:rgba(210,153,34,.15);color:var(--yellow)}
.status-down{background:rgba(248,81,73,.15);color:var(--red)}
.status-evaluating{background:rgba(188,140,255,.15);color:var(--purple)}
.status-deprecated{background:rgba(110,118,129,.2);color:var(--text3)}

/* Cost bar */
.cost-bar{height:8px;background:var(--surface2);border-radius:4px;overflow:hidden;margin-top:4px}
.cost-bar-fill{height:100%;border-radius:4px;transition:width .3s}

/* Stats */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:24px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
.stat-card .label{font-size:12px;color:var(--text2);margin-bottom:4px}
.stat-card .value{font-size:24px;font-weight:700}
.stat-card .sub{font-size:11px;color:var(--text3);margin-top:2px}

/* Charts */
.chart-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px}
.chart-section h3{font-size:14px;font-weight:600;margin-bottom:16px}
.bar-chart{display:flex;flex-direction:column;gap:8px}
.bar-row{display:flex;align-items:center;gap:10px}
.bar-label{width:120px;font-size:12px;color:var(--text2);text-align:right;flex-shrink:0}
.bar-track{flex:1;height:24px;background:var(--surface2);border-radius:4px;overflow:hidden;position:relative}
.bar-fill{height:100%;border-radius:4px;display:flex;align-items:center;padding:0 8px;font-size:11px;font-weight:600;color:#fff;min-width:fit-content;transition:width .5s}
.bar-amount{width:80px;font-size:12px;text-align:right;font-weight:500;flex-shrink:0}

/* Risk matrix */
.risk-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.risk-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px}
.risk-card h4{font-size:13px;font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.risk-meter{display:flex;gap:2px;margin:8px 0}
.risk-meter .seg{height:6px;flex:1;border-radius:3px;background:var(--surface3)}
.risk-meter .seg.filled{background:var(--green)}
.risk-meter.med .seg.filled{background:var(--yellow)}
.risk-meter.high .seg.filled{background:var(--orange)}
.risk-meter.crit .seg.filled{background:var(--red)}
.risk-factors{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
.risk-factor{font-size:11px;color:var(--text2);background:var(--surface2);padding:2px 8px;border-radius:10px}
.risk-factor.warn{color:var(--yellow);background:rgba(210,153,34,.1)}
.risk-factor.danger{color:var(--red);background:rgba(248,81,73,.1)}

/* License table */
.license-table{width:100%;border-collapse:collapse}
.license-table th,.license-table td{padding:10px 14px;text-align:left;border-bottom:1px solid var(--border);font-size:13px}
.license-table th{color:var(--text2);font-weight:500;font-size:12px;text-transform:uppercase;letter-spacing:.5px}
.license-table tr:hover td{background:var(--surface)}
.license-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:500}
.lic-open{background:rgba(63,185,80,.15);color:var(--green)}
.lic-commercial{background:rgba(210,153,34,.15);color:var(--yellow)}
.lic-proprietary{background:rgba(248,81,73,.15);color:var(--red)}
.lic-free{background:rgba(118,227,234,.15);color:var(--cyan)}

/* Alternatives */
.alt-list{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.alt-chip{font-size:11px;background:var(--surface3);padding:2px 8px;border-radius:10px;color:var(--text2)}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.show{opacity:1;pointer-events:auto}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;width:560px;max-height:85vh;overflow-y:auto;padding:24px;box-shadow:var(--shadow)}
.modal h2{font-size:18px;font-weight:600;margin-bottom:16px}
.modal-row{margin-bottom:14px}
.modal-row label{display:block;font-size:12px;color:var(--text2);margin-bottom:4px}
.modal-row input,.modal-row select,.modal-row textarea{width:100%}
.modal-row-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
.btn{padding:8px 16px;border-radius:6px;font-size:13px;font-weight:500;transition:all .15s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2)}
.btn-secondary{background:var(--surface2);color:var(--text)}
.btn-secondary:hover{background:var(--surface3)}
.btn-danger{background:rgba(248,81,73,.15);color:var(--red)}
.btn-danger:hover{background:rgba(248,81,73,.25)}
.btn-sm{padding:5px 10px;font-size:12px}

/* Alternatives editor */
.alt-editor{display:flex;flex-wrap:wrap;gap:4px;align-items:center;min-height:32px;padding:4px;background:var(--surface2);border:1px solid var(--border);border-radius:6px}
.alt-editor .alt-tag{display:flex;align-items:center;gap:4px;background:var(--surface3);padding:2px 8px;border-radius:10px;font-size:12px}
.alt-editor .alt-tag button{font-size:14px;color:var(--text3);padding:0 2px}
.alt-editor input{border:none;background:transparent;flex:1;min-width:80px;padding:4px;font-size:13px}

/* Empty state */
.empty{text-align:center;padding:60px 20px;color:var(--text2)}
.empty .icon{font-size:48px;margin-bottom:12px}
.empty h3{font-size:16px;color:var(--text);margin-bottom:8px}
.empty p{font-size:13px;max-width:300px;margin:0 auto}

/* Category filters */
.filter-bar{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.filter-chip{padding:4px 12px;border-radius:14px;font-size:12px;background:var(--surface2);color:var(--text2);cursor:pointer;transition:all .15s;border:1px solid transparent}
.filter-chip:hover{border-color:var(--border)}
.filter-chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* Top bar add button */
.add-btn{padding:6px 14px;border-radius:6px;font-size:13px;font-weight:500;background:var(--accent);color:#fff;display:flex;align-items:center;gap:6px;transition:background .15s}
.add-btn:hover{background:var(--accent2)}

/* Cost summary */
.cost-summary{display:flex;gap:16px;margin-bottom:16px;flex-wrap:wrap}
.cost-pill{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 20px;text-align:center}
.cost-pill .amount{font-size:20px;font-weight:700}
.cost-pill .period{font-size:11px;color:var(--text3);margin-top:2px}

/* Donut */
.donut-container{display:flex;align-items:center;gap:24px;justify-content:center;flex-wrap:wrap}
.donut-legend{display:flex;flex-direction:column;gap:6px}
.donut-legend-item{display:flex;align-items:center;gap:8px;font-size:13px}
.donut-legend-item .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* Scrollbar */
::-webkit-scrollbar{width:8px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:var(--text3)}

/* Help */
.help-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:200;opacity:0;pointer-events:none;transition:opacity .2s}
.help-overlay.show{opacity:1;pointer-events:auto}
.help-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;max-width:480px;width:90%}
.help-box h2{margin-bottom:16px;font-size:18px}
.help-box .shortcut{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px}
.help-box .shortcut:last-child{border-bottom:none}
.help-box kbd{background:var(--surface2);padding:2px 8px;border-radius:4px;font-size:12px;font-family:monospace;border:1px solid var(--border)}
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-header">
    <h1><span>📡</span> Stack Radar</h1>
  </div>
  <div class="sidebar-search">
    <input type="text" id="sideSearch" placeholder="Search stacks..." oninput="filterSidebar()">
  </div>
  <div class="stack-list" id="stackList"></div>
  <div class="sidebar-bottom">
    <button onclick="newStack()" title="New Stack (N)">+ Stack</button>
    <button onclick="exportAll()" title="Export (E)">📥 Export</button>
    <button onclick="importAll()" title="Import (I)">📤 Import</button>
    <button onclick="showHelp()" title="Help (?)">?</button>
  </div>
</div>

<div class="main">
  <div class="topbar">
    <div class="stack-name" id="stackName">Select a Stack</div>
    <button class="add-btn" onclick="openToolModal()" id="addToolBtn" style="display:none">+ Add Tool</button>
    <div class="tab-bar" id="tabBar" style="display:none">
      <button class="tab-btn active" data-tab="overview" onclick="switchTab('overview')">Overview</button>
      <button class="tab-btn" data-tab="costs" onclick="switchTab('costs')">💰 Costs</button>
      <button class="tab-btn" data-tab="risks" onclick="switchTab('risks')">⚠️ Risks</button>
      <button class="tab-btn" data-tab="licenses" onclick="switchTab('licenses')">📜 Licenses</button>
      <button class="tab-btn" data-tab="dashboard" onclick="switchTab('dashboard')">📊 Dashboard</button>
    </div>
  </div>
  <div class="content" id="content">
    <div class="empty"><div class="icon">📡</div><h3>Welcome to Stack Radar</h3><p>Create a stack to start tracking your tech dependencies, costs, and risks.</p></div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modal" onclick="event.stopPropagation()"></div>
</div>

<div class="help-overlay" id="helpOverlay" onclick="closeHelp()">
  <div class="help-box" onclick="event.stopPropagation()">
    <h2>⌨️ Keyboard Shortcuts</h2>
    <div class="shortcut"><span>New tool</span><kbd>N</kbd></div>
    <div class="shortcut"><span>New stack</span><kbd>⇧N</kbd></div>
    <div class="shortcut"><span>Search</span><kbd>/</kbd></div>
    <div class="shortcut"><span>Overview</span><kbd>1</kbd></div>
    <div class="shortcut"><span>Costs</span><kbd>2</kbd></div>
    <div class="shortcut"><span>Risks</span><kbd>3</kbd></div>
    <div class="shortcut"><span>Licenses</span><kbd>4</kbd></div>
    <div class="shortcut"><span>Dashboard</span><kbd>5</kbd></div>
    <div class="shortcut"><span>Export</span><kbd>E</kbd></div>
    <div class="shortcut"><span>Import</span><kbd>I</kbd></div>
    <div class="shortcut"><span>Help</span><kbd>?</kbd></div>
    <div class="shortcut"><span>Close</span><kbd>Esc</kbd></div>
  </div>
</div>

<input type="file" id="importFile" style="display:none" accept=".json" onchange="handleImport(event)">

<script>
// ─── Data ───
const CATEGORIES = ['Frontend','Backend','Database','Auth','Analytics','Payments','Infrastructure','DevOps','Monitoring','Email','CDN','Design','AI/ML','Testing','Storage','Security','Communication'];
const CAT_COLORS = {'Frontend':'#58a6ff','Backend':'#3fb950','Database':'#d29922','Auth':'#f85149','Analytics':'#bc8cff','Payments':'#f778ba','Infrastructure':'#d18616','DevOps':'#76e3ea','Monitoring':'#da7756','Email':'#7ee787','CDN':'#79c0ff','Design':'#e3b341','AI/ML':'#a371f7','Testing':'#9e6a03','Storage':'#768390','Security':'#f47067','Communication':'#57ab5a'};
const TYPES = ['SaaS','Library','Framework','API','Infrastructure','Internal','Open Source'];
const STATUSES = ['Active','Degraded','Down','Evaluating','Deprecated'];
const LICENSES = ['MIT','Apache 2.0','GPL v3','BSD 3-Clause','ISC','MPL 2.0','Commercial','Proprietary','Free Tier','AGPL','SSPL','Unlicense','Custom'];
const CURRENCIES = ['USD','INR','EUR','GBP'];
const LOCK_IN_LEVELS = ['None','Low','Medium','High','Critical'];

let stacks = [];
let activeStackId = null;
let activeTab = 'overview';
let activeCatFilter = 'All';

const KEY = 'stack-radar-data';
function save(){ localStorage.setItem(KEY, JSON.stringify(stacks)) }
function load(){ try { stacks = JSON.parse(localStorage.getItem(KEY)) || []; } catch(e){ stacks = []; } }

// ─── Init ───
load();
if(!stacks.length) seedData();
renderSidebar();
if(stacks.length){ selectStack(stacks[0].id); }

// ─── Stack CRUD ───
function newStack(){
  const name = prompt('Stack name:', 'My Stack');
  if(!name) return;
  const stack = { id: uid(), name, emoji: '📦', tools: [], createdAt: new Date().toISOString() };
  stacks.push(stack);
  save(); renderSidebar(); selectStack(stack.id);
}

function deleteStack(id){
  if(!confirm('Delete this stack and all its tools?')) return;
  stacks = stacks.filter(s => s.id !== id);
  save(); renderSidebar();
  if(activeStackId === id){ activeStackId = null; stacks.length ? selectStack(stacks[0].id) : renderContent(); }
}

function selectStack(id){
  activeStackId = id;
  activeCatFilter = 'All';
  const s = getStack();
  document.getElementById('stackName').textContent = s ? `${s.emoji} ${s.name}` : 'Select a Stack';
  document.getElementById('tabBar').style.display = s ? 'flex' : 'none';
  document.getElementById('addToolBtn').style.display = s ? 'flex' : 'none';
  renderSidebar(); renderContent();
}

function getStack(){ return stacks.find(s => s.id === activeStackId) }
function getTools(){ const s = getStack(); return s ? s.tools : []; }

// ─── Tool CRUD ───
function addTool(tool){
  const s = getStack(); if(!s) return;
  s.tools.push({ id: uid(), ...tool, createdAt: new Date().toISOString() });
  save(); renderContent();
}

function updateTool(id, data){
  const s = getStack(); if(!s) return;
  const t = s.tools.find(t => t.id === id); if(!t) return;
  Object.assign(t, data);
  save(); renderContent();
}

function deleteTool(id){
  const s = getStack(); if(!s) return;
  s.tools = s.tools.filter(t => t.id !== id);
  save(); renderContent();
}

// ─── Render ───
function renderSidebar(){
  const q = document.getElementById('sideSearch').value.toLowerCase();
  const list = document.getElementById('stackList');
  list.innerHTML = stacks.filter(s => !q || s.name.toLowerCase().includes(q)).map(s => `
    <div class="stack-item ${s.id===activeStackId?'active':''}" onclick="selectStack('${s.id}')" ondblclick="editStackName('${s.id}')">
      <span class="emoji">${s.emoji}</span>
      <span class="name">${esc(s.name)}</span>
      <span class="count">${s.tools.length}</span>
    </div>
  `).join('');
}

function filterSidebar(){ renderSidebar(); }

function editStackName(id){
  const s = stacks.find(x => x.id === id); if(!s) return;
  const name = prompt('Rename stack:', s.name);
  if(name){ s.name = name; save(); renderSidebar(); if(activeStackId===id) selectStack(id); }
}

function renderContent(){
  const s = getStack();
  if(!s){ document.getElementById('content').innerHTML = '<div class="empty"><div class="icon">📡</div><h3>Welcome to Stack Radar</h3><p>Create a stack to start tracking your tech dependencies, costs, and risks.</p></div>'; return; }
  switch(activeTab){
    case 'overview': renderOverview(); break;
    case 'costs': renderCosts(); break;
    case 'risks': renderRisks(); break;
    case 'licenses': renderLicenses(); break;
    case 'dashboard': renderDashboard(); break;
  }
}

function switchTab(tab){
  activeTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  renderContent();
}

// ─── Overview ───
function renderOverview(){
  const tools = getTools();
  const el = document.getElementById('content');
  if(!tools.length){ el.innerHTML = '<div class="empty"><div class="icon">🔧</div><h3>No tools yet</h3><p>Add your first tool to start tracking your stack.</p></div>'; return; }

  const cats = ['All', ...new Set(tools.map(t => t.category))].sort((a,b) => a==='All'?-1:b==='All'?1:a.localeCompare(b));
  const filtered = activeCatFilter === 'All' ? tools : tools.filter(t => t.category === activeCatFilter);
  const maxCost = Math.max(...tools.map(t => t.monthlyCost || 0), 1);

  el.innerHTML = `
    <div class="filter-bar">${cats.map(c => `<button class="filter-chip ${c===activeCatFilter?'active':''}" onclick="activeCatFilter='${c}';renderContent()">${c}${c!=='All'?' ('+tools.filter(t=>t.category===c).length+')':' ('+tools.length+')'}</button>`).join('')}</div>
    <div class="card-grid">${filtered.map(t => {
      const risk = calcRisk(t);

// ─── Risks ───
function renderRisks(){
  const tools = getTools();
  const el = document.getElementById('content');

  const critical = scored.filter(t => t.risk > 75);
  const high = scored.filter(t => t.risk > 50 && t.risk <= 75);
  const med = scored.filter(t => t.risk > 25 && t.risk <= 50);
  const low = scored.filter(t => t.risk <= 25);

  el.innerHTML = `
    <div class="stats-grid">
      <div class="stat-card"><div class="label">Critical Risk</div><div class="value" style="color:var(--red)">${critical.length}</div></div>
      <div class="stat-card"><div class="label">High Risk</div><div class="value" style="color:var(--orange)">${high.length}</div></div>

      <div class="stat-card"><div class="label">Low Risk</div><div class="value" style="color:var(--green)">${low.length}</div></div>

      <div class="stat-card"><div class="label">Avg Risk Score</div><div class="value">${scored.length?Math.round(scored.reduce((s,t)=>s+t.risk,0)/scored.length):0}</div></div>
    </div>
    <div class="risk-grid">${scored.map(t => {
      const riskClass = t.risk<=25?'low':t.risk<=50?'med':t.risk<=75?'high':'crit';

    }).join('')}</div>
  `;
}

// ─── Risk calc ───
function calcRisk(t){
  let score = 0;
  // Lock-in (0-30)
  const lockInScore = {'None':0,'Low':8,'Medium':16,'High':24,'Critical':30};
  score += lockInScore[t.lockIn] || 0;
  // No alternatives (0-25)
  if(!t.alternatives || t.alternatives.length === 0) score += 25;
  else if(t.alternatives.length === 1) score += 12;
  else if(t.alternatives.length === 2) score += 5;
  // Status (0-20)
  if(t.status === 'Down') score += 20;
  else if(t.status === 'Degraded') score += 12;
  else if(t.status === 'Deprecated') score += 15;
  // Cost dependency (0-15)
  if(t.monthlyCost > 500) score += 15;
  else if(t.monthlyCost > 200) score += 10;
  else if(t.monthlyCost > 50) score += 5;
  // License risk (0-10)
  if(t.license === 'Proprietary' || t.license === 'SSPL') score += 10;
  else if(t.license === 'GPL v3' || t.license === 'AGPL') score += 6;
  else if(t.license === 'Commercial') score += 3;
  return Math.min(score, 100);
}

function getRiskFactors(t){
  const f = [];
  if(t.lockIn === 'Critical' || t.lockIn === 'High') f.push({text:`${t.lockIn} lock-in`,level:'danger'});
  else if(t.lockIn === 'Medium') f.push({text:'Medium lock-in',level:'warn'});
  if(!t.alternatives?.length) f.push({text:'No alternatives',level:'danger'});
  else if(t.alternatives.length === 1) f.push({text:'Only 1 alternative',level:'warn'});
  if(t.status === 'Down') f.push({text:'Currently down',level:'danger'});
  else if(t.status === 'Degraded') f.push({text:'Degraded',level:'warn'});
  else if(t.status === 'Deprecated') f.push({text:'Deprecated',level:'danger'});
  if(t.monthlyCost > 200) f.push({text:`High cost: ${formatCurrency(t.monthlyCost,t.currency)}/mo`,level:'warn'});
  if(t.license === 'Proprietary' || t.license === 'SSPL') f.push({text:'Restrictive license',level:'warn'});
  if(!f.length) f.push({text:'Low risk ✓',level:''});
  return f;
}

// ─── Helpers ───
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,8) }
function esc(s){ if(!s) return ''; const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
function formatCurrency(amt, cur='USD'){
  const symbols = {USD:'$',INR:'₹',EUR:'€',GBP:'£'};
  const sym = symbols[cur] || cur+' ';
  return sym + amt.toLocaleString('en-US', {minimumFractionDigits:0, maximumFractionDigits:0});
}
function catEmoji(c){
  const m={'Frontend':'⚛️','Backend':'⚙️','Database':'🗄️','Auth':'🔐','Analytics':'📊','Payments':'💳','Infrastructure':'☁️','DevOps':'🔧','Monitoring':'👁️','Email':'📧','CDN':'🌐','Design':'🎨','AI/ML':'🤖','Testing':'🧪','Storage':'💾','Security':'🛡️','Communication':'💬'};
  return m[c]||'📦';
}
function licColor(l){
  const open = ['MIT','Apache 2.0','BSD 3-Clause','ISC','MPL 2.0','Unlicense'];
  const restrictive = ['GPL v3','AGPL','SSPL'];
  if(open.includes(l)) return '#3fb950';
  if(restrictive.includes(l)) return '#d29922';
  if(l==='Commercial'||l==='Proprietary') return '#f85149';
  if(l==='Free Tier') return '#76e3ea';
  return '#8b949e';
}
function licBadgeClass(l){
  const open = ['MIT','Apache 2.0','BSD 3-Clause','ISC','MPL 2.0','Unlicense'];
  if(open.includes(l)) return 'lic-open';
  if(l==='Free Tier') return 'lic-free';
  if(l==='Commercial') return 'lic-commercial';
  if(l==='Proprietary'||l==='SSPL') return 'lic-proprietary';
  return 'lic-commercial';
}

function renderDonut(data, r=100){
  if(!data.length) return '<svg width="'+(r*2)+'" height="'+(r*2)+'"></svg>';
  const total = data.reduce((s,d) => s + d.value, 0);
  if(!total) return '';
  const cx=r, cy=r, R=r*0.8, innerR=r*0.5;
  let paths = '', angle = -Math.PI/2;
  data.forEach(d => {
    const sweep = (d.value/total) * Math.PI * 2;
    const x1 = cx + R * Math.cos(angle), y1 = cy + R * Math.sin(angle);
    const x2 = cx + R * Math.cos(angle+sweep), y2 = cy + R * Math.sin(angle+sweep);
    const ix1 = cx + innerR * Math.cos(angle+sweep), iy1 = cy + innerR * Math.sin(angle+sweep);
    const ix2 = cx + innerR * Math.cos(angle), iy2 = cy + innerR * Math.sin(angle);
    const large = sweep > Math.PI ? 1 : 0;
    paths += `<path d="M${x1},${y1} A${R},${R} 0 ${large} 1 ${x2},${y2} L${ix1},${iy1} A${innerR},${innerR} 0 ${large} 0 ${ix2},${iy2} Z" fill="${d.color}" opacity="0.85"/>`;
    angle += sweep;
  });
  return `<svg width="${r*2}" height="${r*2}" viewBox="0 0 ${r*2} ${r*2}">${paths}<text x="${cx}" y="${cy-4}" text-anchor="middle" fill="var(--text)" font-size="18" font-weight="700">${total}</text><text x="${cx}" y="${cy+12}" text-anchor="middle" fill="var(--text2)" font-size="10">total</text></svg>`;
}

// ─── Import/Export ───
function exportAll(){
  const json = JSON.stringify(stacks, null, 2);
  const blob = new Blob([json], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'stack-radar-export.json';
  a.click();
}
function importAll(){ document.getElementById('importFile').click() }
function handleImport(e){
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      const data = JSON.parse(ev.target.result);
      if(Array.isArray(data)){ stacks = data; save(); renderSidebar(); if(stacks.length) selectStack(stacks[0].id); }
    } catch(err){ alert('Invalid JSON'); }
  };
  reader.readAsText(file);
  e.target.value = '';
}

// ─── Keyboard ───
document.addEventListener('keydown', e => {
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT') {
    if(e.key==='Escape'){ e.target.blur(); closeModal(); closeHelp(); }
    return;
  }
  if(e.key==='Escape'){ closeModal(); closeHelp(); return; }
  if(e.key==='/'){e.preventDefault();document.getElementById('sideSearch').focus();return}
  if(e.key==='?'){e.preventDefault();showHelp();return}
  if(e.key==='n'&&!e.shiftKey){e.preventDefault();openToolModal();return}
  if(e.key==='N'&&e.shiftKey){e.preventDefault();newStack();return}
  if(e.key==='e'){e.preventDefault();exportAll();return}
  if(e.key==='i'){e.preventDefault();importAll();return}
  if(e.key==='1'){switchTab('overview')}
  if(e.key==='2'){switchTab('costs')}
  if(e.key==='3'){switchTab('risks')}
  if(e.key==='4'){switchTab('licenses')}
  if(e.key==='5'){switchTab('dashboard')}
});
